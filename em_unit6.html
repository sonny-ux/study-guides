<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>E&M · Unit 6: Current & Resistance</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
  onload="renderMathInElement(document.body, {
    delimiters: [
      {left: '$$', right: '$$', display: true},
      {left: '$', right: '$', display: false}
    ],
    throwOnError: false
  });"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;600;700&display=swap');
:root{--bg:#09090f;--surf:#0f1018;--card:#13151e;--card2:#171923;--border:#1e2130;--border2:#252840;--accent:#7ab3ff;--adim:#101e35;--blue:#6ee7b7;--bdim:#1a3a2e;--amber:#fbbf24;--amdim:#2a1f08;--rose:#fb7185;--rdim:#2a0f14;--violet:#a78bfa;--text:#e8ecf4;--text2:#9aa3b8;--muted:#4a5168;--ok:#34d399;--err:#f87171;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

/* HEADER */
.hdr{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surf);border-bottom:1px solid var(--border);}
.hdr-badge{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--bg);background:var(--accent);padding:4px 8px;border-radius:5px;flex-shrink:0;}
.hdr-title{font-size:13px;font-weight:700;}
.hdr-sub{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.05em;}
.hdr-pts{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);background:var(--adim);border:1px solid #1e3050;padding:4px 10px;border-radius:20px;flex-shrink:0;}

/* PROGRESS */
.prog{flex-shrink:0;height:2px;background:var(--border);}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--blue));transition:width .5s ease;}

/* NAV TABS */
.snav{flex-shrink:0;display:flex;gap:3px;padding:8px 12px;overflow-x:auto;scrollbar-width:none;background:var(--surf);border-bottom:1px solid var(--border);}
.snav::-webkit-scrollbar{display:none;}
.stab{flex-shrink:0;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:'JetBrains Mono',monospace;transition:all .15s;white-space:nowrap;}
.stab.active{background:var(--accent);color:var(--bg);border-color:var(--accent);}
.stab.done{border-color:var(--accent);color:var(--accent);}
.stab.done::after{content:" ✓";}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;min-height:0;padding:16px 14px 100px;-webkit-overflow-scrolling:touch;}

/* TYPOGRAPHY */
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px;}
.sec-title{font-family:'Crimson Pro',serif;font-size:26px;font-weight:600;line-height:1.15;margin-bottom:16px;}
.prose{font-size:15px;line-height:1.8;color:var(--text2);font-weight:300;margin-bottom:14px;}
.prose p{margin-bottom:12px;}
.prose p:last-child{margin-bottom:0;}
.prose strong{color:var(--text);font-weight:600;}
.prose em{color:var(--accent);font-style:normal;font-weight:500;}

/* MATH */
.m{font-family:'JetBrains Mono',monospace;font-size:.92em;color:var(--accent);}
.mi{font-family:'JetBrains Mono',monospace;font-size:.88em;color:var(--text);}

/* RECALL BOX */
.recall{background:var(--bdim);border:1px solid #255040;border-left:3px solid var(--blue);border-radius:0 8px 8px 0;padding:12px 14px;margin:14px 0;font-size:14px;color:#90d8b8;line-height:1.7;}
.recall-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--blue);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;font-weight:600;}

/* EQUATION BOX */
.eqbox{background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:16px;margin:14px 0;text-align:center;}
.eq-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;text-align:left;}
.eq-main{font-size:1.15em;color:var(--accent);line-height:1.9;margin-bottom:6px;}
.eq-main sup{font-size:.65em;vertical-align:super;}
.eq-main sub{font-size:.65em;vertical-align:sub;}
.eq-parts{font-size:12px;color:var(--text2);text-align:left;margin-top:8px;line-height:1.85;font-family:'JetBrains Mono',monospace;}

/* FRACTION */
.frac{display:inline-flex;flex-direction:column;align-items:center;font-family:'JetBrains Mono',monospace;font-size:.85em;vertical-align:middle;margin:0 2px;}
.frac .num{border-bottom:1px solid var(--accent);padding:0 3px;color:var(--accent);}
.frac .den{padding:0 3px;color:var(--accent);}

/* CALLOUT BOXES */
.insight{background:var(--adim);border:1px solid #1e3050;border-radius:8px;padding:12px 14px;margin:14px 0;font-size:14px;color:var(--accent);line-height:1.7;}
.insight::before{content:"Key insight: ";font-weight:700;}
.note{background:var(--amdim);border:1px solid #4a3010;border-radius:8px;padding:12px 14px;margin:14px 0;font-size:14px;color:var(--amber);line-height:1.7;}
.note::before{content:"Note: ";font-weight:700;}
.warn{background:var(--rdim);border:1px solid #4a1020;border-radius:8px;padding:12px 14px;margin:14px 0;font-size:14px;color:var(--rose);line-height:1.7;}
.analogy{background:#0f1a10;border-left:3px solid var(--ok);border-radius:0 8px 8px 0;padding:12px 14px;margin:14px 0;font-size:14px;color:#7ecfa0;font-style:italic;line-height:1.7;}
.analogy::before{content:"Analogy — ";font-style:normal;font-weight:700;color:var(--ok);}

/* SVG DIAGRAM */
.diagram{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px;margin:14px 0;text-align:center;}
.diagram-cap{font-size:11px;color:var(--muted);margin-top:8px;font-style:italic;}

/* INTERACTIVE CANVAS */
.viz-wrap{background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:14px;margin:14px 0;}
.viz-title{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}
.viz-controls{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;align-items:center;}
.viz-label{font-size:12px;color:var(--text2);font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:6px;flex:1;min-width:160px;}
.viz-label span{color:var(--accent);font-weight:600;min-width:40px;display:inline-block;}
input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:var(--border2);outline:none;flex:1;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;}
.viz-out{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--ok);margin-top:8px;padding:8px 10px;background:var(--card);border-radius:6px;border:1px solid var(--border);}

/* TABLE */
.dtable{width:100%;border-collapse:collapse;margin:14px 0;font-size:13px;}
.dtable th{text-align:left;padding:7px 10px;color:var(--muted);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border2);font-family:'JetBrains Mono',monospace;}
.dtable td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text);}
.dtable tr:last-child td{border-bottom:none;}
.dtable .hi{color:var(--accent);font-weight:600;}

/* QUESTION BLOCK */
.qblock{background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:16px;margin:18px 0;animation:fu .3s ease;}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.qtag{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--amber);background:var(--amdim);border:1px solid #3a2a08;padding:3px 8px;border-radius:4px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}
.qtext{font-size:14.5px;font-weight:500;line-height:1.6;margin-bottom:13px;color:var(--text);}
.qtext .m{font-size:.95em;}

/* MC */
.qopts{display:flex;flex-direction:column;gap:7px;}
.qopt{padding:12px 13px;border-radius:7px;border:1px solid var(--border2);background:var(--surf);cursor:pointer;font-size:14px;text-align:left;color:var(--text2);font-family:'Outfit',sans-serif;transition:all .12s;line-height:1.45;}
.qopt:hover:not(:disabled){border-color:var(--accent);color:var(--text);background:var(--adim);}
.qopt.correct{border-color:var(--ok);background:#081f10;color:var(--ok);}
.qopt.wrong{border-color:var(--err);background:#1f0808;color:var(--err);}
.qopt:disabled{cursor:default;}

/* TF */
.qtf{display:flex;gap:8px;margin-bottom:0;}
.qtfbtn{flex:1;padding:13px;border-radius:7px;border:1px solid var(--border2);background:var(--surf);font-size:17px;font-weight:700;cursor:pointer;color:var(--text2);font-family:'Outfit',sans-serif;transition:all .12s;}
.qtfbtn:hover:not(:disabled){border-color:var(--accent);background:var(--adim);color:var(--text);}
.qtfbtn.correct{border-color:var(--ok);background:#081f10;color:var(--ok);}
.qtfbtn.wrong{border-color:var(--err);background:#1f0808;color:var(--err);}
.qtfbtn:disabled{cursor:default;}

/* NUMERIC */
.qninput{width:100%;padding:13px;background:var(--surf);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-size:18px;font-family:'JetBrains Mono',monospace;outline:none;margin-bottom:6px;transition:border-color .2s;}
.qninput:focus{border-color:var(--accent);}
.qhint{font-size:12px;color:var(--muted);margin-bottom:10px;}
.qsubmit{width:100%;padding:11px;border-radius:7px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:'Outfit',sans-serif;background:var(--accent);color:var(--bg);transition:opacity .15s;}
.qsubmit:disabled{opacity:.45;cursor:default;}

/* RESULT */
.qresult{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:7px;font-size:13px;font-weight:600;margin:10px 0 8px;}
.qresult.ok{background:#081f10;color:var(--ok);border:1px solid #1a4020;}
.qresult.no{background:#1f0808;color:var(--err);border:1px solid #401020;}
.qexpl{background:#0c1a10;border:1px solid #1a3520;border-radius:7px;padding:11px 13px;font-size:13.5px;color:#7ecfa0;line-height:1.75;display:none;}
.qexpl.show{display:block;animation:fu .3s ease;}
.qexpl strong{color:var(--blue);}
.qexpl .m{font-size:.9em;}

/* CONTINUE */
.cont-btn{width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;border:none;font-family:'Outfit',sans-serif;background:var(--accent);color:var(--bg);margin-top:20px;transition:transform .1s;}
.cont-btn:active{transform:scale(.98);}
.cont-btn.sec{background:var(--card);color:var(--text);border:1px solid var(--border2);margin-top:8px;}

/* FINAL */
.final-wrap{text-align:center;padding:28px 10px;}
.fring{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
.finner{width:88px;height:88px;border-radius:50%;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;}
.fnum{font-size:26px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--accent);}
.fden{font-size:11px;color:var(--muted);}
.fmsg{font-family:'Crimson Pro',serif;font-size:24px;font-weight:600;margin-bottom:6px;}
.fsub{font-size:14px;color:var(--text2);margin-bottom:24px;}
.hidden{display:none!important;}

/* KaTeX color overrides */
.eq-main .katex{color:var(--accent);}
.katex-display{margin:0.3em 0;}
</style>
</head>

<script>
function fr(n,d){return `<span class="frac"><span class="num">${n}</span><span class="den">${d}</span></span>`;}
function m(s){return `<span class="m">${s}</span>`;}

// Re-render KaTeX after dynamic HTML insertion
function renderMath(el){
  if(typeof renderMathInElement === 'function'){
    renderMathInElement(el||document.body,{
      delimiters:[
        {left:'$$',right:'$$',display:true},

      ],

    });
  }
}

const S=[

// ── SECTION 1 ── CURRENT ─────────────────────────────────────────────────
{id:'s1',label:'1 · Current',content:`
<div class="eyebrow">Section 1 of 7</div>
<div class="sec-title">Electric Current</div>
<div class="prose">
<p>An <strong>electric current</strong> is the net flow of electric charge through a surface, per unit time. Formally, if charge $dq$ passes through a cross-section in time $dt$, then:</p>
</div>
<div class="eqbox">
<div class="eq-lbl">Definition of Current</div>
<div class="eq-main">$$i = \\frac{dq}{dt}$$</div>
<div class="eq-parts">$i$ = current [Amperes, A]<br>$q$ = charge [Coulombs, C]<br>$1\\ \\text{A} = 1\\ \\text{C/s}$</div>
</div>
<div class="prose">
<p>The total charge that passes through a surface up to time $t$ is found by integrating:</p>
</div>
<div class="eqbox">
<div class="eq-lbl">Total Charge from Current</div>
<div class="eq-main">$$q = \\int_0^t i\\, dt$$</div>
</div>
<div class="prose">
<p><strong>Current is conserved.</strong> Like charge itself, current obeys a conservation law. At any junction where a wire splits, the incoming current equals the total outgoing current. If a current $i_0$ splits into branches $i_1$ and $i_2$:</p>
</div>
<div class="eqbox">
<div class="eq-lbl">Current Conservation (Kirchhoff's Current Law)</div>
<div class="eq-main">$$i_0 = i_1 + i_2$$</div>
<div class="eq-parts">Charge cannot accumulate at a junction — whatever flows in must flow out.</div>
</div>
<div class="diagram">
<svg viewBox="0 0 300 120" width="100%" style="max-width:300px">
<defs>
  <marker id="ah1" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#7ab3ff"/></marker>
  <marker id="ah2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#6ee7b7"/></marker>
  <marker id="ah3" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#fbbf24"/></marker>
</defs>
<!-- incoming wire -->
<line x1="10" y1="60" x2="118" y2="60" stroke="#7ab3ff" stroke-width="2.5" marker-end="url(#ah1)"/>
<text x="12" y="50" fill="#7ab3ff" font-size="12" font-family="monospace" font-weight="600">i₀</text>
<!-- junction dot -->
<circle cx="130" cy="60" r="5" fill="#e8ecf4"/>
<!-- upper branch -->
<line x1="130" y1="60" x2="130" y2="28" stroke="#e8ecf4" stroke-width="1.5"/>
<line x1="130" y1="28" x2="275" y2="28" stroke="#6ee7b7" stroke-width="2" marker-end="url(#ah2)"/>
<text x="196" y="20" fill="#6ee7b7" font-size="12" font-family="monospace" font-weight="600">i₁</text>
<!-- lower branch -->
<line x1="130" y1="60" x2="130" y2="92" stroke="#e8ecf4" stroke-width="1.5"/>
<line x1="130" y1="92" x2="275" y2="92" stroke="#fbbf24" stroke-width="2" marker-end="url(#ah3)"/>
<text x="196" y="108" fill="#fbbf24" font-size="12" font-family="monospace" font-weight="600">i₂</text>
<!-- equation -->
<text x="10" y="112" fill="#4a5168" font-size="11" font-family="monospace">i₀ = i₁ + i₂</text>
</svg>
<div class="diagram-cap">At any junction, charge is conserved: incoming current = sum of outgoing currents.</div>
</div>
<div class="prose">
<p><strong>Convention:</strong> By historical convention, current flows in the direction that <em>positive</em> charges would move. In metals, the actual charge carriers are electrons (negative), which move <em>opposite</em> to the conventional current direction. We always use the conventional direction.</p>
</div>
<div class="recall">
<div class="recall-lbl">Why does current flow?</div>
An isolated conductor in equilibrium is an equipotential — no $\\vec{E}$-field inside, no current. When you connect a battery across a conductor, a potential difference of EMF $\\varepsilon$ volts is imposed. This creates an $\\vec{E}$-field inside the conductor, which exerts force on the free electrons, driving them to flow. By convention, current $i$ flows from $+$ to $-$ externally (the direction positive charges would move), while electrons (the actual movers) flow CCW.
</div>
<div class="analogy">Think of a pipe full of water. The pipe cross-section $a$, $b$, $c$ may differ along the pipe, but the volume flow rate (m³/s) is the same everywhere — water cannot accumulate inside. Same with current: $i$ through $aa'$, $bb'$, and $cc'$ is identical, because charge cannot pile up inside a wire.</div>
<div class="note">Water flow (H₂O) has $i = 0$ electrically, because both $+$ and $-$ charges are present and moving together, making $q_\\text{net} = 0$. Current requires a net charge flow — only found in conductors with a driven EMF.</div>
`,questions:[
{type:'mc',tag:'Conceptual',text:'A wire carries a current of 3 A for 5 seconds. How much charge passes through a cross-section of the wire?',opts:['0.6 C','3 C','8 C','15 C'],ans:3,expl:'<strong>$q = i \\cdot t = 3\\ \\text{A} \\times 5\\ \\text{s} = 15\\ \\text{C}$.</strong> This is just the definition $i = dq/dt$ integrated for constant $i$.'},
{type:'tf',text:'True or False: In a metal wire, conventional current flows in the same direction as the electron drift.',ans:false,expl:'<strong>False.</strong> Electrons are negatively charged, so they drift opposite to the $\\vec{E}$-field. Conventional current is defined as the direction positive charges would move — which is opposite to the electron drift.'},
{type:'num',tag:'Calculation',text:'Current $i(t) = 4t^2$ A flows through a wire. How much charge (in Coulombs) passes in the first 2 seconds?',hint:'Integrate: $q = \\int_0^2 4t^2\\, dt = [4t^3/3]_0^2$. Evaluate at $t = 2$.',ans:10.67,tol:0.2,expl:'<strong>$q = 4(2)^3/3 = 32/3 \\approx 10.67\\ \\text{C}$.</strong>'},
{type:'mc',tag:'Junction Rule',text:'At a junction, two wires carry currents 5 A and 3 A into the node. A third wire leaves the node. What current does it carry?',opts:['2 A out','3 A out','5 A out','8 A out'],ans:3,expl:'<strong>8 A out.</strong> By current conservation: $i_\\text{out} = 5 + 3 = 8\\ \\text{A}$. All charge that flows in must flow out.'}
]},

// ── SECTION 2 ── CURRENT DENSITY & DRIFT SPEED ───────────────────────────
{id:'s2',label:'2 · J and v_d',content:`
<div class="eyebrow">Section 2 of 7</div>
<div class="sec-title">Current Density and Drift Speed</div>
<div class="prose">
<p>The total current $i$ is the same through any cross-section of a wire, but <em>how densely packed</em> that current is depends on the cross-sectional area. We define the <strong>current density</strong> $\\vec{J}$ (a vector) to capture this:</p>
</div>
<div class="eqbox">
<div class="eq-lbl">Current Density</div>
<div class="eq-main">$$i = \\int \\vec{J} \\cdot d\\vec{A}$$</div>
<div class="eq-main" style="font-size:.9em;margin-top:4px">$$J = i/A \\quad \\text{(when } J \\text{ is uniform and perpendicular to surface)}$$</div>
<div class="eq-parts">$J$ = current density [A/m²]<br>$\\vec{J}$ is parallel to $\\vec{v}_d$ for positive carriers<br>$\\vec{J}$ is antiparallel to $\\vec{v}_d$ for negative carriers (electrons)</div>
</div>
<div class="diagram">
<svg viewBox="0 0 300 110" width="100%" style="max-width:300px">
<defs>
  <marker id="bh1" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#7ab3ff"/></marker>
  <marker id="bh2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#6ee7b7"/></marker>
</defs>
<!-- left wire fat section -->
<ellipse cx="55" cy="55" rx="10" ry="34" fill="none" stroke="#4a5168" stroke-width="1.2" stroke-dasharray="3,2"/>
<line x1="55" y1="21" x2="110" y2="21" stroke="#4a5168" stroke-width="1.2"/>
<line x1="55" y1="89" x2="110" y2="89" stroke="#4a5168" stroke-width="1.2"/>
<!-- narrow section -->
<line x1="110" y1="21" x2="145" y2="36" stroke="#4a5168" stroke-width="1.2"/>
<line x1="110" y1="89" x2="145" y2="74" stroke="#4a5168" stroke-width="1.2"/>
<line x1="145" y1="36" x2="210" y2="36" stroke="#4a5168" stroke-width="1.2"/>
<line x1="145" y1="74" x2="210" y2="74" stroke="#4a5168" stroke-width="1.2"/>
<!-- right flare -->

<text x="2" y="51" fill="#7ab3ff" font-size="10" font-family="monospace">i</text>
<text x="287" y="51" fill="#7ab3ff" font-size="10" font-family="monospace">i</text>
<!-- labels A1, A2 -->
<text x="55" y="108" fill="#6ee7b7" font-size="10" font-family="monospace">A₁</text>
<text x="168" y="32" fill="#fbbf24" font-size="10" font-family="monospace">A₂</text>
<text x="50" y="8" fill="#4a5168" font-size="9" font-family="monospace">J₁ = i/A₁</text>
<text x="140" y="28" fill="#4a5168" font-size="9" font-family="monospace">J₂ = i/A₂ &gt; J₁</text>
</svg>
<div class="diagram-cap">Same current $i$ through both sections, but $J_2 > J_1$ because $A_2 < A_1$. Current density increases in the narrow region.</div>
</div>
<div class="prose">
<p><strong>Connecting $J$ to drift speed $v_d$</strong></p>
<p>When current flows, charge carriers (electrons in metals) move with a net average velocity called the <strong>drift velocity</strong> $\\vec{v}_d$. Consider a wire of cross-section $A$ and length $L$. The total charge in this volume is:</p>
</div>
<div class="eqbox">
<div class="eq-lbl">Derivation: J in terms of drift speed</div>
<div class="eq-main">$$q = n \\cdot A \\cdot L \\cdot e$$</div>
<div class="eq-main" style="font-size:.9em;margin-top:4px">Time to cross length $L$: $\\quad t = L / v_d$</div>
<div class="eq-main" style="font-size:.9em;margin-top:4px">$$i = q/t = \\frac{nALe}{L/v_d} = nAev_d$$</div>
<div class="eq-main" style="margin-top:6px;color:#6ee7b7">$$J = nev_d$$</div>
<div class="eq-parts">$n$ = number density of charge carriers [m$^{-3}$]<br>$e$ = charge per carrier [C]<br>$v_d$ = drift speed [m/s]<br>For electrons: $e = 1.6 \\times 10^{-19}$ C</div>
</div>
<div class="insight">$\\vec{J} = ne\\vec{v}_d$ for positive carriers ($\\vec{J} \\parallel \\vec{v}_d$). For electrons (negative carriers), $\\vec{J}$ is opposite to the electron drift. The formula is still $J = nev_d$ in magnitude.</div>

<!-- INTERACTIVE: drift speed slider -->
<div class="viz-wrap">
  <div class="viz-title">Interactive: Drift Speed Calculator</div>
  <canvas id="driftCanvas" width="280" height="80" style="width:100%;border-radius:6px;background:#0c1015;display:block;"></canvas>
  <div class="viz-controls">

      <input type="range" id="driftR" min="100" max="2000" value="900">
    </label>
  </div>
  <div class="viz-out" id="driftOut">$v_d$ = ? m/s</div>
  <div style="font-size:11px;color:var(--muted);margin-top:6px;font-family:'JetBrains Mono',monospace;">Using $n = 8.5\\times10^{28}$ e⁻/m³ (copper). Dots animated at $v_d$ scale.</div>
</div>

<div class="prose">
<p><strong>How slow is drift speed actually?</strong> Consider a copper wire carrying 17 mA with radius 900 μm. With $n = 8.5\\times10^{28}$ m$^{-3}$ for copper:</p>
</div>
<div class="eqbox">
<div class="eq-lbl">Example Calculation (from notes)</div>
<div class="eq-main" style="font-size:.9em;">$$v_d = \\frac{i}{ne\\pi r^2}$$</div>
<div class="eq-main" style="font-size:.9em;margin-top:4px;">$$v_d = \\frac{17\\times10^{-3}}{8.5\\times10^{28} \\times 1.6\\times10^{-19} \\times \\pi \\times (900\\times10^{-6})^2}$$</div>
<div class="eq-main" style="font-size:.9em;margin-top:4px;color:#6ee7b7;">$$v_d \\approx 5\\times10^{-7}\\ \\text{m/s} = 1.8\\ \\text{mm/hr}$$</div>
</div>
<div class="note">The drift speed is incredibly slow — millimeters per hour! Yet lights turn on instantly when you flip a switch. Why? The $\\vec{E}$-field propagates through the wire at nearly the speed of light, setting all electrons in motion quasi-simultaneously — like a full hose: the moment you turn the tap, water flows at the other end immediately.</div>

// ── SECTION 3 ── RESISTIVITY & OHM'S LAW ─────────────────────────────────
{id:'s3',label:"3 · Ohm's Law",content:`
<div class="eyebrow">Section 3 of 7</div>
<div class="sec-title">Resistivity, Conductivity, and Ohm's Law</div>
<div class="prose">
<p>For most materials, when you apply a potential difference $V$ across a conductor, the resulting current $i$ is proportional to $V$. The ratio $V/i$ is a constant called <strong>resistance $R$</strong>:</p>
</div>
<div class="eqbox">
<div class="eq-lbl">Ohm's Law</div>
<div class="eq-main">$$V = iR$$</div>
<div class="eq-parts">$R$ = resistance [Ohms, $\\Omega$] = V/A<br>$i$ = current [A]<br>$V$ = potential difference [V]</div>
</div>
<div class="diagram">
<svg viewBox="0 0 280 100" width="100%" style="max-width:280px">
<defs><marker id="ch1" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#7ab3ff"/></marker></defs>
<!-- i-V axes -->
<line x1="30" y1="15" x2="30" y2="85" stroke="#4a5168" stroke-width="1.5" marker-end="url(#ch1)"/>
<line x1="25" y1="80" x2="140" y2="80" stroke="#4a5168" stroke-width="1.5" marker-end="url(#ch1)"/>
<text x="12" y="13" fill="#7ab3ff" font-size="10" font-family="monospace">i</text>
<text x="142" y="83" fill="#7ab3ff" font-size="10" font-family="monospace">V</text>
<!-- linear line for ohmic material -->
<line x1="30" y1="80" x2="125" y2="20" stroke="#6ee7b7" stroke-width="2"/>
<text x="95" y="32" fill="#6ee7b7" font-size="9" font-family="monospace">slope = 1/R</text>
<text x="35" y="52" fill="#4a5168" font-size="9" font-family="monospace">Ohmic</text>
<!-- circuit: battery + resistor -->
<rect x="165" y="30" width="110" height="50" rx="6" fill="none" stroke="#252840" stroke-width="1.5"/>
<!-- battery symbol -->
<line x1="175" y1="45" x2="175" y2="65" stroke="#4a5168" stroke-width="1.5"/>
<line x1="170" y1="50" x2="180" y2="50" stroke="#6ee7b7" stroke-width="2.5"/>
<line x1="172" y1="56" x2="178" y2="56" stroke="#fb7185" stroke-width="1.5"/>
<text x="183" y="53" fill="#fbbf24" font-size="9" font-family="monospace">V</text>
<!-- wires -->
<line x1="175" y1="45" x2="175" y2="35" stroke="#4a5168" stroke-width="1.5"/>
<line x1="175" y1="35" x2="245" y2="35" stroke="#4a5168" stroke-width="1.5"/>
<line x1="245" y1="35" x2="245" y2="55" stroke="#4a5168" stroke-width="1.5"/>
<!-- resistor zigzag -->
<polyline points="245,55 248,48 252,62 256,48 260,62 264,48 268,62 270,55" fill="none" stroke="#a78bfa" stroke-width="2"/>
<line x1="270" y1="55" x2="270" y2="65" stroke="#4a5168" stroke-width="1.5"/>
<line x1="270" y1="65" x2="175" y2="65" stroke="#4a5168" stroke-width="1.5"/>
<text x="252" y="78" fill="#a78bfa" font-size="9" font-family="monospace">R</text>
</svg>
<div class="diagram-cap">Left: $i$–$V$ graph for an ohmic material — a straight line with slope $1/R$. Right: simple resistive circuit with battery $V$ and resistor $R$.</div>
</div>
<div class="prose">
<p><strong>Microscopic form — relating $J$ to $E$</strong></p>
<p>At the local level, the current density $J$ and the electric field $E$ inside a conductor are related by the material property called <strong>conductivity</strong> $\\sigma$:</p>
</div>
<div class="eqbox">
<div class="eq-lbl">Microscopic Ohm's Law</div>
<div class="eq-main">$$\\vec{J} = \\sigma \\vec{E}$$</div>
<div class="eq-main" style="font-size:.9em;margin-top:4px;">$$\\vec{J} = \\frac{1}{\\rho} \\vec{E} \\quad \\text{where} \\quad \\rho = \\frac{1}{\\sigma}$$</div>
<div class="eq-parts">$\\sigma$ = conductivity [($\\Omega\\cdot$m)$^{-1}$] — material property<br>$\\rho$ = resistivity [$\\Omega\\cdot$m] — material property<br>Good conductors: large $\\sigma$, small $\\rho$<br>Good insulators: small $\\sigma$, large $\\rho$</div>
</div>
<div class="insight">$\\vec{J} = \\sigma\\vec{E}$ is the deep version of Ohm's law. It connects the microscopic (field-level) picture to macroscopic measurements. A good conductor ($\\sigma$ large) can sustain a large $J$ with a smaller $E$ than a poor conductor.</div>
<table class="dtable">
<tr><th>Material</th><th>$\\sigma$ [($\\Omega\\cdot$m)$^{-1}$]</th><th>$\\rho$ [$\\Omega\\cdot$m]</th><th>Note</th></tr>
<tr><td>Silver (Ag)</td><td class="hi">$6.0\\times10^7$</td><td>$1.67\\times10^{-8}$</td><td>Best conductor, expensive</td></tr>
<tr><td>Copper (Cu)</td><td class="hi">$5.9\\times10^7$</td><td>$1.72\\times10^{-8}$</td><td>Industry standard</td></tr>
<tr><td>Aluminum (Al)</td><td>$3.6\\times10^7$</td><td>$2.82\\times10^{-8}$</td><td>Cheaper, lighter</td></tr>
<tr><td>Quartz (SiO₂)</td><td>$\\sim10^{-16}$</td><td>$\\sim10^{16}$</td><td>Excellent insulator</td></tr>
</table>
<div class="note">Copper is the practical gold standard — nearly as conductive as silver, far cheaper. Aluminum is used in power lines where weight matters. Note: Cu is a good trade-off between the high cost of Ag and the lower conductivity of Al.</div>

{type:'tf',text:'True or False: A material with a large resistivity $\\rho$ is a good conductor.',ans:false,expl:'<strong>False.</strong> Large $\\rho$ means large resistance per unit length — a poor conductor. Good conductors (like copper) have very small $\\rho \\approx 10^{-8}\\ \\Omega\\cdot$m. Insulators like quartz have $\\rho \\approx 10^{16}\\ \\Omega\\cdot$m.'},
{type:'mc',tag:'Microscopic',text:'Inside a wire, the $\\vec{E}$-field is 0.05 V/m and the current density is $J = 2.95\\times10^6$ A/m². What is the conductivity $\\sigma$?',opts:['$5.9\\times10^7\\ (\\Omega\\cdot\\text{m})^{-1}$','$1.72\\times10^{-8}\\ (\\Omega\\cdot\\text{m})^{-1}$','$2.95\\times10^5\\ (\\Omega\\cdot\\text{m})^{-1}$','$0.017\\ (\\Omega\\cdot\\text{m})^{-1}$'],ans:0,expl:'<strong>$\\sigma = J/E = 2.95\\times10^6 / 0.05 = 5.9\\times10^7\\ (\\Omega\\cdot\\text{m})^{-1}$.</strong> This is the conductivity of copper.'},
{type:'tf',text:'True or False: The conductivity $\\sigma$ of a material is a property of only its geometry, not its composition.',ans:false,expl:'<strong>False.</strong> $\\sigma$ (and $\\rho = 1/\\sigma$) are intrinsic material properties — they depend on what the material is made of (atomic structure, electron density), not on its shape. Resistance $R$ depends on both material ($\\rho$) and geometry ($L$, $A$).'}
]},

// ── SECTION 4 ── RESISTANCE FROM GEOMETRY ────────────────────────────────
{id:'s4',label:'4 · R = ρL/A',content:`
<div class="eyebrow">Section 4 of 7</div>
<div class="sec-title">Resistance from Geometry</div>
<div class="prose">
<p>We can now connect the macroscopic $R$ to the material property $\\rho$ and the wire's geometry. Consider a cylindrical wire of length $L$, cross-sectional area $A$, made of material with resistivity $\\rho$. A voltage $V$ is applied across its ends, creating a uniform $\\vec{E}$-field:</p>
</div>
<div class="eqbox">
<div class="eq-lbl">Derivation</div>
<div class="eq-main" style="font-size:.9em;text-align:left;color:var(--text2);line-height:2.2;">
$E = V/L$ &nbsp;(uniform field in a rod)<br>
$J = \\sigma E = \\sigma V/L$ &nbsp;(microscopic Ohm's law)<br>
$i = JA = \\sigma AV/L$<br>
$V/i = L/(\\sigma A) = \\rho L/A$
</div>
</div>
<div class="eqbox">
<div class="eq-lbl">Resistance of a Cylindrical Wire</div>
<div class="eq-main">$$R = \\frac{\\rho L}{A}$$</div>
<div class="eq-parts">$\\rho$ = resistivity [$\\Omega\\cdot$m]<br>$L$ = length [m]<br>$A$ = cross-sectional area [m²]</div>
</div>
<div class="diagram">
<svg viewBox="0 0 300 100" width="100%" style="max-width:300px">
<defs><marker id="dh1" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#7ab3ff"/></marker></defs>
<!-- cylinder body -->
<ellipse cx="60" cy="50" rx="14" ry="34" fill="#1a2030" stroke="#4a5168" stroke-width="1.5"/>
<rect x="60" y="16" width="180" height="68" fill="#1a2030"/>
<ellipse cx="240" cy="50" rx="14" ry="34" fill="#1e2535" stroke="#7ab3ff" stroke-width="1.5"/>
<line x1="60" y1="16" x2="240" y2="16" stroke="#4a5168" stroke-width="1.5"/>
<line x1="60" y1="84" x2="240" y2="84" stroke="#4a5168" stroke-width="1.5"/>
<!-- current arrow -->
<line x1="80" y1="50" x2="210" y2="50" stroke="#7ab3ff" stroke-width="2" marker-end="url(#dh1)"/>
<text x="130" y="44" fill="#7ab3ff" font-size="11" font-family="monospace">i →</text>
<!-- V label left -->
<text x="35" y="54" fill="#6ee7b7" font-size="11" font-family="monospace">V</text>
<!-- length bracket -->
<line x1="60" y1="94" x2="240" y2="94" stroke="#4a5168" stroke-width="1"/>
<line x1="60" y1="90" x2="60" y2="98" stroke="#4a5168" stroke-width="1"/>
<line x1="240" y1="90" x2="240" y2="98" stroke="#4a5168" stroke-width="1"/>
<text x="135" y="108" fill="#4a5168" font-size="10" font-family="monospace" text-anchor="middle">L</text>
<!-- area label -->
<text x="244" y="25" fill="#fbbf24" font-size="10" font-family="monospace">A</text>
<!-- E label -->
<text x="126" y="76" fill="#fb7185" font-size="10" font-family="monospace">E = V/L →</text>
</svg>
<div class="diagram-cap">Cylindrical conductor of length $L$ and area $A$. Uniform $\\vec{E}$-field drives current $i$ from left to right.</div>
</div>
<div class="prose">
<p>The formula $R = \\rho L/A$ is deeply intuitive:</p>
<ul style="margin:10px 0 10px 20px;color:var(--text2);line-height:2;">
  <li><strong>Longer wire ($L\\uparrow$) $\\to$ $R\\uparrow$</strong>: charges must fight resistance over a longer path.</li>
  <li><strong>Larger area ($A\\uparrow$) $\\to$ $R\\downarrow$</strong>: more room for charge to flow, like a wider pipe.</li>
  <li><strong>More resistive material ($\\rho\\uparrow$) $\\to$ $R\\uparrow$</strong>: the material itself impedes flow more.</li>
</ul>
</div>

<!-- INTERACTIVE: resistance calculator -->
<div class="viz-wrap">
  <div class="viz-title">Interactive: Resistance from Geometry</div>
  <div class="viz-controls">
    <label class="viz-label">Length $L$: <span id="resL_lbl">1.0</span> m
      <input type="range" id="resL" min="10" max="500" value="100">
    </label>
    <label class="viz-label">Radius $r$: <span id="resRad_lbl">1.0</span> mm
      <input type="range" id="resRad" min="1" max="50" value="10">
    </label>
    <label class="viz-label" style="flex-basis:100%">Material:
      <select id="resMat" style="flex:1;background:var(--card2);color:var(--text);border:1px solid var(--border2);border-radius:6px;padding:4px 8px;font-family:'JetBrains Mono',monospace;font-size:12px;">
        <option value="1.72e-8">Copper (ρ = 1.72×10⁻⁸ Ω·m)</option>
        <option value="1.67e-8">Silver (ρ = 1.67×10⁻⁸ Ω·m)</option>
        <option value="2.82e-8">Aluminum (ρ = 2.82×10⁻⁸ Ω·m)</option>
        <option value="1.0e-7">Tungsten (ρ = 1.0×10⁻⁷ Ω·m)</option>
        <option value="6.9e-8">Iron (ρ = 6.9×10⁻⁸ Ω·m)</option>
      </select>
    </label>
  </div>
  <div class="viz-out" id="resOut">R = ? Ω</div>
</div>

<div class="recall">
<div class="recall-lbl">HW6 Connection — Solenoid Design (Problem 10)</div>
You need a 1-meter solenoid wound with 4 AWG wire ($r_\\text{wire} \\approx 2.5$ mm) to produce $B = 10^{-2}$ T running 40 A. First find the number of turns $N$ (from $B = \\mu_0 Ni$). Then compute total wire length ($N \\times$ circumference of solenoid coil), find $R = \\rho L/A$, and power $P = i^2 R$. This is $R = \\rho L/A$ applied to a coil geometry.
</div>
<div class="insight">$R = \\rho L/A$ is the bridge between microscopic ($\\rho$) and macroscopic ($R$) descriptions. The resistance of a wire is a geometric amplification of the material's resistivity.</div>
`,questions:[
{type:'num',tag:'Wire Resistance',text:'A copper wire ($\\rho = 1.72\\times10^{-8}$ Ω·m) has length $L = 2.0$ m and radius $r = 0.5$ mm. What is its resistance in mΩ?',hint:'$A = \\pi r^2 = \\pi(5\\times10^{-4})^2 \\approx 7.85\\times10^{-7}$ m². Then $R = \\rho L/A$. Answer in milliohms (mΩ).',ans:43.8,tol:2,expl:'<strong>$A = \\pi(0.5\\times10^{-3})^2 = 7.854\\times10^{-7}$ m². $R = (1.72\\times10^{-8} \\times 2.0) / 7.854\\times10^{-7} = 3.44\\times10^{-8} / 7.854\\times10^{-7} \\approx 0.0438\\ \\Omega = 43.8\\ \\text{m}\\Omega$.</strong>'},
{type:'mc',tag:'Scaling',text:'A wire of resistance $R$ is stretched uniformly to twice its original length (volume preserved, so area halves). What is the new resistance?',opts:['$R/2$','$R$','$2R$','$4R$'],ans:3,expl:'<strong>$4R$.</strong> Volume is conserved: $A\\cdot L = \\text{const}$, so if $L\\to 2L$ then $A\\to A/2$. New $R = \\rho(2L)/(A/2) = 4\\rho L/A = 4R$.'},
{type:'tf',text:'True or False: Two wires of the same material, one twice as long and one with twice the cross-sectional area, have the same resistance.',ans:true,expl:'<strong>True.</strong> $R = \\rho L/A$. Wire 1: $\\rho L/A$. Wire 2: $\\rho(2L)/(2A) = \\rho L/A$. Same resistance.'},
{type:'mc',tag:'Units',text:'What are the SI units of resistivity $\\rho$?',opts:['Ohms ($\\Omega$)','Ohm-meters ($\\Omega\\cdot$m)','Amperes per meter (A/m)','Siemens per meter (S/m)'],ans:1,expl:'<strong>$\\Omega\\cdot$m.</strong> From $\\rho = RA/L$: $[\\Omega][\\text{m}^2]/[\\text{m}] = \\Omega\\cdot\\text{m}$. Note that conductivity $\\sigma = 1/\\rho$ has units $(\\Omega\\cdot\\text{m})^{-1} = $ S/m.'}
,
{type:'num',tag:'HW5 Prep',text:'You are designing a resistor for a microchip using Al-doped Si ($\\rho = 2.8\\times10^{-3}\\,\\Omega\\cdot\\text{m}$). The cross-section is $100\\ \\mu\\text{m}\\times100\\ \\mu\\text{m}$. When 280 mV is applied, it must carry 100 mA. What thickness $d$ (in μm) is needed?',hint:'Required $R = V/i = 0.280/0.100 = 2.8\\ \\Omega$. Then $R = \\rho d/A$ where $A = (100\\times10^{-6})^2 = 10^{-8}$ m². Solve for $d$ in meters, then convert to μm.',ans:10,tol:0.5,expl:'<strong>$R = 0.280/0.100 = 2.8\\ \\Omega$. Solving $R = \\rho d/A$: $d = RA/\\rho = 2.8\\times10^{-8}/2.8\\times10^{-3} = 10^{-5}$ m $= 10\\ \\mu$m.</strong> This is HW5 Problem 5: a 10 μm thick slab of Si(Al) across a $100\\ \\mu$m square cross-section gives the required resistance.'}

]},

// ── SECTION 5 ── TEMPERATURE DEPENDENCE ──────────────────────────────────
{id:'s5',label:'5 · Temperature',content:`
<div class="eyebrow">Section 5 of 7</div>
<div class="sec-title">Temperature Dependence of Resistivity</div>
<div class="prose">
<p>Resistivity is not constant — it changes with temperature. For most metals, higher temperature means higher resistivity. The physical reason: at higher temperatures, ions in the lattice vibrate more vigorously, causing more frequent collisions with drifting electrons, impeding current flow.</p>
<p>Over a moderate temperature range, the relationship is approximately linear:</p>
</div>
<div class="eqbox">
<div class="eq-lbl">Temperature Coefficient of Resistivity</div>
<div class="eq-main">$$\\rho - \\rho_0 = \\rho_0\\, \\alpha\\, (T - T_0)$$</div>
<div class="eq-main" style="font-size:.9em;margin-top:4px;">$$\\rho(T) = \\rho_0\\left[1 + \\alpha(T - T_0)\\right]$$</div>
<div class="eq-parts">$\\rho_0$ = resistivity at reference temperature $T_0$<br>$T_0 = 293$ K (room temperature, 20°C)<br>$\\alpha$ = temperature coefficient [K$^{-1}$] — material property<br>Higher $T \\to$ higher $\\rho \\to$ lower $\\sigma \\to$ higher $R$ (for metals)</div>
</div>
<div class="diagram">
<svg viewBox="0 0 280 120" width="100%" style="max-width:280px">
<defs><marker id="eh1" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#7ab3ff"/></marker></defs>
<!-- axes -->
<line x1="35" y1="10" x2="35" y2="95" stroke="#4a5168" stroke-width="1.5" marker-end="url(#eh1)"/>
<line x1="30" y1="90" x2="260" y2="90" stroke="#4a5168" stroke-width="1.5" marker-end="url(#eh1)"/>
<text x="12" y="10" fill="#7ab3ff" font-size="10" font-family="monospace">ρ</text>
<text x="262" y="93" fill="#7ab3ff" font-size="10" font-family="monospace">T</text>
<!-- resistivity line for metal -->
<line x1="35" y1="85" x2="240" y2="20" stroke="#6ee7b7" stroke-width="2"/>
<text x="195" y="18" fill="#6ee7b7" font-size="10" font-family="monospace">metal</text>
<!-- T0 vertical -->
<line x1="90" y1="90" x2="90" y2="68" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,2"/>
<text x="82" y="103" fill="#fbbf24" font-size="9" font-family="monospace">T₀</text>
<!-- rho0 horizontal -->
<line x1="35" y1="68" x2="90" y2="68" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,2"/>
<text x="1" y="71" fill="#fbbf24" font-size="9" font-family="monospace">ρ₀</text>
<!-- slope label -->
<text x="60" y="52" fill="#4a5168" font-size="9" font-family="monospace">slope = ρ₀α</text>
</svg>
<div class="diagram-cap">$\\rho$ vs $T$ for a typical metal: linear increase with slope $\\rho_0\\alpha$. Resistivity rises with temperature as lattice vibrations increase scattering.</div>
</div>
<table class="dtable">
<tr><th>Material</th><th>$\\rho_0$ [$\\Omega\\cdot$m] at 20°C</th><th>$\\alpha$ [$10^{-3}$ K$^{-1}$]</th></tr>
<tr><td>Copper</td><td>$1.72\\times10^{-8}$</td><td class="hi">3.9</td></tr>
<tr><td>Silver</td><td>$1.67\\times10^{-8}$</td><td>3.8</td></tr>
<tr><td>Aluminum</td><td>$2.82\\times10^{-8}$</td><td>3.9</td></tr>
<tr><td>Tungsten</td><td>$5.6\\times10^{-8}$</td><td class="hi">4.5</td></tr>
<tr><td>Carbon (graphite)</td><td>$3.5\\times10^{-5}$</td><td>−0.5</td></tr>
<tr><td>Germanium (semiconductor)</td><td>$4.6\\times10^{-1}$</td><td>−48</td></tr>
</table>
<div class="note">Semiconductors and carbon have negative $\\alpha$ — resistivity decreases with temperature. This is because more thermal energy frees up additional charge carriers (electrons and holes), overcoming the scattering effect. This is the basis of thermistors and why CPUs get more conductive (less resistive) when hot.</div>

<!-- INTERACTIVE: temp slider -->
<div class="viz-wrap">
  <div class="viz-title">Interactive: Resistivity vs Temperature</div>
  <canvas id="tempCanvas" width="280" height="120" style="width:100%;border-radius:6px;background:#0c1015;display:block;"></canvas>
  <div class="viz-controls">
    <label class="viz-label">Temperature: <span id="tempT_lbl">293</span> K
      <input type="range" id="tempT" min="77" max="600" value="293">
    </label>
    <label class="viz-label" style="flex-basis:100%">Material:
      <select id="tempMat" style="flex:1;background:var(--card2);color:var(--text);border:1px solid var(--border2);border-radius:6px;padding:4px 8px;font-family:'JetBrains Mono',monospace;font-size:12px;">
        <option value="1.72e-8,3.9e-3">Copper</option>
        <option value="1.67e-8,3.8e-3">Silver</option>
        <option value="2.82e-8,3.9e-3">Aluminum</option>
        <option value="5.6e-8,4.5e-3">Tungsten</option>
      </select>
    </label>
  </div>
  <div class="viz-out" id="tempOut">$\\rho$ = ? Ω·m</div>
</div>

<div class="insight">Temperature dependence is crucial in engineering. Running a high-current device causes resistive heating, which raises $\\rho$, which causes more heating — a thermal runaway that must be managed by design. This is why power cables are rated by maximum operating temperature.</div>
`,questions:[
{type:'num',tag:'Temperature',text:'A copper wire has $\\rho_0 = 1.72\\times10^{-8}$ Ω·m at $T_0 = 293$ K. At $T = 373$ K (boiling water), what is $\\rho$ in units of $10^{-8}$ Ω·m? Use $\\alpha = 3.9\\times10^{-3}$ K$^{-1}$.',hint:'$\\rho(T) = \\rho_0[1 + \\alpha(T - T_0)]$. $\\Delta T = 373 - 293 = 80$ K.',ans:2.26,tol:0.1,expl:'<strong>$\\rho = 1.72\\times10^{-8} \\times [1 + 3.9\\times10^{-3} \\times 80] = 1.72\\times10^{-8} \\times 1.312 = 2.26\\times10^{-8}$ Ω·m.</strong>'},
{type:'mc',tag:'Semiconductor',text:"A semiconductor's resistivity decreases as temperature increases. This means its temperature coefficient $\\alpha$ is:",opts:['Positive','Zero','Negative','Temperature-dependent only'],ans:2,expl:'<strong>Negative.</strong> If $\\rho$ decreases with $T$, then $\\rho - \\rho_0 < 0$ when $T > T_0$, requiring $\\alpha < 0$. In semiconductors, more thermal energy frees additional charge carriers, increasing conductivity.'},
{type:'tf',text:'True or False: A lightbulb filament (tungsten) has higher resistance when hot than when cold.',ans:true,expl:'<strong>True.</strong> Tungsten has $\\alpha = 4.5\\times10^{-3}$ K$^{-1} > 0$. The filament reaches ~3000 K when glowing, so its resistance is many times higher than at room temperature. This is why incandescent bulbs draw a brief surge of current when first switched on.'},
{type:'num',tag:'Design',text:'A tungsten wire has $R = 10$ Ω at 293 K ($\\alpha = 4.5\\times10^{-3}$ K$^{-1}$). At 1293 K, what is $R$ in Ω? ($R$ scales with $\\rho$)',hint:'$R(T) = R_0[1 + \\alpha(T - T_0)]$. $\\Delta T = 1293 - 293 = 1000$ K.',ans:55,tol:1,expl:'<strong>$R = 10 \\times [1 + 4.5\\times10^{-3} \\times 1000] = 10 \\times [1 + 4.5] = 10 \\times 5.5 = 55\\ \\Omega$.</strong>'}
]},

// ── SECTION 6 ── POWER DISSIPATION ───────────────────────────────────────
{id:'s6',label:'6 · Power',content:`
<div class="eyebrow">Section 6 of 7</div>
<div class="sec-title">Power Dissipation in Resistors</div>
<div class="prose">
<p>When current flows through a resistor, charge carriers collide with lattice ions, transferring kinetic energy to heat. This process is called <strong>Joule heating</strong>. The rate at which electrical energy is converted to heat is the <strong>power dissipated</strong>.</p>
<p>In a time interval $dt$, charge $dq = i\\, dt$ moves through potential difference $V$. The work done by the field is:</p>
</div>
<div class="eqbox">
<div class="eq-lbl">Power Dissipated — Three Equivalent Forms</div>
<div class="eq-main">$$P = iV = i^2 R = \\frac{V^2}{R}$$</div>
<div class="eq-parts">$P$ = power [Watts, W = J/s]<br>All three forms are equivalent via $V = iR$<br>Use whichever form matches what you know</div>
</div>
<div class="diagram">
<svg viewBox="0 0 280 100" width="100%" style="max-width:280px">
<defs><marker id="fh1" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#7ab3ff"/></marker></defs>
<!-- P-i² curve (parabola for P = i²R) -->
<line x1="30" y1="10" x2="30" y2="90" stroke="#4a5168" stroke-width="1.5" marker-end="url(#fh1)"/>
<line x1="25" y1="85" x2="260" y2="85" stroke="#4a5168" stroke-width="1.5" marker-end="url(#fh1)"/>
<text x="12" y="10" fill="#7ab3ff" font-size="10" font-family="monospace">P</text>
<text x="263" y="89" fill="#7ab3ff" font-size="10" font-family="monospace">i</text>
<!-- parabola approximated -->
<path d="M30,85 Q100,80 160,55 Q210,30 250,10" fill="none" stroke="#fb7185" stroke-width="2"/>
<text x="210" y="22" fill="#fb7185" font-size="9" font-family="monospace">P = i²R</text>
<!-- heat glow labels -->
<text x="100" y="45" fill="#fbbf24" font-size="28" font-family="monospace" opacity="0.3">~</text>
<text x="125" y="65" fill="#fbbf24" font-size="22" font-family="monospace" opacity="0.2">~</text>
<text x="85" y="65" fill="#fbbf24" font-size="20" font-family="monospace" opacity="0.25">~</text>
<text x="54" y="30" fill="#4a5168" font-size="9" font-family="monospace">Joule heating</text>
<!-- resistor box label -->
<text x="140" y="80" fill="#a78bfa" font-size="9" font-family="monospace">R fixed</text>
</svg>
<div class="diagram-cap">$P = i^2 R$: power grows as the square of current. Doubling the current quadruples the heat dissipation — relevant for circuit breaker and fuse design.</div>
</div>
<div class="prose">
<p>The power formula connects directly to resistor design. A resistor rated at "1/4 W" can safely dissipate 250 mW before overheating. The relationship $P = V^2/R$ also shows why power transmission lines use very high voltage — for a given power $P$, using a large $V$ means a small $i$, which reduces the $i^2 R$ Joule heating losses in the line resistance.</p>
</div>

<!-- INTERACTIVE: power calculator -->
<div class="viz-wrap">
  <div class="viz-title">Interactive: Power Dissipation Explorer</div>
  <canvas id="powerCanvas" width="280" height="110" style="width:100%;border-radius:6px;background:#0c1015;display:block;"></canvas>
  <div class="viz-controls">
    <label class="viz-label">Voltage $V$: <span id="pwrV_lbl">12</span> V
      <input type="range" id="pwrV" min="1" max="100" value="12">
    </label>
    <label class="viz-label">Resistance $R$: <span id="pwrR_lbl">10</span> Ω
      <input type="range" id="pwrR" min="1" max="200" value="10">
    </label>
  </div>
  <div class="viz-out" id="pwrOut">$i$ = ? A &nbsp;|&nbsp; $P$ = ? W</div>
</div>

<div class="recall">
<div class="recall-lbl">HW6 — Solenoid Power (Problem 10c)</div>
The solenoid problem asks for power dissipated in the wire windings given $I = 40$ A and the total resistance $R$ of the wound wire. $P = I^2 R = (40)^2 R$. First compute $R = \\rho L/A$ from the total wire length and cross-section, then multiply. This is Joule heating in action.
</div>
<div class="warn">$P = i^2 R$ is why overloading a circuit is dangerous — current slightly above rating quadratically increases heating. A wire rated for 15 A carrying 20 A dissipates $(20/15)^2 \\approx 1.78\\times$ the designed power. This is why fuses and circuit breakers are essential — they interrupt the circuit before overheating causes a fire.</div>
<div class="analogy">Power transmission: moving 1 MW at 1000 V requires 1000 A, causing massive $I^2 R$ losses in the cables. The same power at 100,000 V requires only 10 A — $10{,}000\\times$ less resistive heating. This is why the grid runs at high voltage (100+ kV) and transformers step it down for household use.</div>
`,questions:[
{type:'num',tag:'Power',text:'A $60\\ \\Omega$ resistor has 12 V across it. What power does it dissipate in Watts?',hint:'Use $P = V^2/R$ directly.',ans:2.4,tol:0.1,expl:'<strong>$P = V^2/R = (12)^2/60 = 144/60 = 2.4$ W.</strong>'},
{type:'mc',tag:'Scaling',text:'If the current through a resistor doubles while $R$ stays the same, by what factor does the power dissipated change?',opts:['$2\\times$','$4\\times$','$\\sqrt{2}\\times$','$1/2\\times$'],ans:1,expl:'<strong>$4\\times$.</strong> $P = i^2 R$. Doubling $i$ gives $P = (2i)^2 R = 4i^2 R = 4P$. Power is proportional to the square of current.'},
{type:'tf',text:'True or False: High-voltage power transmission lines waste less energy to resistive heating than equivalent low-voltage lines carrying the same power.',ans:true,expl:'<strong>True.</strong> For fixed power $P = iV$, higher $V$ means lower $i$. Since losses go as $i^2 R$, reducing $i$ dramatically reduces losses. This is the fundamental reason the electrical grid uses high-voltage AC transmission.'},
{type:'num',tag:'HW-style',text:'A 4 AWG copper wire has radius $r_\\text{wire} = 2.5$ mm and carries 40 A. If it has total resistance $R = 0.18\\ \\Omega$, what power is dissipated in Watts?',hint:'$P = I^2 R = (40)^2 \\times 0.18$',ans:288,tol:5,expl:'<strong>$P = (40)^2 \\times 0.18 = 1600 \\times 0.18 = 288$ W.</strong> This is the Joule heating in solenoid windings at 40 A, matching Problem 10c style.'}
,
{type:'num',tag:'HW5 Prep',text:'NYC subway model: a 600 V power station drives a motor through a shoe-rail contact ($R_{\\text{shoe}} = 5\\times10^{-4}\\ \\Omega$) and motor load ($R_L \\approx 0.4\\ \\Omega$) in series. What is the current $i$ delivered to the motor in Amperes?',hint:'Series circuit: $i = V/(R_{\\text{shoe}} + R_L) = 600 / (5\\times10^{-4} + 0.4)$.',ans:1498,tol:10,expl:'<strong>$R_{\\text{total}} = 5\\times10^{-4} + 0.4 = 0.4005\\ \\Omega$. $i = 600/0.4005 \\approx 1498$ A.</strong> The shoe-rail resistance is negligible compared to the motor load, so nearly all 600 V drops across the motor. This is HW5 Problem 3a.'},
{type:'num',tag:'HW5 Prep',text:'In the NYC subway circuit, with current $i \\approx 1498$ A and $R_{\\text{shoe}} = 5\\times10^{-4}\\ \\Omega$, what power (in Watts) is dissipated as heat in the shoe-rail contact?',hint:'$P = i^2 R_{\\text{shoe}}$.',ans:1124,tol:50,expl:'<strong>$P = (1498)^2 \\times 5\\times10^{-4} \\approx 2.244\\times10^6 \\times 5\\times10^{-4} \\approx 1122$ W $\\approx 1.1$ kW.</strong> Even with a very small resistance, the enormous current ($\\sim 1500$ A) causes over a kilowatt of heating in the shoe contact. This is HW5 Problem 3b.'}

]},

// ── SECTION 7 ── FINAL QUIZ ───────────────────────────────────────────────
{id:'s7',label:'7 · Final Quiz',content:`
<div class="eyebrow">Section 7 of 7</div>
<div class="sec-title">Comprehensive Review Quiz</div>
<div class="prose"><p>These questions span all of Unit 6 and mirror the style of your HW6 problems. Work through each one before revealing the answer.</p></div>
`,questions:[
{type:'mc',tag:'Definition',text:'A current $i(t) = 6t$ A flows through a wire. What is the total charge (in Coulombs) that passes through in $t = 0$ to $t = 3$ s?',opts:['9 C','18 C','27 C','54 C'],ans:2,expl:'<strong>$q = \\int_0^3 6t\\, dt = [3t^2]_0^3 = 3(9) = 27$ C.</strong>'},
{type:'tf',text:'True or False: The drift speed of electrons in a copper wire carrying 1 A is on the order of mm/s or faster.',ans:false,expl:'<strong>False.</strong> Typical drift speeds in copper are on the order of $10^{-4}$ to $10^{-5}$ m/s — fractions of a mm per second, not mm/s. The $\\vec{E}$-field signal propagates fast, but the electrons themselves drift very slowly.'},
{type:'num',tag:"Ohm's Law + R",text:'A cylindrical aluminum wire ($\\rho = 2.82\\times10^{-8}$ Ω·m) is 5 m long with radius 0.8 mm. A 9 V battery is connected across it. What current flows in Amperes?',hint:'First find $R = \\rho L/(\\pi r^2)$. Then $i = V/R$. $r = 8\\times10^{-4}$ m.',ans:128,tol:5,expl:'<strong>$A = \\pi(0.8\\times10^{-3})^2 = 2.011\\times10^{-6}$ m². $R = (2.82\\times10^{-8} \\times 5) / 2.011\\times10^{-6} \\approx 0.0701\\ \\Omega$. $i = 9 / 0.0701 \\approx 128$ A.</strong>'},
{type:'mc',tag:'Power',text:'A resistor dissipates 50 W when 10 V is applied. If the voltage is increased to 20 V, what is the new power?',opts:['100 W','150 W','200 W','400 W'],ans:2,expl:'<strong>200 W.</strong> $P = V^2/R$. Since $R$ is fixed, $P$ scales as $V^2$. Doubling $V$ multiplies $P$ by 4: $4 \\times 50 = 200$ W. Wait — that gives 200 W, option C.'},
{type:'tf',text:'True or False: For a metal conductor, increasing temperature increases resistance.',ans:true,expl:'<strong>True.</strong> Higher $T \\to$ more lattice vibration $\\to$ more electron scattering $\\to$ higher $\\rho \\to$ higher $R = \\rho L/A$. For metals, $\\alpha > 0$, so $R(T) = R_0[1 + \\alpha(T - T_0)]$ grows with temperature.'},
{type:'num',tag:'Drift + J',text:'A wire of radius 2.0 mm carries uniform current density $J = 5.0\\times10^5$ A/m². What is the total current $i$ in Amperes?',hint:'$i = J \\times A = J \\times \\pi r^2$',ans:6.28,tol:0.2,expl:'<strong>$A = \\pi(2\\times10^{-3})^2 = \\pi \\times 4\\times10^{-6} = 1.257\\times10^{-5}$ m². $i = 5\\times10^5 \\times 1.257\\times10^{-5} = 6.28$ A.</strong>'},
{type:'mc',tag:'Microscopic',text:'In a conductor, the $\\vec{E}$-field inside doubles while the resistivity remains constant. What happens to the current density $J$?',opts:['Halves','Stays the same','Doubles','Quadruples'],ans:2,expl:'<strong>Doubles.</strong> $J = \\sigma E = E/\\rho$. If $E$ doubles and $\\rho$ is constant, $J = E/\\rho$ doubles directly.'},
{type:'num',tag:'Energy',text:'A 120 V household circuit runs a 60 W bulb for 2 hours. How much energy is consumed in kilojoules?',hint:'$P = 60$ W. Energy $= P \\times t$. Convert $t = 2$ hrs to seconds. Answer in kJ.',ans:432,tol:5,expl:'<strong>$E = P \\times t = 60 \\times (2 \\times 3600) = 60 \\times 7200 = 432{,}000$ J $= 432$ kJ.</strong>'}
,
{type:'num',tag:'HW5 Prep',text:'A circuit has two batteries ($V_1 = 30$ V, $V_2 = 20$ V) and three resistors ($R_1 = R_2 = 10\\ \\Omega$, $R_3 = 5\\ \\Omega$). $R_1$ and $R_2$ are in parallel across the junction of the two batteries, and $R_3$ is in series with the outer loop. Using Kirchhoff\'s laws, find the main loop current $i$ in Amperes. (See HW5 P1: $i = (V_1 - V_2)/(R_3 + R_1 \\| R_2)$)',hint:'$R_1 \\| R_2 = 10\\times10/(10+10) = 5\\ \\Omega$. $R_{\\text{total}} = R_3 + 5 = 10\\ \\Omega$. $i = (V_1 - V_2)/R_{\\text{total}}$.',ans:1,tol:0.05,expl:'<strong>$R_1 \\| R_2 = 5\\ \\Omega$. Net EMF $= V_1 - V_2 = 30 - 20 = 10$ V. $R_{\\text{total}} = 5 + 5 = 10\\ \\Omega$. $i = 10/10 = 1.0$ A.</strong> This matches HW5 Problem 1a: two opposing EMFs drive a current determined by the net voltage and total resistance.'},
{type:'num',tag:'HW5 Prep',text:'An RC circuit has $r = 100\\ \\Omega$, $R = 10^3\\ \\Omega$, $C = 2\\ \\text{pF}$, and battery $V = 6$ V (HW5 P7). After the switch is closed for a long time, what charge $q_{\\infty}$ in pC is stored on the capacitor?',hint:'At $t \\to \\infty$ no current flows through $C$. So no current flows at all, meaning no voltage drop across resistors. $q_{\\infty} = C \\times V$. Use $C = 2\\times10^{-12}$ F.',ans:12,tol:0.5,expl:'<strong>After a long time, $i \\to 0$ and the capacitor charges to the full battery voltage: $q_{\\infty} = CV = (2\\times10^{-12})(6) = 12\\times10^{-12}$ C $= 12$ pC.</strong> This is HW5 P7b. The resistors only matter for the charging time constant $\\tau = (r + R)C = (1100)(2\\times10^{-12}) \\approx 2.2$ ns.'},
{type:'num',tag:'HW5 Prep',text:'For the same RC circuit (HW5 P7: $r = 100\\ \\Omega$, $R = 10^3\\ \\Omega$, $C = 2$ pF, $V = 6$ V), how long (in ns) does it take for the capacitor to reach 90% of its maximum charge after the switch is closed?',hint:'$q(t) = q_{\\infty}(1 - e^{-t/\\tau})$. Set $q = 0.9 q_{\\infty}$: $e^{-t/\\tau} = 0.1$, so $t = \\tau \\ln 10$. $\\tau = (r+R)C = (1100)(2\\times10^{-12})$ s.',ans:5.06,tol:0.3,expl:'<strong>$\\tau = (100 + 1000)(2\\times10^{-12}) = 1100 \\times 2\\times10^{-12} = 2.2\\times10^{-9}$ s $= 2.2$ ns. $t = \\tau\\ln(10) = 2.2\\times\\ln(10) \\approx 2.2\\times2.303 \\approx 5.07$ ns.</strong> This is HW5 P7d.'}

]}

];

// ── STATE ─────────────────────────────────────
let curIdx=0,score=0,done=[];
let qs=S.map(s=>s.questions.map(()=>({answered:false,correct:false,sel:null})));

// ── NAV ───────────────────────────────────────
function renderNav(){
  document.getElementById('snav').innerHTML=S.map((s,i)=>{
    let c='stab';
    if(i===curIdx)c+=' active';
    else if(done.includes(i))c+=' done';
    return `<button class="${c}" onclick="goTo(${i})">${s.label}</button>`;
  }).join('');
}
function updateProg(){document.getElementById('progFill').style.width=(done.length/S.length*100)+'%';}
function updateScore(){document.getElementById('scoreEl').textContent=score+' pts';}

function goTo(i){
  curIdx=i;renderNav();
  renderSection(S[i]);
  document.getElementById('scroll').scrollTop=0;
}

// ── RENDER SECTION ────────────────────────────
function renderSection(sec){
  const isLast=curIdx===S.length-1;
  let html=`<div style="animation:fu .3s ease">`;
  html+=sec.content;
  sec.questions.forEach((q,qi)=>{html+=buildQ(q,qi,curIdx);});
  if(!isLast){
    html+=`<button class="cont-btn" onclick="finishSec()">Continue to next section ▸</button>`;
  }else{
    html+=`<div id="finalBox" class="hidden">
      <div class="final-wrap">
        <div class="fring" id="fRing"><div class="finner"><div class="fnum" id="fNum">${score}</div><div class="fden">points</div></div></div>
        <div class="fmsg" id="fMsg"></div>
        <div class="fsub" id="fSub"></div>
        <button class="cont-btn" onclick="goTo(0)">Back to beginning</button>
        <button class="cont-btn sec" onclick="retakeQuiz()">Retake final quiz</button>
      </div>
    </div>`;
  }
  html+=`</div>`;
  document.getElementById('content').innerHTML=html;
  renderMath(document.getElementById('content'));
  initInteractives();
}

// ── BUILD QUESTION HTML ───────────────────────
function buildQ(q,qi,si){
  const st=qs[si][qi];
  const id=`q${si}_${qi}`;
  let inner='';

  if(q.type==='mc'){
    inner+=`<div class="qopts" id="${id}_opts">`;
    q.opts.forEach((o,oi)=>{
      let c='qopt';
      if(st.answered){
        if(oi===q.ans)c+=' correct';
        else if(st.sel===oi)c+=' wrong';
      }
      inner+=`<button class="${c}" ${st.answered?'disabled':`onclick="aMC(${si},${qi},${oi})"`}>${o}</button>`;
    });
    inner+=`</div>`;
  }else if(q.type==='tf'){
    let tc='qtfbtn',fc='qtfbtn';
    if(st.answered){
      if(q.ans===true){tc+=' correct';if(!st.correct)fc+=' wrong';}
      else{fc+=' correct';if(!st.correct)tc+=' wrong';}
    }
    inner+=`<div class="qtf">
      <button class="${tc}" id="${id}_T" ${st.answered?'disabled':`onclick="aTF(${si},${qi},true)"`}>True</button>
      <button class="${fc}" id="${id}_F" ${st.answered?'disabled':`onclick="aTF(${si},${qi},false)"`}>False</button>
    </div>`;
  }else{
    inner+=`<input class="qninput" type="number" id="${id}_i" inputmode="decimal" placeholder="Your answer…" ${st.answered?'disabled':''}>
    <div class="qhint">${q.hint}</div>
    <button class="qsubmit" id="${id}_s" ${st.answered?'disabled':`onclick="aNUM(${si},${qi})"`}>Check answer</button>`;
  }

  if(st.answered){
    inner+=`<div class="qresult ${st.correct?'ok':'no'}">${st.correct?'Correct! +10 pts':'Not quite — see explanation'}</div>
    <div class="qexpl show">${q.expl}</div>`;
  }else{
    inner+=`<div class="qresult hidden" id="${id}_r"></div>
    <div class="qexpl" id="${id}_e">${q.expl}</div>`;
  }

  return `<div class="qblock" id="${id}">
    <div class="qtag">${q.tag||q.type}</div>
    <div class="qtext">${q.text}</div>
    ${inner}
  </div>`;
}

// ── SHOW RESULT ───────────────────────────────
function showRes(si,qi,correct){
  const st=qs[si][qi];
  st.answered=true;st.correct=correct;
  const id=`q${si}_${qi}`;
  const r=document.getElementById(`${id}_r`);
  if(r){r.className=`qresult ${correct?'ok':'no'}`;r.textContent=correct?'Correct! +10 pts':'Not quite — see explanation';}
  const e=document.getElementById(`${id}_e`);
  if(e){e.classList.add('show');renderMath(e);}
  if(correct){score+=10;updateScore();}
  document.getElementById('scroll').scrollTop+=220;
  if(curIdx===S.length-1)checkFinal();
}

function aMC(si,qi,oi){
  const q=S[si].questions[qi];
  qs[si][qi].sel=oi;
  const opts=document.querySelectorAll(`#q${si}_${qi}_opts .qopt`);
  opts.forEach(o=>o.disabled=true);
  opts[oi].classList.add(oi===q.ans?'correct':'wrong');
  if(oi!==q.ans)opts[q.ans].classList.add('correct');
  showRes(si,qi,oi===q.ans);
}
function aTF(si,qi,val){
  const q=S[si].questions[qi];
  const ok=val===q.ans;
  const T=document.getElementById(`q${si}_${qi}_T`),F=document.getElementById(`q${si}_${qi}_F`);
  T.disabled=F.disabled=true;
  (val?T:F).classList.add(ok?'correct':'wrong');
  if(!ok)(q.ans?T:F).classList.add('correct');
  showRes(si,qi,ok);
}
function aNUM(si,qi){
  const q=S[si].questions[qi];
  const v=parseFloat(document.getElementById(`q${si}_${qi}_i`).value);
  const ok=!isNaN(v)&&Math.abs(v-q.ans)<=q.tol;
  document.getElementById(`q${si}_${qi}_s`).disabled=true;
  document.getElementById(`q${si}_${qi}_i`).disabled=true;
  showRes(si,qi,ok);
}

// ── SECTION DONE ──────────────────────────────
function finishSec(){
  if(!done.includes(curIdx))done.push(curIdx);
  updateProg();
  if(curIdx+1<S.length)goTo(curIdx+1);
}

function checkFinal(){
  const lastQ=qs[S.length-1];
  if(!lastQ.every(s=>s.answered))return;
  if(!done.includes(S.length-1))done.push(S.length-1);
  updateProg();
  const total=S.reduce((a,s)=>a+s.questions.length,0);
  const pct=Math.min(100,Math.round(score/(total*10)*100));
  document.getElementById('fNum').textContent=score;
  document.getElementById('fMsg').textContent=pct>=80?'Outstanding!':pct>=60?'Solid work!':'Keep reviewing!';
  document.getElementById('fSub').textContent=pct>=80?"You're ready for HW6.":'Go back through sections, then retry.';
  document.getElementById('fRing').style.background=`conic-gradient(var(--accent) ${pct}%,var(--border2) 0%)`;
  document.getElementById('finalBox').classList.remove('hidden');
  document.getElementById('scroll').scrollTop=99999;
}

function retakeQuiz(){
  qs[S.length-1]=S[S.length-1].questions.map(()=>({answered:false,correct:false,sel:null}));
  done=done.filter(i=>i!==S.length-1);
  goTo(S.length-1);
}

// ── INTERACTIVES ──────────────────────────────
// Drift speed animation
let driftAnimId=null;
let driftParticles=[];

function initDriftCanvas(){
  const canvas=document.getElementById('driftCanvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;

  // init particles
  driftParticles=[];
  for(let i=0;i<18;i++){
    driftParticles.push({x:Math.random()*W,y:12+Math.random()*(H-24),vx:0});
  }

  function updateDrift(){
    const iVal=parseFloat(document.getElementById('driftI').value)*1e-3;
    const rVal=parseFloat(document.getElementById('driftR').value)*1e-6;
    const n=8.5e28,e=1.6e-19;
    const A=Math.PI*rVal*rVal;
    const vd=iVal/(n*e*A);
    document.getElementById('driftI_lbl').textContent=Math.round(iVal*1e3);
    document.getElementById('driftR_lbl').textContent=Math.round(rVal*1e6);
    document.getElementById('driftOut').textContent=
      `v_d = ${vd.toExponential(2)} m/s  (${(vd*3.6e6).toFixed(2)} mm/hr)   |   J = ${(iVal/A).toExponential(2)} A/m²`;

    // animate: scale visual speed for visibility
    const visualSpeed=Math.max(0.3,Math.log10(vd+1e-8)*12+100)*0.08;
    ctx.clearRect(0,0,W,H);

    // wire body
    ctx.fillStyle='#131820';
    ctx.fillRect(0,8,W,H-16);
    ctx.strokeStyle='#252840';
    ctx.lineWidth=1;
    ctx.strokeRect(0,8,W,H-16);

    // E-field arrow
    ctx.strokeStyle='#fb7185';
    ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(10,H/2);ctx.lineTo(40,H/2);ctx.stroke();
    ctx.fillStyle='#fb7185';
    ctx.beginPath();ctx.moveTo(40,H/2);ctx.lineTo(34,H/2-3);ctx.lineTo(34,H/2+3);ctx.closePath();ctx.fill();
    ctx.fillStyle='#fb7185';ctx.font='9px monospace';ctx.fillText('E',44,H/2+4);

    // particles (electrons drifting LEFT — opposite to conventional current)
    driftParticles.forEach(p=>{
      p.x-=visualSpeed;
      if(p.x<-5)p.x=W+5;
      ctx.beginPath();
      ctx.arc(p.x,p.y,4,0,Math.PI*2);
      ctx.fillStyle='#6ee7b7';
      ctx.fill();
      ctx.fillStyle='#0c1015';
      ctx.font='bold 7px monospace';
      ctx.fillText('e',p.x-3,p.y+3);
    });

    // conventional current arrow (right)
    ctx.strokeStyle='#7ab3ff';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(W-60,H/2);ctx.lineTo(W-20,H/2);ctx.stroke();
    ctx.fillStyle='#7ab3ff';
    ctx.beginPath();ctx.moveTo(W-20,H/2);ctx.lineTo(W-26,H/2-3);ctx.lineTo(W-26,H/2+3);ctx.closePath();ctx.fill();
    ctx.fillStyle='#7ab3ff';ctx.font='9px monospace';ctx.fillText('i',W-16,H/2+4);

    driftAnimId=requestAnimationFrame(updateDrift);
  }

  if(driftAnimId)cancelAnimationFrame(driftAnimId);
  updateDrift();

  document.getElementById('driftI').addEventListener('input',()=>{});
  document.getElementById('driftR').addEventListener('input',()=>{});
}

// Resistance calculator
function initResCalc(){
  const sliders=['resL','resRad'];
  sliders.forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    el.addEventListener('input',updateRes);
  });
  const mat=document.getElementById('resMat');
  if(mat)mat.addEventListener('change',updateRes);
  updateRes();
}

function updateRes(){
  const Lel=document.getElementById('resL');
  const Rel=document.getElementById('resRad');
  const Mel=document.getElementById('resMat');
  if(!Lel||!Rel||!Mel)return;
  const L=parseFloat(Lel.value)/100;
  const r=parseFloat(Rel.value)/10000;
  const rho=parseFloat(Mel.value);
  document.getElementById('resL_lbl').textContent=(L).toFixed(1);
  document.getElementById('resRad_lbl').textContent=(r*1000).toFixed(1);
  const A=Math.PI*r*r;
  const R=rho*L/A;
  let Rstr=R<0.001?`${(R*1e6).toFixed(2)} μΩ`:R<1?`${(R*1000).toFixed(3)} mΩ`:R<1000?`${R.toFixed(4)} Ω`:`${(R/1000).toFixed(3)} kΩ`;
  document.getElementById('resOut').textContent=
    `R = ${Rstr}   |   A = ${(A*1e6).toFixed(3)} mm²   |   ρ = ${rho} Ω·m`;
}

// Temperature canvas
function initTempCanvas(){
  const canvas=document.getElementById('tempCanvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;

  function drawTemp(){
    const T=parseFloat(document.getElementById('tempT').value);
    const matStr=document.getElementById('tempMat').value;
    const [rho0s,alphas]=matStr.split(',');
    const rho0=parseFloat(rho0s);
    const alpha=parseFloat(alphas);
    const T0=293;
    const rho=rho0*(1+alpha*(T-T0));
    document.getElementById('tempT_lbl').textContent=Math.round(T);
    document.getElementById('tempOut').textContent=
      `ρ(${Math.round(T)} K) = ${rho.toExponential(3)} Ω·m   [ρ₀ = ${rho0.toExponential(3)} Ω·m,  α = ${(alpha*1000).toFixed(1)}×10⁻³ K⁻¹]`;

    ctx.clearRect(0,0,W,H);

    // plot region
    const px=30,py=10,pw=W-40,ph=H-25;
    ctx.fillStyle='#0c1015';
    ctx.fillRect(px,py,pw,ph);

    // axes
    ctx.strokeStyle='#252840';ctx.lineWidth=1;
    ctx.strokeRect(px,py,pw,ph);

    // draw curve for T from 77 to 600
    const Tmin=77,Tmax=600;
    const rhoMin=rho0*(1+alpha*(Tmin-T0));
    const rhoMax=rho0*(1+alpha*(Tmax-T0));
    const rhoRange=rhoMax-rhoMin;

    ctx.beginPath();
    for(let ix=0;ix<=pw;ix++){
      const Tx=Tmin+(Tmax-Tmin)*ix/pw;
      const rhox=rho0*(1+alpha*(Tx-T0));
      const fx=px+ix;
      const fy=py+ph-(rhox-rhoMin)/rhoRange*ph;
      ix===0?ctx.moveTo(fx,fy):ctx.lineTo(fx,fy);
    }
    ctx.strokeStyle='#6ee7b7';ctx.lineWidth=2;ctx.stroke();

    // current T marker
    const Tfrac=(T-Tmin)/(Tmax-Tmin);
    const markerX=px+Tfrac*pw;
    const markerY=py+ph-(rho-rhoMin)/rhoRange*ph;
    ctx.beginPath();ctx.arc(markerX,markerY,5,0,Math.PI*2);
    ctx.fillStyle='#fbbf24';ctx.fill();

    // vertical dashed
    ctx.setLineDash([3,3]);
    ctx.strokeStyle='#fbbf24';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(markerX,py+ph);ctx.lineTo(markerX,markerY);ctx.stroke();
    ctx.setLineDash([]);

    // axis labels
    ctx.fillStyle='#4a5168';ctx.font='9px monospace';
    ctx.fillText('77K',px+2,py+ph+12);
    ctx.fillText('600K',px+pw-24,py+ph+12);
    ctx.fillText('ρ',px-16,py+ph/2);
    ctx.fillText('T',px+pw/2,py+ph+12);
  }

  drawTemp();
  document.getElementById('tempT').addEventListener('input',drawTemp);
  document.getElementById('tempMat').addEventListener('change',drawTemp);
}

// Power canvas
let powerAnimId=null;
function initPowerCanvas(){
  const canvas=document.getElementById('powerCanvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;

  let heat=0;

  function drawPower(){
    const V=parseFloat(document.getElementById('pwrV').value);
    const R=parseFloat(document.getElementById('pwrR').value);
    document.getElementById('pwrV_lbl').textContent=V;
    document.getElementById('pwrR_lbl').textContent=R;
    const i=V/R;
    const P=i*i*R;
    document.getElementById('pwrOut').textContent=
      `i = ${i.toFixed(3)} A   |   P = i²R = ${P.toFixed(2)} W   |   P = V²/R = ${(V*V/R).toFixed(2)} W`;

    ctx.clearRect(0,0,W,H);

    // draw resistor glowing
    const maxP=500;
    const intensity=Math.min(1,P/maxP);

    // background gradient glow
    const gx=ctx.createRadialGradient(W/2,H/2,5,W/2,H/2,60);
    gx.addColorStop(0,`rgba(251,191,36,${intensity*0.4})`);
    gx.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gx;
    ctx.fillRect(0,0,W,H);

    // wire left
    ctx.strokeStyle='#4a5168';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(10,H/2);ctx.lineTo(W/2-40,H/2);ctx.stroke();

    // resistor zigzag
    const zx=W/2-40,zy=H/2;
    const zr=`rgba(${Math.round(160+intensity*95)},${Math.round(100-intensity*70)},${Math.round(30-intensity*10)},1)`;
    ctx.strokeStyle=zr;ctx.lineWidth=2.5;
    ctx.beginPath();
    ctx.moveTo(zx,zy);
    const zpts=[[zx+8,zy-12],[zx+16,zy+12],[zx+24,zy-12],[zx+32,zy+12],[zx+40,zy-12],[zx+48,zy+12],[zx+56,zy-12],[zx+64,zy]];
    zpts.forEach(([x,y])=>ctx.lineTo(x,y));
    ctx.stroke();

    // wire right
    ctx.strokeStyle='#4a5168';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(zx+64,H/2);ctx.lineTo(W-10,H/2);ctx.stroke();

    // heat particles
    heat+=P*0.01;
    const numParticles=Math.min(20,Math.floor(P/10));
    ctx.fillStyle=`rgba(251,191,36,${0.3+intensity*0.5})`;
    for(let k=0;k<numParticles;k++){
      const px=zx+Math.random()*64;
      const py=H/2+(-20-Math.random()*30);
      const rad=1+Math.random()*3*intensity;
      ctx.beginPath();ctx.arc(px,py,rad,0,Math.PI*2);ctx.fill();
    }

    // V label
    ctx.fillStyle='#6ee7b7';ctx.font='bold 11px monospace';
    ctx.fillText(`${V}V`,14,H/2-8);
    // R label
    ctx.fillStyle=zr;ctx.font='bold 10px monospace';
    ctx.fillText(`${R}Ω`,W/2-12,H/2+28);
    // P label
    ctx.fillStyle='#fbbf24';ctx.font='bold 12px monospace';
    ctx.fillText(`${P.toFixed(1)}W`,W-58,H/2-8);

    powerAnimId=requestAnimationFrame(drawPower);
  }

  if(powerAnimId)cancelAnimationFrame(powerAnimId);
  drawPower();
  document.getElementById('pwrV').addEventListener('input',()=>{});
  document.getElementById('pwrR').addEventListener('input',()=>{});
}

function initInteractives(){
  // cancel any running animations
  if(driftAnimId){cancelAnimationFrame(driftAnimId);driftAnimId=null;}
  if(powerAnimId){cancelAnimationFrame(powerAnimId);powerAnimId=null;}

  setTimeout(()=>{
    initDriftCanvas();
    initResCalc();
    initTempCanvas();
    initPowerCanvas();
  },50);
}

// ── INIT ──────────────────────────────────────
renderNav();renderSection(S[0]);updateProg();
</script>
