<title>E&amp;M Mind Map · Units 5–8</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;600;700&display=swap');

:root {
  --bg:      #09090f;
  --surf:    #0f1018;
  --card:    #13151e;
  --border:  #1e2130;
  --border2: #252840;
  --text:    #e8ecf4;
  --text2:   #9aa3b8;
  --muted:   #4a5168;

  /* layer colors */
  --c-fund:    #7c3aed;  /* deep purple  — fundamental */
  --c-fund-bg: #1e1030;
  --c-elec:    #f97316;  /* warm orange  — electric field */
  --c-elec-bg: #2a1208;
  --c-mag:     #3b82f6;  /* cool blue    — magnetic field */
  --c-mag-bg:  #0c1e38;
  --c-law:     #14b8a6;  /* teal         — integral laws */
  --c-law-bg:  #0a2420;
  --c-pot:     #a3e635;  /* yellow-green — potential/flux */
  --c-pot-bg:  #151f08;
  --c-app:     #fb7185;  /* coral        — applications */
  --c-app-bg:  #2a0f14;
  --c-ckt:     #94a3b8;  /* slate        — circuit elements */
  --c-ckt-bg:  #141820;
  --c-max:     #fbbf24;  /* gold         — Maxwell */
  --c-max-bg:  #1a1408;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  overflow: hidden;
  -webkit-overflow-scrolling: touch;
}

/* ── HEADER ── */
#hdr {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; gap: 12px;
  padding: 8px 18px;
  background: rgba(9,9,15,0.92);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
#hdr-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 600;
  color: #000; background: var(--c-max);
  padding: 3px 8px; border-radius: 4px;
  flex-shrink: 0;
}
#hdr-title { font-size: 13px; font-weight: 700; flex-shrink: 0; }
#hdr-sub {
  font-size: 10px; color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  flex-shrink: 0;
}
#hdr-hint {
  margin-left: auto;
  font-size: 10px; color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  white-space: nowrap;
}
#reset-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 600;
  color: var(--muted); background: transparent;
  border: 1px solid var(--border2);
  padding: 4px 10px; border-radius: 5px;
  cursor: pointer; transition: all .15s;
  flex-shrink: 0;
  /* iOS tap highlight removal */
  -webkit-tap-highlight-color: transparent;
}
#reset-btn:hover { color: var(--text); border-color: var(--text2); }

/* ── LEGEND ── */
#legend {
  position: fixed; bottom: 14px; left: 18px; z-index: 100;
  display: flex; flex-wrap: wrap; gap: 6px;
  max-width: 420px;
}
.leg-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; color: var(--text2);
  font-family: 'JetBrains Mono', monospace;
}
.leg-dot {
  width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0;
}

/* ── MAP CONTAINER ── */
#map-wrap {
  position: fixed; top: 40px; left: 0; right: 0; bottom: 0;
  overflow: hidden;
  cursor: grab;
  /* Disable browser touch handling so we control pan/zoom ourselves */
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}
#map-wrap.dragging { cursor: grabbing; }

#map-stage {
  position: absolute;
  transform-origin: 0 0;
  will-change: transform;
}

/* ── SVG ── */
#map-svg {
  position: absolute; top: 0; left: 0;
  pointer-events: none;
  overflow: visible;
}
/* make SVG paths on edges clickable */
#map-svg path.edge-path {
  pointer-events: stroke;
  cursor: pointer;
  stroke-width: 8px;       /* fat invisible hit area */
  stroke-opacity: 0;       /* invisible but clickable */
  fill: none;
}
#map-svg path.edge-path-vis {
  pointer-events: none;
}

/* ── NODE ── */
.node {
  position: absolute;
  border-radius: 10px;
  border: 1.5px solid;
  padding: 7px 13px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  transition: transform .15s, box-shadow .15s;
  text-align: center;
  min-width: 110px;
  /* iOS tap highlight */
  -webkit-tap-highlight-color: transparent;
}
.node:hover {
  transform: scale(1.06);
  z-index: 10;
}
.node.active {
  transform: scale(1.08);
  z-index: 20;
  box-shadow: 0 0 0 3px rgba(255,255,255,.2), 0 0 20px rgba(255,255,255,.08);
}
.node-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 600;
  line-height: 1.3;
}
.node-sub {
  font-size: 10px; font-weight: 400;
  color: rgba(232,236,244,.7);
  margin-top: 3px;
  font-family: 'JetBrains Mono', monospace;
  line-height: 1.5;
}
.node-layer {
  font-size: 8px;
  margin-top: 3px;
  opacity: .4;
  font-family: 'JetBrains Mono', monospace;
  text-transform: uppercase;
  letter-spacing: .08em;
}

/* ── EDGE LABEL ── */
.edge-label {
  position: absolute;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: #1a1f30;
  background: rgba(235, 240, 255, 0.96);
  border: 1px solid #b0bacc;
  /* Min 44px touch target height for iOS */
  padding: 11px 10px;
  border-radius: 5px;
  cursor: pointer;
  white-space: nowrap;
  transform: translate(-50%, -50%);
  z-index: 5;
  line-height: 1.5;
  box-shadow: 0 1px 4px rgba(0,0,0,0.45);
  transition: background .12s, box-shadow .12s;
  -webkit-tap-highlight-color: transparent;
}
.edge-label:hover {
  background: rgba(255,255,255,1);
  box-shadow: 0 2px 8px rgba(0,0,0,0.6);
}
.edge-label.active-edge {
  background: #fff;
  box-shadow: 0 0 0 2px #7c3aed, 0 2px 8px rgba(0,0,0,0.5);
}

/* ── TOOLTIP PANEL ── */
#tooltip-panel {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 200;
  background: rgba(13,15,24,0.97);
  border-top: 1px solid var(--border2);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  transform: translateY(100%);
  transition: transform .28s cubic-bezier(.4,0,.2,1);
  max-height: 42vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px 24px 24px;
  /* iOS safe area — home bar clearance */
  padding-bottom: calc(24px + env(safe-area-inset-bottom));
}
#tooltip-panel.open { transform: translateY(0); }

#tp-close {
  position: absolute; top: 12px; right: 16px;
  background: none; border: 1px solid var(--border2);
  color: var(--text2); border-radius: 5px;
  /* Ensure at least 44px tap target */
  width: 44px; height: 44px; cursor: pointer;
  font-size: 18px; display: flex; align-items: center; justify-content: center;
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
#tp-close:hover { color: var(--text); border-color: var(--text2); }

#tp-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 600;
  padding: 3px 8px; border-radius: 4px;
  display: inline-block; margin-bottom: 8px;
  letter-spacing: .08em; text-transform: uppercase;
}
#tp-title {
  font-size: 18px; font-weight: 700;
  margin-bottom: 12px;
  padding-right: 52px; /* avoid overlap with close btn */
}
#tp-body {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.tp-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
}
.tp-section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px; font-weight: 600;
  color: var(--muted);
  text-transform: uppercase; letter-spacing: .1em;
  margin-bottom: 6px;
}
.tp-section p, .tp-section li {
  font-size: 13px; color: var(--text2);
  line-height: 1.7;
}
.tp-section ul { padding-left: 16px; }
.tp-eq {
  font-size: 14px; color: var(--text);
  margin: 4px 0; line-height: 1.9;
}
.tp-dim {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--muted);
  margin-top: 4px;
}
/* MathJax sizing override */
mjx-container { font-size: 1em !important; }

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── MOBILE OVERRIDES (< 768px) ── */
@media (max-width: 767px) {
  /* Header: hide sub and hint on very small screens to save space */
  #hdr-sub  { display: none; }
  #hdr-hint { display: none; }

  /* Legend: smaller and tighter */
  #legend {
    bottom: 8px; left: 10px;
    max-width: calc(100vw - 20px);
    gap: 4px;
  }
  .leg-item { font-size: 9px; }

  /* Panel: full bottom sheet, 50vh max */
  #tooltip-panel {
    max-height: 50vh;
    padding: 14px 16px calc(16px + env(safe-area-inset-bottom));
  }
  #tp-title {
    font-size: 15px;
    padding-right: 52px;
  }
  /* Stack panel sections single column */
  #tp-body {
    grid-template-columns: 1fr;
  }
  .tp-section p, .tp-section li {
    font-size: 14px;
  }
  .tp-eq { font-size: 13px; }

  /* Nodes: text must stay readable, min 11px */
  .node-label { font-size: 11px; }
  .node-sub   { font-size: 10px; }

  /* Edge labels already have 44px height from padding above */
}

@media (max-width: 600px) {
  #tp-body { grid-template-columns: 1fr; }
}
</style>
</head>

<!-- HEADER -->
<div id="hdr">
  <span id="hdr-badge">E&amp;M</span>

<!-- TOOLTIP PANEL -->

  <button id="tp-close" onclick="closeTooltip()">&#x2715;</button>

  <div id="tp-body"></div>
</div>

<script>
/* =========================================================
   NODE DEFINITIONS
   Each node: id, label, sub (LaTeX ok with $...$), layer, color, x, y
   ========================================================= */
const NODES = [
  /* ── L0 Fundamental ── */
  { id:'q',
    label:'Charge q',
    sub:'source of everything',
    layer:'L0 · Fundamental',
    color:'fund',
    x: 620, y: 30,
    tip: {
      tag:'Fundamental',
      title:'Electric Charge q',
      equations:['$q$: integer multiples of $e = 1.6\\times10^{-19}$ C','Coulomb: $\\vec{F} = k\\,\\dfrac{q_1 q_2}{r^2}\\hat{r}$','Superposition: $\\vec{F}_{\\text{net}} = \\sum_i \\vec{F}_i$'],
      intuition:`<p><strong>What it means:</strong> Charge is the fundamental property of matter that makes it interact with electromagnetic fields. Positive charges repel each other and attract negative charges. The force between two charges follows an inverse-square law — double the distance, quarter the force. Charge is conserved (you can't create or destroy net charge) and quantized (it comes in discrete packets of $e = 1.6\\times10^{-19}$ C).</p>
<p><strong>Calculus:</strong> Coulomb's law is an algebraic force law, but superposition turns it into a sum (or integral for continuous distributions): $\\vec{F}_{\\text{net}} = \\int k\\,\\frac{dq}{r^2}\\hat{r}$. When you integrate charge density $\\rho$ over a volume to get total charge $q = \\int \\rho\\,dV$, that's a volume integral — you're adding up infinitesimal charge contributions from every point in space.</p>
<p><strong>Global structure:</strong> Charge is the root node of the entire map — every other concept (E, B, V, C, L, Maxwell's equations) ultimately traces back to charge as its source. The electric field is defined as force per unit test charge, and moving charge is the source of the magnetic field.</p>
<p><strong>Gotcha:</strong> The superposition principle only holds in linear media — in nonlinear dielectrics the fields from multiple charges don't simply add. Also, Coulomb's law as written assumes point charges in vacuum; near a conductor the induced charges on the conductor surface change the field distribution entirely.</p>`,
      dims:'[C] = Coulombs. Quantized: q = ne, n ∈ ℤ'
    }
  },

  /* ── L1 Fields ── */
  { id:'E',
    label:'Electric Field E',
    sub:'$\\vec{F}/q_0$, force per charge',
    layer:'L1 · Fields',
    color:'elec',
    x: 350, y: 155,
    tip: {
      tag:'Electric Field',
      title:'Electric Field $\\vec{E}$',
      equations:['$\\vec{E} = \\dfrac{\\vec{F}}{q_0} = k\\dfrac{q}{r^2}\\hat{r}$','$\\vec{E} = -\\nabla V$ &nbsp; (E is neg. gradient of V)','Units: N/C = V/m'],
      intuition:`<p><strong>What it means:</strong> The electric field $\\vec{E}$ at a point is the force per unit positive test charge placed there. It exists in space even if no test charge is present — it's a property of the space itself due to source charges. Field lines point from positive to negative charges, and their density (how close together they are) represents the field strength. A positive charge placed in the field accelerates in the direction of $\\vec{E}$; a negative charge accelerates opposite to it.</p>
<p><strong>Calculus:</strong> Two key calculus operations define $\\vec{E}$. First, $\\vec{E} = k\\int \\frac{dq}{r^2}\\hat{r}$ is a vector line/surface/volume integral — superposing contributions from distributed charge. Second, $\\vec{E} = -\\nabla V$ is the gradient operation: you differentiate the scalar potential field $V(x,y,z)$ with respect to each coordinate to get the vector field $\\vec{E}$. The gradient points in the direction of steepest increase of $V$; the minus sign means $\\vec{E}$ points in the direction of steepest decrease.</p>
<p><strong>Global structure:</strong> $\\vec{E}$ sits at the center of the electric half of the map — it is produced by charge $q$ (via Coulomb), constrained by Gauss's law, related to $V$ by integration/differentiation, drives current $\\vec{J} = \\sigma\\vec{E}$, stores energy $u_E = \\frac{1}{2}\\varepsilon_0 E^2$, and appears in Maxwell's equations III and IV. Understanding $\\vec{E}$ is the prerequisite for every other electric concept.</p>
<p><strong>Gotcha:</strong> $\\vec{E}$ is a vector field — at every point in space it has both a magnitude and a direction. Don't confuse the field with the force: $\\vec{F} = q\\vec{E}$, so the actual force on a charge depends on the sign and magnitude of $q$. A negative charge accelerates opposite to $\\vec{E}$.</p>`,
      dims:'[N/C] = [V/m]'
    }
  },
  { id:'B',
    label:'Magnetic Field B',
    sub:'$q\\vec{v}\\times\\vec{B}$, from currents',
    layer:'L1 · Fields',
    color:'mag',
    x: 900, y: 155,
    tip: {
      tag:'Magnetic Field',
      title:'Magnetic Field $\\vec{B}$',
      equations:['$\\vec{F}_B = q\\vec{v}\\times\\vec{B}$','$\\vec{F} = i\\vec{L}\\times\\vec{B}$ (on wire)','No magnetic monopoles: $\\oint \\vec{B}\\cdot d\\vec{A} = 0$'],
      intuition:`<p><strong>What it means:</strong> The magnetic field $\\vec{B}$ arises from moving charges (currents) and exerts forces on other moving charges. The Lorentz force $\\vec{F} = q\\vec{v}\\times\\vec{B}$ is always perpendicular to the velocity, so a magnetic field never does work on a charge — it can only redirect, never speed up or slow down a particle. Field lines are closed loops (no magnetic monopoles), circling around currents by the right-hand rule.</p>
<p><strong>Calculus:</strong> The cross product $\\vec{v}\\times\\vec{B}$ is the key operation — it produces a force perpendicular to both the velocity and the field. For distributed currents, $\\vec{B}$ is found by a vector line integral via Biot-Savart: $\\vec{B} = \\frac{\\mu_0 i}{4\\pi}\\int \\frac{d\\vec{s}\\times\\hat{r}}{r^2}$. The flux $\\Phi_B = \\int\\vec{B}\\cdot d\\vec{A}$ is a surface integral — you're dotting $\\vec{B}$ with the area element and summing over the surface.</p>
<p><strong>Global structure:</strong> $\\vec{B}$ is the magnetic mirror of $\\vec{E}$. It is sourced by currents (Biot-Savart, Ampere's law), its flux $\\Phi_B$ is what Faraday's law differentiates to produce EMF, and it appears in Maxwell equations II, III, and IV. The coupling between $\\vec{E}$ and $\\vec{B}$ through Maxwell III and IV is what allows electromagnetic waves.</p>
<p><strong>Gotcha:</strong> $\\vec{B}$ does no work — ever. If a charged particle speeds up in a magnetic field scenario, there must be an electric field involved (e.g., from a changing $\\vec{B}$). Also, the direction of $\\vec{B}$ from a long wire uses the right-hand rule: thumb along current, fingers curl in direction of $\\vec{B}$.</p>`,
      dims:'[T] = [N/(A·m)] = kg/(A·s²)'
    }
  },

  /* ── L2 Integral Laws ── */
  { id:'gauss',
    label:"Gauss's Law",
    sub:'$\\Phi_E = q_{\\text{enc}}/\\varepsilon_0$',
    layer:'L2 · Integral Laws',
    color:'law',
    x: 200, y: 300,
    tip: {
      tag:"Gauss's Law",
      title:"Gauss's Law for E",
      equations:['$\\oint \\vec{E}\\cdot d\\vec{A} = \\dfrac{q_{\\text{enc}}}{\\varepsilon_0}$','$\\Phi_E = \\oint \\vec{E}\\cdot d\\vec{A}$','Choose Gaussian surface with symmetry: sphere, cylinder, pillbox'],
      intuition:`<p><strong>What it means:</strong> The total electric flux through any closed surface — the net number of $\\vec{E}$ field lines passing outward through that surface — equals the total charge enclosed divided by $\\varepsilon_0$. Positive enclosed charge is a source (field lines flow out); negative enclosed charge is a sink (field lines flow in). The shape of the Gaussian surface doesn't matter — only the enclosed charge does.</p>
<p><strong>Calculus:</strong> This is a closed surface integral — you're integrating the component of $\\vec{E}$ perpendicular to the surface ($\\vec{E}\\cdot d\\vec{A} = E\\cos\\theta\\,dA$) over an entire closed surface. The power of Gauss's law is that by choosing a surface that matches the symmetry of the charge distribution (sphere for a point charge, cylinder for a line charge, pillbox for a sheet), the integrand becomes constant and the integral reduces to $E\\cdot A_{\\text{eff}}$. This turns a full 2D surface integral into simple algebra.</p>
<p><strong>Global structure:</strong> Gauss's law is Maxwell's first equation and the electric analog of the statement "sources create flux." It's the fastest route to $\\vec{E}$ for symmetric geometries (replacing the need for Coulomb superposition integrals), and it's the first step in computing $C = Q/V$ for capacitors. In differential form $\\nabla\\cdot\\vec{E} = \\rho/\\varepsilon_0$ it says the divergence of $\\vec{E}$ equals charge density.</p>
<p><strong>Gotcha:</strong> Gauss's law is always true, but it's only useful as a computational tool when the charge distribution has enough symmetry that $\\vec{E}$ is constant in magnitude and direction relative to your chosen surface. For a randomly shaped charge distribution, the integral is just as hard as Coulomb's law.</p>`,
      dims:'Flux Φ_E: [N·m²/C] = [V·m]'
    }
  },
  { id:'ampere',
    label:"Ampère's Law",
    sub:'$\\oint \\vec{B}\\cdot d\\vec{s} = \\mu_0 i_{\\text{enc}}$',
    layer:'L2 · Integral Laws',
    color:'law',
    x: 870, y: 300,
    tip: {
      tag:"Ampère's Law",
      title:"Ampère's Law",
      equations:['$\\oint_C \\vec{B}\\cdot d\\vec{s} = \\mu_0\\,i_{\\text{enc}}$','Infinite wire: $B = \\dfrac{\\mu_0 i}{2\\pi r}$','Solenoid: $B = \\mu_0 n i$ (inside)'],
      intuition:`<p><strong>What it means:</strong> The line integral of $\\vec{B}$ around any closed loop equals $\\mu_0$ times the current threading through the surface bounded by that loop. Currents create circulating $\\vec{B}$ fields — the more current enclosed, the stronger the circulation. This is the magnetic mirror of Gauss's law: Gauss relates the surface integral of $\\vec{E}$ to enclosed charge; Ampere relates the line integral of $\\vec{B}$ to enclosed current.</p>
<p><strong>Calculus:</strong> This is a closed line integral (circulation) — you're computing $\\oint \\vec{B}\\cdot d\\vec{s}$, dotting $\\vec{B}$ with the path element $d\\vec{s}$ as you traverse a closed loop. With symmetry (circular loop around a long wire), $\\vec{B}$ is tangent to the loop and constant in magnitude, so the integral becomes $B\\cdot(2\\pi r)$. The current $i_{\\text{enc}}$ is obtained by integrating $\\vec{J}$ over the area bounded by the loop.</p>
<p><strong>Global structure:</strong> Ampere's law (before Maxwell's correction) gives $\\vec{B}$ from steady currents when symmetry permits. Maxwell completed it by adding the displacement current term, making it Maxwell's fourth equation and the key to electromagnetic wave propagation. It's the workhorse for finding $\\vec{B}$ in solenoids, toroids, and around long wires.</p>
<p><strong>Gotcha:</strong> The Amperian loop is a mathematical construct — you choose it; it doesn't have to correspond to a physical object. The key is to choose a loop where $\\vec{B}$ is either parallel to $d\\vec{s}$ (contributing $B\\,ds$) or perpendicular to it (contributing zero). A common error is confusing the loop (1D path) with the surface bounded by the loop (2D, through which current flows).</p>`,
      dims:'μ₀ = 4π×10⁻⁷ T·m/A'
    }
  },
  { id:'biot',
    label:'Biot-Savart',
    sub:'$d\\vec{B}$ from $id\\vec{s}$',
    layer:'L2 · Integral Laws',
    color:'law',
    x: 1100, y: 300,
    tip: {
      tag:'Biot-Savart Law',
      title:'Biot-Savart Law',
      equations:['$d\\vec{B} = \\dfrac{\\mu_0 i}{4\\pi}\\dfrac{d\\vec{s}\\times\\hat{r}}{r^2}$','$\\vec{B} = \\int d\\vec{B}$ (superposition)','Wire at distance R: $B = \\dfrac{\\mu_0 i}{2\\pi R}$'],
      intuition:`<p><strong>What it means:</strong> Every infinitesimal current-carrying wire segment $id\\vec{s}$ contributes a tiny magnetic field $d\\vec{B}$ at the field point, proportional to the current and the length of the segment, falling off as $1/r^2$ with distance, and pointing perpendicular to both the segment direction and the displacement vector $\\hat{r}$. To find the total $\\vec{B}$ from a finite wire or loop, you integrate (superpose) all $d\\vec{B}$ contributions along the wire.</p>
<p><strong>Calculus:</strong> The cross product $d\\vec{s}\\times\\hat{r}$ is the key operation — it automatically gives the correct direction perpendicular to the wire and the line from wire to field point. The full calculation is a vector line integral: $\\vec{B} = \\frac{\\mu_0 i}{4\\pi}\\int\\frac{d\\vec{s}\\times\\hat{r}}{r^2}$. Each component ($B_x$, $B_y$, $B_z$) must be integrated separately. The $1/r^2$ dependence is the same as Coulomb's law — Biot-Savart is structurally the magnetic analog of Coulomb's law.</p>
<p><strong>Global structure:</strong> Biot-Savart is used when Ampere's law cannot exploit symmetry — for finite wires, curved segments, or current loops. It's more general but more computationally demanding. For a circular loop of radius $R$, it gives $B = \\mu_0 i/(2R)$ at the center — a result that Ampere's law cannot easily produce.</p>
<p><strong>Gotcha:</strong> The cross product $d\\vec{s}\\times\\hat{r}$ requires careful geometry — $\\hat{r}$ points from the source element to the field point, not the other way. Always draw a diagram and verify the direction with the right-hand rule. Also, symmetry arguments that eliminate components of $d\\vec{B}$ (e.g., opposite segments on a loop cancel the radial components) are essential to making the integral tractable.</p>`,
      dims:'μ₀/4π = 10⁻⁷ T·m/A'
    }
  },

  /* ── L3 Potential & Flux ── */
  { id:'V',
    label:'Electric Potential V',
    sub:'$V = -\\int\\vec{E}\\cdot d\\vec{s}$',

    tip: {
      tag:'Electric Potential',
      title:'Electric Potential V',
      equations:['$V = -\\displaystyle\\int_{\\text{ref}}^{P} \\vec{E}\\cdot d\\vec{s}$','$\\vec{E} = -\\nabla V$ &nbsp; (the gradient arrow)','Point charge: $V = k\\,q/r$','Superposition: $V = k\\sum q_i/r_i$'],
      intuition:`<p><strong>What it means:</strong> The electric potential $V$ at a point is the work done per unit charge by an external agent to bring a positive test charge from a reference point (usually infinity) to that point, against the electric force. It's a scalar field — just a number at each location, not a vector. Think of it as a topographic elevation map: high $V$ is a hilltop (near a positive charge), low $V$ is a valley (near a negative charge). Charges naturally "roll downhill" — positive charges flow from high to low $V$, like water flowing downhill.</p>
<p><strong>Calculus:</strong> $V = -\\int \\vec{E}\\cdot d\\vec{s}$ is a line integral — you dot $\\vec{E}$ with the path element $d\\vec{s}$ and integrate along any path from the reference to the point. The result is path-independent (because $\\vec{E}$ is conservative for static fields), which is why you can define $V$ at all. The inverse relationship $\\vec{E} = -\\nabla V$ uses the gradient: differentiate $V$ with respect to $x$, $y$, $z$ to get the three components of $\\vec{E}$. The minus sign means $\\vec{E}$ points in the direction of steepest descent of $V$.</p>
<p><strong>Global structure:</strong> $V$ is the bridge between the field picture (E) and the energy picture (capacitance, circuit voltages). Because $V$ is a scalar, superposition is trivial: $V_{\\text{total}} = k\\sum q_i/r_i$ (just add numbers, not vectors). This makes computing $V$ first and then taking the gradient to get $\\vec{E}$ often much easier than direct Coulomb superposition.</p>
<p><strong>Gotcha:</strong> Only differences in potential are physically meaningful — the choice of reference (where $V=0$) is arbitrary. For isolated charge distributions, setting $V=0$ at infinity is standard. Inside a conductor in equilibrium, $V$ is constant everywhere (not necessarily zero), and $\\vec{E} = 0$ inside.</p>`,
      dims:'[V] = [J/C] = Volts'
    }
  },
  { id:'phiB',
    label:'Magnetic Flux Φ_B',
    sub:'$\\Phi_B = \\int\\vec{B}\\cdot d\\vec{A}$',
    layer:'L3 · Flux',
    color:'pot',
    x: 900, y: 460,
    tip: {
      tag:'Magnetic Flux',
      title:'Magnetic Flux $\\Phi_B$',
      equations:['$\\Phi_B = \\int \\vec{B}\\cdot d\\vec{A} = \\int B\\cos\\theta\\,dA$','Gauss mag.: $\\oint \\vec{B}\\cdot d\\vec{A} = 0$','SI unit: Weber (Wb) = T·m²'],
      intuition:`<p><strong>What it means:</strong> Magnetic flux $\\Phi_B$ through a surface is a measure of how many magnetic field lines thread through that surface. $\\Phi_B = \\int \\vec{B}\\cdot d\\vec{A}$ counts each field line weighted by the cosine of its angle with the surface normal — a field line passing straight through contributes fully ($\\cos 0° = 1$), while one skimming parallel to the surface contributes nothing ($\\cos 90° = 0$). Flux is the scalar quantity that Faraday's law differentiates in time to produce an EMF.</p>
<p><strong>Calculus:</strong> This is an open surface integral — you're integrating $B\\cos\\theta$ over a 2D surface. Unlike Gauss's law for $\\vec{E}$ (a closed surface), the flux for Faraday's law is computed through an open surface bounded by a loop. The area element $d\\vec{A}$ is a vector pointing normal to the surface, with magnitude $dA$. When $\\vec{B}$ is uniform and the surface is flat, the integral simplifies to $\\Phi_B = BA\\cos\\theta$.</p>
<p><strong>Global structure:</strong> $\\Phi_B$ is the central quantity linking the magnetic field $\\vec{B}$ to the phenomenon of induction. It plays two roles: (1) Gauss's law for magnetism says $\\oint \\vec{B}\\cdot d\\vec{A} = 0$ over any closed surface — confirming no magnetic monopoles, and (2) Faraday's law says $\\mathcal{E} = -d\\Phi_B/dt$ — a changing flux through a loop drives an EMF and hence a current. It also defines inductance $L = N\\Phi_B/i$.</p>
<p><strong>Gotcha:</strong> The flux depends on which surface you choose to span the loop — but as long as the boundary (the loop) is the same, any surface gives the same result (this follows from $\\nabla\\cdot\\vec{B} = 0$, which means flux through all surfaces bounded by the same loop must be equal). Also, the sign of $\\Phi_B$ depends on your choice of normal direction — be consistent with the right-hand rule relative to the loop's positive circulation direction.</p>`,
      dims:'[Wb] = [T·m²] = [V·s]'
    }
  },

  /* ── L4 Applications ── */
  { id:'C',

    tip: {
      tag:'Unit 5 — Capacitance',
      title:'Capacitance C',
      equations:['$C = Q/V$ (defining relation)','Parallel plate: $C = \\varepsilon_0 A/d$','Dielectric: $C_\\kappa = \\kappa C_0$','Energy: $U = \\tfrac{1}{2}CV^2 = \\tfrac{Q^2}{2C}$'],
      intuition:`<p><strong>What it means:</strong> Capacitance is a geometry's ability to store electric charge per unit voltage. A capacitor with capacitance $C$ stores charge $Q = CV$ when held at potential difference $V$ across its plates. Think of it as the "charge capacity" of the configuration — a large $C$ means you can store a lot of charge with little voltage. The energy stored, $U = \\frac{1}{2}CV^2$, lives in the electric field between the plates, not in the charges themselves.</p>
<p><strong>Calculus:</strong> Computing $C$ for a geometry is a three-step process involving two integrals and a ratio: (1) assume charge $Q$ on the plates, (2) use Gauss's law (a surface integral) to find $\\vec{E}$ between the plates, (3) integrate $\\vec{E}$ along a path from one plate to the other (a line integral) to find $V$, then $C = Q/V$. For a parallel-plate capacitor: $E = \\sigma/\\varepsilon_0 = Q/\\varepsilon_0 A$ from Gauss, $V = Ed = Qd/\\varepsilon_0 A$, so $C = Q/V = \\varepsilon_0 A/d$.</p>
<p><strong>Global structure:</strong> Capacitance is the first major "application" node — it connects the abstract field $\\vec{E}$ and potential $V$ to the concrete circuit world. A capacitor in a circuit stores energy in $\\vec{E}$, releases it as current, and governs the RC time constant $\\tau = RC$ that controls how fast the circuit responds to changes.</p>
<p><strong>Gotcha:</strong> Inserting a dielectric multiplies $C$ by $\\kappa > 1$ because the dielectric's polarization partially cancels the field between the plates, lowering $V$ for the same $Q$, so more charge is needed per volt. Also, capacitors in series add as reciprocals ($1/C_{\\text{total}} = \\sum 1/C_i$) while in parallel they add directly — opposite to resistors.</p>`,
      dims:'[F] = [C/V] = Farads'
    }
  },
  { id:'uE',
    label:'Energy Density u_E',
    sub:'$u_E = \\tfrac{1}{2}\\varepsilon_0 E^2$',
    layer:'L4 · Applications',
    color:'app',
    x: 330, y: 600,
    tip: {
      tag:'Unit 5 — Energy',
      title:'Electric Field Energy Density',
      equations:['$u_E = \\tfrac{1}{2}\\varepsilon_0 E^2$ &nbsp; [J/m³]','$U = \\int u_E\\,dV$ (total energy in field)','Capacitor: $U = \\tfrac{1}{2}CV^2 = \\tfrac{1}{2}\\varepsilon_0 E^2 (Ad)$'],
      intuition:`<p><strong>What it means:</strong> Energy is not stored in the charges — it is stored in the electric field itself. Wherever there is a nonzero electric field in space, that region of space contains energy at a density of $u_E = \\frac{1}{2}\\varepsilon_0 E^2$ joules per cubic meter. The stronger the field, the more energy per unit volume. This is a deeply physical statement: when you charge a capacitor, work is done against the repulsion of like charges, and that work goes into building up the $\\vec{E}$ field between the plates.</p>
<p><strong>Calculus:</strong> The total energy in a field configuration is a volume integral: $U = \\int u_E\\,dV = \\frac{1}{2}\\varepsilon_0 \\int E^2\\,dV$. For a parallel-plate capacitor with uniform field $E = V/d$ between plates of area $A$ and separation $d$: $U = \\frac{1}{2}\\varepsilon_0 E^2 \\cdot (Ad) = \\frac{1}{2}\\varepsilon_0 (V/d)^2 Ad = \\frac{1}{2}(\\varepsilon_0 A/d)V^2 = \\frac{1}{2}CV^2$. This confirms the formula is consistent.</p>
<p><strong>Global structure:</strong> This node is the bridge between the field picture and the energy picture. It makes the statement that fields are real, physical objects that carry energy — a concept that becomes essential in electrodynamics, where electromagnetic waves carry energy through empty space. The magnetic analog is $u_B = B^2/(2\\mu_0)$, and both contribute to the energy density of an electromagnetic wave.</p>
<p><strong>Gotcha:</strong> The energy density goes as $E^2$, not $E$ — doubling the field quadruples the energy density. Also, $u_E$ is always non-negative (it doesn't matter if the field is from a positive or negative charge), which makes physical sense since storing energy requires positive work.</p>`,
      dims:'[J/m³]'
    }
  },
  { id:'emf',
    label:"Faraday / EMF",
    sub:'$\\mathcal{E} = -d\\Phi_B/dt$',
    layer:'L4 · Applications',
    color:'app',
    x: 870, y: 600,
    tip: {
      tag:"Unit 8 — Faraday's Law",
      title:"Faraday's Law & EMF",
      equations:["$\\mathcal{E} = -\\dfrac{d\\Phi_B}{dt}$ (Faraday's law)",'$\\mathcal{E} = \\oint \\vec{E}\\cdot d\\vec{s}$ (circulation of E)','Motional EMF: $\\mathcal{E} = BLv$','Lenz\'s law: induced current opposes change'],
      intuition:`<p><strong>What it means:</strong> A changing magnetic flux through a loop induces an EMF — an electromotive force that drives current around the loop. The EMF is not a force per se, but a voltage (energy per charge) that acts like a battery around the loop. If the loop is a conductor, current flows; if it's an open circuit, a voltage builds up across the gap. The minus sign encodes Lenz's law: the induced current always flows in the direction that opposes the change in flux that caused it (nature resists change).</p>
<p><strong>Calculus:</strong> $\\mathcal{E} = -d\\Phi_B/dt$ is a time derivative — specifically of the magnetic flux through the loop. The "Faraday" version says you differentiate $\\Phi_B(t)$ with respect to time. The flux can change because $B$ changes (transformer), because the area changes (generator), or because the angle $\\theta$ between $\\vec{B}$ and $\\vec{A}$ changes (rotating coil). The equivalent form $\\mathcal{E} = \\oint \\vec{E}\\cdot d\\vec{s}$ is a line integral of $\\vec{E}$ — it says a changing $\\vec{B}$ creates a circulating $\\vec{E}$ field even in empty space.</p>
<p><strong>Global structure:</strong> Faraday's law is the key coupling between the magnetic world and the electric world. It's the physical principle behind generators (mechanical rotation produces electrical EMF), transformers (changing current in primary coil induces EMF in secondary), and inductors (self-inductance). In Maxwell's framework, it becomes equation III: $\\nabla\\times\\vec{E} = -\\partial\\vec{B}/\\partial t$.</p>
<p><strong>Gotcha:</strong> Lenz's law is about opposing the change in flux, not the flux itself. If the flux is decreasing, the induced current creates a field that tries to maintain the flux (same direction as original $\\vec{B}$). If the flux is increasing, the induced current opposes the growth (opposite direction). Always determine the direction of change first, then apply Lenz's law.</p>`,
      dims:'[V] = Volts'
    }
  },
  { id:'iJ',
    label:'Current i & Density J',
    sub:'$i = dq/dt$, $\\vec{J}=\\sigma\\vec{E}$',
    layer:'L4 · Applications',
    color:'app',
    x: 540, y: 600,
    tip: {
      tag:'Unit 6 — Current',
      title:'Current i and Current Density J',
      equations:['$i = dq/dt$ [A]','$\\vec{J} = \\sigma\\vec{E} = \\rho^{-1}\\vec{E}$ (microscopic Ohm\'s)','$i = \\int \\vec{J}\\cdot d\\vec{A}$ (flux of J)','Drift velocity: $J = n|q|v_d$'],
      intuition:`<p><strong>What it means:</strong> Current $i = dq/dt$ is the rate at which charge flows past a cross-section — one ampere means one coulomb per second. The current density $\\vec{J}$ is the microscopic version: it's a vector field giving the amount of current per unit area at each point, including direction. $\\vec{J} = \\sigma\\vec{E}$ is the deep form of Ohm's law: the local electric field drives charge carriers, and conductivity $\\sigma$ (a material property) determines how effectively. Free electrons in a metal drift slowly (typically millimeters per second) even though the field effect propagates nearly instantaneously.</p>
<p><strong>Calculus:</strong> $i = dq/dt$ is an ordinary time derivative. The relationship $i = \\int \\vec{J}\\cdot d\\vec{A}$ is a surface integral — you're computing the flux of current density through a cross-sectional surface, just as $\\Phi_E = \\int \\vec{E}\\cdot d\\vec{A}$ is the flux of $\\vec{E}$. The macroscopic $V = iR$ follows from integrating $\\vec{J} = \\sigma\\vec{E}$ across the geometry: $i = JA = \\sigma EA = \\sigma(V/L)A$, giving $R = L/(\\sigma A) = \\rho L/A$.</p>
<p><strong>Global structure:</strong> Current is the link between the field world ($\\vec{E}$, $\\vec{B}$) and the circuit world ($V$, $i$, $R$). It feeds into Ampere's law as the source term $i_{\\text{enc}}$, generates the magnetic field via Biot-Savart, and appears in circuit equations through Ohm's law. The continuity equation $\\partial\\rho/\\partial t + \\nabla\\cdot\\vec{J} = 0$ expresses conservation of charge.</p>
<p><strong>Gotcha:</strong> Conventional current flows in the direction positive charges would move (from high to low potential), even though in metals it's electrons (negative charges) that actually move in the opposite direction. This convention is historical and universal in circuit analysis. Also, the drift velocity of electrons is much slower than the speed of signal propagation — current "starts" almost simultaneously throughout a circuit because the $\\vec{E}$ field propagates at nearly $c$.</p>`,
      dims:'i: [A]; J: [A/m²]; σ: [(Ω·m)⁻¹]'
    }
  },

  /* ── L5 Circuit Elements ── */
  { id:'R',
    label:'Resistance R',
    sub:'$R = \\rho L/A = V/i$',
    layer:'L5 · Circuits',
    color:'ckt',
    x: 430, y: 750,
    tip: {
      tag:'Unit 6 — Resistance',
      title:'Resistance R',
      equations:['$R = \\rho L/A = V/i$ (Ohm\'s law)','$\\vec{J} = \\sigma\\vec{E}$ → $V/i = L/(\\sigma A) = \\rho L/A$','Power: $P = i^2 R = V^2/R = iV$','$\\rho(T) = \\rho_0[1+\\alpha(T-T_0)]$'],
      intuition:`<p><strong>What it means:</strong> Resistance quantifies how strongly a material opposes the flow of electric current for a given applied voltage. $R = V/i$ is the macroscopic definition (Ohm's law). The geometry formula $R = \\rho L/A$ reveals the physical origin: resistivity $\\rho$ is a material property (how much a material scatters electrons), $L$ is length (more wire to traverse = more resistance), and $A$ is cross-sectional area (wider wire = more paths for current = less resistance). Power dissipated as heat is $P = i^2R = V^2/R$.</p>
<p><strong>Calculus:</strong> The derivation of $R = \\rho L/A$ from microscopic physics is an integration: take $\\vec{J} = \\sigma\\vec{E}$ (microscopic Ohm's law), multiply both sides by area to get $i = \\sigma EA = \\sigma(V/L)A$ (assuming uniform $\\vec{E} = V/L$ in the wire), then rearrange to $V/i = L/(\\sigma A) = \\rho L/A$. For non-uniform geometries (tapered wire, concentric cylinders), you need to integrate $dR = \\rho\\,dL/A(L)$ along the wire length.</p>
<p><strong>Global structure:</strong> Resistance is the macroscopic face of microscopic charge scattering. It connects the field picture ($\\vec{J} = \\sigma\\vec{E}$) to the circuit picture ($V = iR$), and it sets the RC time constant ($\\tau = RC$) that governs how quickly capacitors charge and discharge. In DC circuits, Kirchhoff's voltage law (sum of voltage drops = sum of EMFs around a loop) is really just a restatement of conservation of energy.</p>
<p><strong>Gotcha:</strong> Ohm's law ($V = iR$ with constant $R$) is not a fundamental law — it's an empirical approximation valid for many materials (ohmic materials) but not all. Diodes, transistors, and the human body are non-ohmic. Also, resistors in series add directly ($R_{\\text{total}} = \\sum R_i$) while in parallel they add as reciprocals — opposite to capacitors.</p>`,
      dims:'[Ω] = [V/A]'
    }
  },
  { id:'L',
    label:'Inductance L',
    sub:'$\\mathcal{E} = -L\\,di/dt$',
    layer:'L5 · Circuits',
    color:'ckt',
    x: 820, y: 750,
    tip: {
      tag:'Unit 8 — Inductance',
      title:'Inductance L',
      equations:['$\\mathcal{E} = -L\\,\\dfrac{di}{dt}$ (back-EMF)','$L = N\\Phi_B / i$ (flux linkage)','Solenoid: $L = \\mu_0 n^2 \\ell A$','Energy: $U_L = \\tfrac{1}{2}Li^2$'],
      intuition:`<p><strong>What it means:</strong> An inductor is a coil that resists changes in current by generating a back-EMF proportional to $di/dt$. The physical mechanism is Faraday's law applied to the coil's own magnetic field: when current $i$ flows, it creates flux $\\Phi_B$ through the coil; when $i$ changes, $\\Phi_B$ changes, inducing an EMF that opposes the change in current. An inductor is electromagnetic inertia — just as mass resists changes in velocity ($F = ma = m\\,dv/dt$), inductance resists changes in current ($\\mathcal{E} = -L\\,di/dt$).</p>
<p><strong>Calculus:</strong> $\\mathcal{E} = -L\\,di/dt$ is a first-order time derivative — the induced EMF is proportional to the rate of change of current, not the current itself. The definition $L = N\\Phi_B/i$ requires computing the flux (a surface integral $\\Phi_B = \\int \\vec{B}\\cdot d\\vec{A}$) through all $N$ turns of the coil. For a solenoid: $\\vec{B} = \\mu_0 n i$ (from Ampere's law), $\\Phi_B = \\mu_0 n i\\cdot A$ per turn, total linkage $N\\Phi_B = \\mu_0 n^2 \\ell A \\cdot i$, so $L = \\mu_0 n^2 \\ell A$.</p>
<p><strong>Global structure:</strong> Inductance is the circuit-level expression of Faraday's law applied to self-induction. It's the magnetic analog of capacitance: $C$ stores energy in $\\vec{E}$, $L$ stores energy in $\\vec{B}$; $C$ resists changes in voltage, $L$ resists changes in current. Together they govern LC oscillations, RL transients, and AC circuit behavior (impedance $Z_L = j\\omega L$).</p>
<p><strong>Gotcha:</strong> The energy $U_L = \\frac{1}{2}Li^2$ is stored in the magnetic field of the inductor (like $U_C = \\frac{1}{2}CV^2$ is stored in the electric field of the capacitor). When you "switch off" an inductor suddenly (open the circuit), the stored energy has nowhere to go and produces a large voltage spike — this is why switching inductive loads without protection can damage circuits.</p>`,
      dims:'[H] = [V·s/A] = Henries'
    }
  },
  { id:'trans',
    label:'RC / RL Transients',
    sub:'$\\tau = RC$ or $L/R$',
    layer:'L5 · Circuits',
    color:'ckt',
    x: 620, y: 750,
    tip: {
      tag:'Unit 5–8 — Transients',
      title:'RC and RL Transient Circuits',
      equations:['RC charging: $V_C(t) = V_0(1-e^{-t/RC})$','RL rise: $i(t) = \\dfrac{V_0}{R}(1-e^{-Rt/L})$','Time constant: $\\tau_{RC} = RC$, $\\tau_{RL} = L/R$','At $t=\\tau$: reached 63% of final value'],
      intuition:`<p><strong>What it means:</strong> When a circuit contains a capacitor and resistor (RC) or inductor and resistor (RL), the approach to equilibrium is exponential — the system never gets there instantaneously, but instead decays toward its final state with a characteristic time constant $\\tau$. For RC: the capacitor charges through $R$, with voltage rising as $V_C(t) = V_0(1 - e^{-t/RC})$. For RL: the current rises through $L$ against back-EMF, as $i(t) = (V_0/R)(1 - e^{-Rt/L})$. After one time constant $\\tau$, the quantity has reached $1 - 1/e \\approx 63\\%$ of its final value.</p>
<p><strong>Calculus:</strong> Both are first-order linear ODEs. For RC: Kirchhoff's law gives $V_0 = i R + V_C = R\\,dq/dt + q/C$, a first-order linear ODE in $q(t)$. Its solution is the exponential $q(t) = CV_0(1 - e^{-t/RC})$. For RL: $V_0 = iR + L\\,di/dt$, again a first-order ODE with exponential solution. The time constant $\\tau$ is determined by the coefficient of $t$ in the exponent — dimensional analysis ($RC$ has units of seconds; $L/R$ has units of seconds) confirms this.</p>
<p><strong>Global structure:</strong> RC and RL transients represent the dynamic behavior of energy storage elements in circuits. They are the time-domain expression of the frequency-domain concepts of capacitive reactance ($X_C = 1/\\omega C$) and inductive reactance ($X_L = \\omega L$) in AC circuits. Understanding $\\tau$ is essential for filter design, signal processing, and understanding why circuits don't respond instantaneously to step inputs.</p>
<p><strong>Gotcha:</strong> The exponential never actually reaches zero (or its final value) — it only approaches asymptotically. In practice, the circuit is considered "done" after about $5\\tau$ (when the exponential factor $e^{-5} \\approx 0.007 = 0.7\\%$). Also, the form of the ODE is the same for both RC and RL — only the physical interpretation of the variables changes.</p>`,
      dims:'τ = RC [s]; τ = L/R [s]'
    }
  },

  /* ── L6 Maxwell ── */
  { id:'mx1',
    label:'Gauss E',
    sub:'$\\oint \\vec{E}\\cdot d\\vec{A} = q_{\\text{enc}}/\\varepsilon_0$',
    layer:'L6 · Maxwell',
    color:'max',

      title:"Maxwell I: Gauss's Law",
      equations:['$\\oint \\vec{E}\\cdot d\\vec{A} = \\dfrac{q_{\\text{enc}}}{\\varepsilon_0}$','Differential form: $\\nabla\\cdot\\vec{E} = \\rho/\\varepsilon_0$'],
      intuition:`<p><strong>What it means:</strong> Maxwell's first equation says that electric charges are the sources and sinks of electric field lines. The total outward flux of $\\vec{E}$ through any closed surface equals the net charge enclosed divided by $\\varepsilon_0$. Positive charge is a source (field lines point outward), negative charge is a sink (field lines point inward). In differential form, $\\nabla\\cdot\\vec{E} = \\rho/\\varepsilon_0$ says the divergence of $\\vec{E}$ at a point equals the charge density at that point — the field "diverges" from where charge is located.</p>
<p><strong>Calculus:</strong> The integral form uses a closed surface integral (the divergence theorem connects it to the differential form). The differential form $\\nabla\\cdot\\vec{E} = \\partial E_x/\\partial x + \\partial E_y/\\partial y + \\partial E_z/\\partial z = \\rho/\\varepsilon_0$ involves partial derivatives — it's a local statement about the rate of change of each component of $\\vec{E}$ in its own direction. The divergence theorem $\\oint \\vec{E}\\cdot d\\vec{A} = \\int \\nabla\\cdot\\vec{E}\\,dV$ is what connects the two forms.</p>
<p><strong>Global structure:</strong> Maxwell I encodes the electric half of electrostatics — that charge is the source of $\\vec{E}$. It's the starting point of the entire electrostatic hierarchy: charge $\\to$ $\\vec{E}$ (via Gauss) $\\to$ $V$ (by integration) $\\to$ $C$ (by geometry). Among the four Maxwell equations, this is the one that has a source term ($\\rho$) on the right — it's the only one that "explains" where $\\vec{E}$ comes from.</p>
<p><strong>Gotcha:</strong> Gauss's law in integral form is most useful when charge distributions have high symmetry. The differential form is more fundamental and always applicable, but requires knowing $\\rho(\\vec{r})$ at every point — which is often unknown. The two forms are mathematically equivalent via the divergence theorem.</p>`,
      dims:'—'
    }

      title:"Maxwell II: No Magnetic Monopoles",
      equations:['$\\oint \\vec{B}\\cdot d\\vec{A} = 0$','Differential: $\\nabla\\cdot\\vec{B} = 0$'],
      intuition:`<p><strong>What it means:</strong> Maxwell's second equation says that magnetic field lines have no beginning and no end — they are always closed loops. There is no magnetic equivalent of electric charge (no "magnetic monopole"). Every field line that enters a closed surface must also exit it, so the net flux is always zero. The divergence of $\\vec{B}$ is zero everywhere, meaning $\\vec{B}$ has no sources or sinks — unlike $\\vec{E}$, which diverges from charges.</p>
<p><strong>Calculus:</strong> The integral form is a closed surface integral that evaluates to zero: $\\oint \\vec{B}\\cdot d\\vec{A} = 0$. The differential form $\\nabla\\cdot\\vec{B} = 0$ says the divergence of $\\vec{B}$ vanishes at every point. This also guarantees that the magnetic flux through any surface bounded by the same loop is the same regardless of which surface you choose — a key fact used in Faraday's law (you can deform the surface without changing $\\Phi_B$).</p>
<p><strong>Global structure:</strong> Among the four Maxwell equations, this is the simplest structurally — it just says there's no source for $\\vec{B}$. It's the magnetic counterpart of Gauss's law for $\\vec{E}$, but with the right-hand side equal to zero (because magnetic monopoles don't exist, or at least have never been observed). It also implies the existence of a vector potential $\\vec{A}$ such that $\\vec{B} = \\nabla\\times\\vec{A}$.</p>
<p><strong>Gotcha:</strong> Magnetic monopoles are not forbidden by fundamental physics — Dirac showed in 1931 that their existence would explain charge quantization. They just haven't been observed. If they existed, Maxwell's equations would need a magnetic charge density $\\rho_m$ on the right side of this equation. The equation $\\nabla\\cdot\\vec{B} = 0$ is an empirical statement, not a logical necessity.</p>`,
      dims:'—'

  { id:'mx3',
    label:"Faraday",
    sub:'$\\oint \\vec{E}\\cdot d\\vec{s} = -d\\Phi_B/dt$',

    color:'max',
    x: 650, y: 920,
    tip: {
      tag:"Maxwell III — Faraday's Law",
      title:"Maxwell III: Faraday's Law",
      equations:["$\\oint \\vec{E}\\cdot d\\vec{s} = -\\dfrac{d\\Phi_B}{dt}$","Differential: $\\nabla\\times\\vec{E} = -\\dfrac{\\partial\\vec{B}}{\\partial t}$"],
      intuition:`<p><strong>What it means:</strong> Maxwell's third equation says that a time-varying magnetic field creates a circulating electric field — even in empty space, with no charges present. The line integral of $\\vec{E}$ around a closed loop equals the negative rate of change of magnetic flux through the loop. This means $\\vec{E}$ in the dynamic case is not conservative (its line integral around a closed loop is not zero) — it circulates, just like $\\vec{B}$ circulates around a current.</p>
<p><strong>Calculus:</strong> The integral form is a closed line integral of $\\vec{E}$ (a circulation integral). The differential form $\\nabla\\times\\vec{E} = -\\partial\\vec{B}/\\partial t$ involves the curl of $\\vec{E}$ — the curl measures circulation per unit area. The two forms are related by Stokes' theorem: $\\oint_C \\vec{E}\\cdot d\\vec{s} = \\iint_S (\\nabla\\times\\vec{E})\\cdot d\\vec{A}$. This is a partial time derivative on the right: it's the local, instantaneous rate of change of $\\vec{B}$ at a fixed point in space.</p>
<p><strong>Global structure:</strong> This is the first of two Maxwell equations that couple $\\vec{E}$ and $\\vec{B}$ dynamically. It says: changing $\\vec{B}$ creates $\\vec{E}$. The fourth equation will say: changing $\\vec{E}$ creates $\\vec{B}$. Together, these two couplings enable electromagnetic waves — $\\vec{E}$ and $\\vec{B}$ mutually sustain each other as the wave propagates. Maxwell III is Faraday's law elevated to a field equation valid at every point in space.</p>
<p><strong>Gotcha:</strong> In electrostatics, $\\vec{E}$ is conservative: $\\oint \\vec{E}\\cdot d\\vec{s} = 0$. In electrodynamics, it's not — a changing $\\vec{B}$ makes $\\vec{E}$ non-conservative. This means the concept of "voltage" (which requires a path-independent $\\vec{E}$) must be used carefully in the presence of changing magnetic fields — Kirchhoff's voltage law breaks down in regions with $\\partial\\vec{B}/\\partial t \\neq 0$.</p>`,

  { id:'mx4',

      equations:['$\\oint \\vec{B}\\cdot d\\vec{s} = \\mu_0 i_{\\text{enc}} + \\mu_0\\varepsilon_0\\dfrac{d\\Phi_E}{dt}$','Differential: $\\nabla\\times\\vec{B} = \\mu_0\\vec{J} + \\mu_0\\varepsilon_0\\dfrac{\\partial\\vec{E}}{\\partial t}$','Displacement current: $i_d = \\varepsilon_0\\,d\\Phi_E/dt$'],
      intuition:`<p><strong>What it means:</strong> Maxwell's fourth equation is Ampere's law with a crucial addition: not only does a real current create a circulating $\\vec{B}$ field, but so does a time-varying electric flux (the "displacement current" $i_d = \\varepsilon_0\\,d\\Phi_E/dt$). The displacement current is not a flow of charge — it's a bookkeeping term that Maxwell invented to make the equations consistent. In a charging capacitor, real current flows to the plates but no current crosses the gap; the displacement current in the gap exactly equals the real current, so $\\oint \\vec{B}\\cdot d\\vec{s}$ gives the same answer regardless of which surface you choose.</p>
<p><strong>Calculus:</strong> The left side is a closed line integral (circulation of $\\vec{B}$). The right side has two terms: $\\mu_0 i_{\\text{enc}} = \\mu_0 \\int \\vec{J}\\cdot d\\vec{A}$ (a surface integral of current density) and $\\mu_0\\varepsilon_0 d\\Phi_E/dt$ (the time derivative of electric flux — a combination of a surface integral and a time derivative). The differential form $\\nabla\\times\\vec{B} = \\mu_0\\vec{J} + \\mu_0\\varepsilon_0\\partial\\vec{E}/\\partial t$ involves the curl of $\\vec{B}$ and a partial time derivative of $\\vec{E}$.</p>
<p><strong>Global structure:</strong> Maxwell IV, combined with Maxwell III, enables electromagnetic waves. Combine $\\nabla\\times\\vec{E} = -\\partial\\vec{B}/\\partial t$ and $\\nabla\\times\\vec{B} = \\mu_0\\varepsilon_0\\partial\\vec{E}/\\partial t$ (in free space, $\\vec{J} = 0$), take the curl of the first, substitute the second, and you get the wave equation $\\nabla^2\\vec{E} = \\mu_0\\varepsilon_0\\partial^2\\vec{E}/\\partial t^2$, with wave speed $c = 1/\\sqrt{\\mu_0\\varepsilon_0} \\approx 3\\times10^8$ m/s. This identified light as an electromagnetic wave — Maxwell's greatest discovery.</p>
<p><strong>Gotcha:</strong> The displacement current $\\varepsilon_0 d\\Phi_E/dt$ has units of amperes and produces a $\\vec{B}$ field exactly as if it were a real current — but no charge actually moves. This was Maxwell's bold and counterintuitive hypothesis, which turned out to be correct. It resolved an apparent inconsistency in Ampere's law when applied to capacitor circuits.</p>`,

    }
  },
];

  { from:'q', to:'E',

      tag:'Coulomb → Electric Field',
      title:'Charge creates $\\vec{E}$',
      equation:'$\\vec{E} = k\\,\\dfrac{q}{r^2}\\hat{r}$',
      meaning:`<p><strong>What it means:</strong> A point charge $q$ generates an electric field that fills all of space. The field strength falls off as $1/r^2$ — the inverse-square law — and the field points radially outward (positive $q$) or radially inward (negative $q$). This is Coulomb's law repackaged as a field quantity: rather than computing the force between two specific charges, we describe the field that any test charge would experience at each location.</p>
<p><strong>Calculus:</strong> This is an algebraic expression for a vector field — $\\hat{r}$ is the unit vector pointing away from the source charge, so the field is always radial. For continuous charge distributions, you superpose (integrate): $\\vec{E} = k\\int \\frac{dq}{r^2}\\hat{r}$, a vector integral where you must carefully track the direction of $\\hat{r}$ for each source element. The $1/r^2$ dependence comes from the 3D geometry of how field lines spread over a sphere of area $4\\pi r^2$.</p>
<p><strong>Global structure:</strong> This edge is the foundational link in the map — it's how charge (the source) produces the electric field (the primary object of study). Every downstream electric concept ($V$, Gauss's law, $C$, $u_E$, current) ultimately traces through this arrow. The field formulation is more powerful than the force formulation because it works for distributions and time-varying situations.</p>
<p><strong>Gotcha:</strong> The formula $\\vec{E} = kq/r^2\\,\\hat{r}$ is for a point charge in vacuum. Near a conductor, induced surface charges redistribute $\\vec{E}$ dramatically — the field inside a conductor is zero in static equilibrium, and the field at a conductor surface is perpendicular to the surface with magnitude $\\sigma/\\varepsilon_0$.</p>`,

  },
  { from:'q', to:'B',
    label:'$\\vec{F}=q\\vec{v}\\times\\vec{B}$',
    bend: 30, lf:.45,
    edgeTip:{
      tag:'Moving Charge → Magnetic Field',
      title:'Moving charge creates $\\vec{B}$',
      equation:'$\\vec{F} = q\\vec{v}\\times\\vec{B}$',
      meaning:`<p><strong>What it means:</strong> A moving charge is the source of a magnetic field. The Lorentz force law $\\vec{F} = q\\vec{v}\\times\\vec{B}$ tells us how the magnetic field acts on a moving charge — the force is always perpendicular to both the velocity and the field. This perpendicularity is the signature of magnetism: it means $\\vec{B}$ never does work (since $\\vec{F}\\cdot\\vec{v} = q(\\vec{v}\\times\\vec{B})\\cdot\\vec{v} = 0$ always). A stationary charge feels no magnetic force — it must be moving.</p>
<p><strong>Calculus:</strong> The cross product $\\vec{v}\\times\\vec{B}$ is the key operation. It produces a vector perpendicular to both inputs, with magnitude $|\\vec{v}||\\vec{B}|\\sin\\theta$. The direction follows the right-hand rule: point fingers along $\\vec{v}$, curl toward $\\vec{B}$, thumb points along $\\vec{v}\\times\\vec{B}$. For a charge moving in a uniform $\\vec{B}$ field, this produces circular motion — the centripetal acceleration is provided by the Lorentz force, giving radius $r = mv/(|q|B)$.</p>
<p><strong>Global structure:</strong> This edge shows that charge is the source of both $\\vec{E}$ (when stationary) and $\\vec{B}$ (when moving). The full Lorentz force $\\vec{F} = q(\\vec{E} + \\vec{v}\\times\\vec{B})$ unifies both interactions. This connection is deepened by special relativity: what looks like a pure magnetic force in one frame looks like a mixture of electric and magnetic forces in another frame — $\\vec{E}$ and $\\vec{B}$ are really two aspects of one electromagnetic field.</p>
<p><strong>Gotcha:</strong> The magnetic force is velocity-dependent — a charge at rest feels no magnetic force at all. Also, the direction of the force on a negative charge is opposite to that on a positive charge (since $q$ carries a sign). For a current-carrying wire, the force per unit length is $d\\vec{F}/dL = i\\vec{L}\\times\\vec{B}$, which is the macroscopic version of the Lorentz force.</p>`,

  { from:'E', to:'gauss',
    label:'$\\Phi_E = \\oint\\vec{E}\\cdot d\\vec{A}$',
    bend:-20, lf:.5,

      title:'Electric Flux defines Gauss\'s Law',
      equation:'$\\Phi_E = \\oint \\vec{E}\\cdot d\\vec{A} = \\dfrac{q_{\\text{enc}}}{\\varepsilon_0}$',
      meaning:`<p><strong>What it means:</strong> To apply Gauss's law, you integrate $\\vec{E}$ over a closed surface — computing the electric flux $\\Phi_E$. This flux counts the net number of field lines exiting the surface. The equation says this flux equals $q_{\\text{enc}}/\\varepsilon_0$, connecting the geometric property of the field (how it spreads outward) to its physical source (charge). The integral doesn't care about the field's distribution on the surface — only the total outward flow matters.</p>
<p><strong>Calculus:</strong> This is a closed surface integral — you integrate the dot product $\\vec{E}\\cdot d\\vec{A} = E_\\perp\\,dA$ over an entire closed surface (a 2D manifold). The area element $d\\vec{A}$ points outward (by convention) and has magnitude $dA$. With symmetry, $E_\\perp$ is constant over the surface and the integral becomes $E\\cdot A_{\\text{surface}}$. Without symmetry, this is a full double integral that's generally hard to evaluate.</p>
<p><strong>Global structure:</strong> This edge shows how $\\vec{E}$ (a field at every point) connects to Gauss's law (a global constraint on the field). Gauss's law is used in both directions: given a charge distribution, find $\\vec{E}$ (by choosing a Gaussian surface); given $\\vec{E}$ everywhere, find $q_{\\text{enc}}$ (useful in proving properties of conductors). It's also the starting point for deriving capacitance formulas.</p>
<p><strong>Gotcha:</strong> The surface must be closed (enclosing a volume) for Gauss's law to apply. An open surface gives you electric flux through that surface, but not a statement about enclosed charge. Also, Gauss's law is always true but only computationally useful with symmetric charge distributions.</p>`,

  { from:'B', to:'ampere',
    label:'$\\oint\\vec{B}\\cdot d\\vec{s}$',
    bend: 15, lf:.5,
    edgeTip:{
      tag:'B Field → Ampère\'s Law',
      title:'Line integral of $\\vec{B}$',
      equation:'$\\oint_C \\vec{B}\\cdot d\\vec{s} = \\mu_0\\,i_{\\text{enc}}$',
      meaning:`<p><strong>What it means:</strong> To apply Ampere's law, you compute the line integral of $\\vec{B}$ around a closed loop — the circulation of $\\vec{B}$. This measures the tendency of $\\vec{B}$ to curl around the loop. Ampere's law says this circulation equals $\\mu_0$ times the current enclosed by the loop. It's the magnetic analog of Gauss's law for $\\vec{E}$: one uses a surface integral, the other uses a line integral; one involves enclosed charge, the other enclosed current.</p>
<p><strong>Calculus:</strong> The circulation integral $\\oint \\vec{B}\\cdot d\\vec{s} = \\oint B\\cos\\theta\\,ds$ is a line integral around a closed path. With circular symmetry (e.g., an infinite straight wire), $\\vec{B}$ is tangent to the circle and has constant magnitude, so the integral reduces to $B\\cdot(2\\pi r)$. Without symmetry, you'd need to integrate component by component along the path — which is rarely done in practice.</p>
<p><strong>Global structure:</strong> This edge connects the magnetic field $\\vec{B}$ to Ampere's law, just as the $\\Phi_E$ edge connects $\\vec{E}$ to Gauss's law. Ampere's law (before Maxwell's correction) works for magnetostatics; Maxwell's addition of the displacement current makes it valid in general. Knowing this circulation integral is nonzero tells you there's a net current enclosed — and knowing the symmetry lets you extract $B$.</p>
<p><strong>Gotcha:</strong> The path of integration (the Amperian loop) is a closed curve in 3D space. The "enclosed current" $i_{\\text{enc}}$ passes through any surface bounded by this loop — and by $\\nabla\\cdot\\vec{J} = 0$ (for steady currents), all such surfaces give the same answer. In the dynamic case (with displacement current), the surfaces must include the full generalized current $\\vec{J} + \\varepsilon_0\\partial\\vec{E}/\\partial t$.</p>`,

  { from:'B', to:'biot',
    label:'integrate $d\\vec{B}$',
    bend: 20, lf:.3,
    edgeTip:{
      tag:'B Field ← Biot-Savart',
      title:'Biot-Savart builds up $\\vec{B}$',
      equation:'$d\\vec{B} = \\dfrac{\\mu_0 i}{4\\pi}\\dfrac{d\\vec{s}\\times\\hat{r}}{r^2}$',
      meaning:`<p><strong>What it means:</strong> Biot-Savart is the direct, brute-force method for computing $\\vec{B}$ from any current distribution. You slice the wire into infinitesimal elements $d\\vec{s}$, each carrying current $i$. Each element contributes $d\\vec{B}$ at the field point, pointing in the direction given by $d\\vec{s}\\times\\hat{r}$ (perpendicular to both the wire element and the displacement to the field point). Then you sum (integrate) all contributions. This is analogous to Coulomb superposition for $\\vec{E}$.</p>
<p><strong>Calculus:</strong> The cross product $d\\vec{s}\\times\\hat{r}$ gives the direction of each $d\\vec{B}$ contribution. The full integral $\\vec{B} = \\frac{\\mu_0 i}{4\\pi}\\int\\frac{d\\vec{s}\\times\\hat{r}}{r^2}$ is a vector line integral — you must integrate each component ($B_x$, $B_y$, $B_z$) separately. The $1/r^2$ factor (like Coulomb) comes from the same geometric argument about spreading in 3D. Setting up the geometry correctly — parameterizing $d\\vec{s}$, writing $\\hat{r}$ in terms of the integration variable, expressing $r$ — is the main technical challenge.</p>
<p><strong>Global structure:</strong> This edge is the alternative route to $\\vec{B}$ when Ampere's law can't be used due to lack of symmetry. Biot-Savart always works but requires integration; Ampere's law is simpler but restricted to symmetric configurations. Together they give complete coverage: use Ampere for solenoids and long wires, use Biot-Savart for finite wires, circular loops, and arcs.</p>
<p><strong>Gotcha:</strong> $\\hat{r}$ points from the source element (on the wire) to the field point — not the other way. Getting this direction wrong flips the sign of the entire result. Also, for a straight finite wire, the integral has a finite result even though the wire doesn't extend to infinity; the standard result involves $\\sin$ of the angles subtended by the wire ends.</p>`,

  /* L1 ↔ L3 bidirectional */
  { from:'E', to:'V',
    label:'$V = -\\int\\vec{E}\\cdot d\\vec{s}$',
    bend:-25, lf:.5, color:'#a3e635', nudge:{x:45,y:0},
    edgeTip:{
      tag:'E → Potential',
      title:'Integrate $\\vec{E}$ to get $V$',
      equation:'$V = -\\displaystyle\\int_{\\text{ref}}^{P}\\vec{E}\\cdot d\\vec{s}$',
      meaning:`<p><strong>What it means:</strong> The electric potential $V$ at a point $P$ is found by integrating the component of $\\vec{E}$ along any path from a reference point (where $V = 0$) to $P$, with a minus sign. Moving against the electric field (uphill) increases $V$; moving with the field (downhill) decreases $V$. The integral is path-independent because the static $\\vec{E}$ field is conservative — this is the fundamental property that makes potential a well-defined quantity.</p>
<p><strong>Calculus:</strong> This is a line integral — $V = -\\int_{\\text{ref}}^P \\vec{E}\\cdot d\\vec{s} = -\\int_{\\text{ref}}^P E\\cos\\theta\\,ds$, where $\\theta$ is the angle between $\\vec{E}$ and the path direction $d\\vec{s}$. The path independence (for static fields) means you can choose the most convenient path — usually one that aligns with the field so $\\cos\\theta = 1$, or one that lies on an equipotential so $\\cos\\theta = 0$ and contributes nothing.</p>
<p><strong>Global structure:</strong> This edge is the downward arrow from $\\vec{E}$ to $V$ — converting a vector field into a scalar field by integration. Its reverse ($\\vec{E} = -\\nabla V$) converts a scalar field back to a vector field by differentiation. The two arrows form a calculus pair: integrate to go from $\\vec{E}$ to $V$, differentiate (gradient) to go from $V$ to $\\vec{E}$. Knowing $\\vec{E}$ everywhere, you can always find $V$; knowing $V$ everywhere, you can always find $\\vec{E}$.</p>
<p><strong>Gotcha:</strong> The integral $\\int \\vec{E}\\cdot d\\vec{s}$ gives the potential difference $V_A - V_B$ (not an absolute potential) between two points. The sign convention is critical: moving from $A$ to $B$ in the direction of $\\vec{E}$ means you're going from high $V$ to low $V$, so $V_A - V_B > 0$ (the integral of a positive quantity along the direction of $\\vec{E}$ gives a positive potential difference).</p>`,

  { from:'V', to:'E',
    label:'$\\vec{E} = -\\nabla V$',
    bend: 25, lf:.5, color:'#f97316', nudge:{x:-45,y:0},
    edgeTip:{
      tag:'Potential → E',
      title:'Gradient of $V$ gives $\\vec{E}$',
      equation:'$\\vec{E} = -\\nabla V$',
      meaning:`<p><strong>What it means:</strong> The electric field is the negative gradient of the electric potential. At every point in space, $\\vec{E}$ points in the direction of steepest decrease of $V$ — perpendicular to the equipotential surfaces, from high $V$ to low $V$. The gradient magnitude gives the rate of change: $|\\vec{E}| = |dV/ds|_{\\text{max}}$. This is the inverse of the line integral: where integration converts $\\vec{E}$ to $V$, differentiation (the gradient) converts $V$ back to $\\vec{E}$.</p>
<p><strong>Calculus:</strong> The gradient is the vector of partial derivatives: $\\nabla V = (\\partial V/\\partial x)\\hat{x} + (\\partial V/\\partial y)\\hat{y} + (\\partial V/\\partial z)\\hat{z}$. Then $\\vec{E} = -\\nabla V$ gives each component: $E_x = -\\partial V/\\partial x$, $E_y = -\\partial V/\\partial y$, $E_z = -\\partial V/\\partial z$. This is often the easiest route to $\\vec{E}$: compute the scalar $V$ by Coulomb superposition (just adding numbers), then differentiate to get the vector $\\vec{E}$.</p>
<p><strong>Global structure:</strong> This is the upward arrow from $V$ to $\\vec{E}$ — the inverse path of $V = -\\int\\vec{E}\\cdot d\\vec{s}$. Together these two form the fundamental calculus relationship between potential and field in electrostatics. This relationship is how the scalar potential $V$ (easy to compute by superposition) is leveraged to get the vector field $\\vec{E}$ (hard to compute by direct superposition). It also makes manifest that $\\vec{E}$ is perpendicular to equipotential surfaces.</p>
<p><strong>Gotcha:</strong> The gradient gives the direction of steepest increase of $V$, but $\\vec{E} = -\\nabla V$ (with the minus sign) so $\\vec{E}$ points in the direction of steepest decrease. Electric field lines point from high to low potential — just like a ball rolling downhill points from high to low elevation. Equipotential surfaces (where $V$ is constant) have $\\nabla V$ perpendicular to them, so $\\vec{E}$ is also perpendicular to equipotentials.</p>`,

  /* L2 → L3 */
  { from:'gauss', to:'V',
    label:'use $\\vec{E}$ from Gauss',
    bend:-15, lf:.5,
    edgeTip:{
      tag:'Gauss → Potential',
      title:'Find $V$ via Gauss\'s $\\vec{E}$',
      equation:'$V = -\\displaystyle\\int \\vec{E}_{\\text{Gauss}}\\cdot d\\vec{s}$',
      meaning:`<p><strong>What it means:</strong> The two-step Gauss strategy: first use Gauss's law to find $\\vec{E}$ (exploiting the geometry's symmetry to reduce the surface integral to algebra), then integrate $\\vec{E}$ along a radial path to get $V$. This is the standard approach for finding potential around spherically or cylindrically symmetric charge distributions — much faster than direct superposition of potentials from charge elements.</p>
<p><strong>Calculus:</strong> Step 1 (Gauss): $\\oint \\vec{E}\\cdot d\\vec{A} = q_{\\text{enc}}/\\varepsilon_0$ $\\Rightarrow$ $E\\cdot A_{\\text{surface}} = q_{\\text{enc}}/\\varepsilon_0$ $\\Rightarrow$ $E(r)$ as a function of distance. Step 2 (integrate): $V(r) = -\\int_\\infty^r E(r')\\,dr'$ (choosing $V=0$ at infinity, integrating radially inward). For a sphere with charge $q$: $E = kq/r^2$ outside, so $V = -\\int_\\infty^r kq/r'^2\\,dr' = kq/r$.</p>
<p><strong>Global structure:</strong> This edge represents the most common multi-step problem type in E&M: use a symmetry law (Gauss) to get the field, then integrate the field to get the potential. The sequence $q \\to \\vec{E}$ (via Gauss) $\\to V$ (via integration) $\\to C = Q/V$ (by dividing) is the standard recipe for computing capacitance for any symmetric geometry.</p>
<p><strong>Gotcha:</strong> When integrating to find $V$, you must integrate from the reference point (usually $r = \\infty$) to the field point, and the integrand must use the $E(r)$ function appropriate for each region (inside vs. outside a sphere, inside vs. outside a cylindrical shell). A common error is using the wrong expression for $E$ in the wrong region.</p>`,

  { from:'B', to:'phiB',

      meaning:`<p><strong>What it means:</strong> Magnetic flux through a surface is the surface integral of the perpendicular component of $\\vec{B}$ — it counts how many magnetic field lines thread through the surface. A strong field over a large area means large flux; a field parallel to the surface contributes zero flux. Flux is not the field itself, but a scalar quantity derived from the field and the geometry of the surface.</p>
<p><strong>Calculus:</strong> $\\Phi_B = \\int_S \\vec{B}\\cdot d\\vec{A} = \\int_S B\\cos\\theta\\,dA$ is a surface integral — you're integrating over a 2D surface. For a flat surface in a uniform field: $\\Phi_B = BA\\cos\\theta$ (just a product). For non-uniform fields or curved surfaces, you need to parameterize the surface and integrate. The area element $d\\vec{A} = \\hat{n}\\,dA$ includes the outward (or chosen) normal direction.</p>
<p><strong>Global structure:</strong> This edge is the magnetic analog of the edge from $\\vec{E}$ to $\\Phi_E$. The resulting flux $\\Phi_B$ is the quantity that Faraday's law differentiates: $\\mathcal{E} = -d\\Phi_B/dt$. It also appears in the definition of inductance ($L = N\\Phi_B/i$) and in Maxwell's second equation ($\\oint \\vec{B}\\cdot d\\vec{A} = 0$ for any closed surface).</p>
<p><strong>Gotcha:</strong> The value of $\\Phi_B$ depends on which surface you choose — but only for open surfaces. For closed surfaces, $\\oint \\vec{B}\\cdot d\\vec{A} = 0$ always. For open surfaces bounded by the same loop, all choices give the same flux (by $\\nabla\\cdot\\vec{B} = 0$ and Stokes' theorem). The sign of $\\Phi_B$ depends on your choice of the normal direction to the surface (linked to the loop orientation by the right-hand rule).</p>`,
