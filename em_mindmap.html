      tag:'Potential → Capacitance',
      title:'Capacitance from $V$ and $Q$',
      equation:'$C = Q/V$',
      meaning:`<p><strong>What it means:</strong> Once you know the potential difference $V$ between two conductors for a given stored charge $Q$, the capacitance is simply $C = Q/V$. The procedure is: (1) place charge $+Q$ on one conductor and $-Q$ on the other, (2) find $\\vec{E}$ between them (usually via Gauss's law), (3) integrate $\\vec{E}$ to find $V$, (4) form the ratio $C = Q/V$. Notice that $Q$ cancels out — $C$ depends only on geometry and the material between the conductors.</p>
<p><strong>Calculus:</strong> The derivation combines two integrals. First, Gauss's law (a closed surface integral) gives $E$ in terms of $Q$. Second, the line integral $V = -\\int \\vec{E}\\cdot d\\vec{s}$ gives $V$ in terms of $E$ (and hence $Q$). The ratio $C = Q/V$ then has $Q$ in numerator and denominator, so it cancels — leaving $C$ as a purely geometric quantity. For a parallel-plate capacitor: $E = Q/\\varepsilon_0 A$, $V = Ed = Qd/\\varepsilon_0 A$, $C = Q/V = \\varepsilon_0 A/d$.</p>
<p><strong>Global structure:</strong> This edge marks the transition from the field world (V) to the circuit world (C). Capacitance is defined through $V$ and $Q$, but it's computed via Gauss's law and integration — making it the culmination of the electrostatic hierarchy. In circuits, $C$ appears in the RC time constant, in the energy $U = \\frac{1}{2}CV^2$, and in AC circuit analysis (capacitive reactance $X_C = 1/\\omega C$).</p>
<p><strong>Gotcha:</strong> $C$ is always positive (by definition), which requires $Q$ and $V$ to have the same sign. Also, $C$ is a property of the geometry — doubling the stored charge $Q$ doubles the voltage $V$, leaving $C = Q/V$ unchanged. Adding a dielectric increases $C$ by factor $\\kappa$ because the dielectric reduces the effective $\\vec{E}$ (and hence $V$) for the same $Q$.</p>`,
      connects:'Electric Potential $V$ → Capacitance $C$'
    }
  },
  { from:'E', to:'uE',
    label:'$u = \\tfrac{1}{2}\\varepsilon_0 E^2$',
    bend:-20, lf:.45,
    edgeTip:{
      tag:'E Field → Energy Density',
      title:'Energy stored in $\\vec{E}$',
      equation:'$u_E = \\tfrac{1}{2}\\varepsilon_0 E^2$ [J/m³]',
      meaning:`<p><strong>What it means:</strong> Every region of space where $\\vec{E} \\neq 0$ contains electromagnetic energy at a density of $u_E = \\frac{1}{2}\\varepsilon_0 E^2$ joules per cubic meter. The energy is in the field, not in the charges. To find the total energy in a field configuration, integrate $u_E$ over all of space: $U = \\frac{1}{2}\\varepsilon_0 \\int E^2\\,dV$. This is equivalent to the work done against the electric force to assemble the charge distribution from infinity.</p>
<p><strong>Calculus:</strong> The derivation starts from the capacitor energy $U = \\frac{1}{2}CV^2$ and uses substitution: $C = \\varepsilon_0 A/d$ (from Gauss + integration) and $V = Ed$ (uniform field between plates), giving $U = \\frac{1}{2}(\\varepsilon_0 A/d)(Ed)^2 = \\frac{1}{2}\\varepsilon_0 E^2(Ad)$. Dividing by the volume $Ad$ gives $u_E = \\frac{1}{2}\\varepsilon_0 E^2$. For non-uniform fields, the total energy is the volume integral $U = \\int u_E\\,dV$.</p>
<p><strong>Global structure:</strong> This edge represents the "field picture" of energy storage — energy lives in space wherever $\\vec{E}$ exists. This viewpoint is essential for understanding electromagnetic waves, where energy is carried through empty space by the oscillating fields. The magnetic analog $u_B = B^2/(2\\mu_0)$ completes the picture — both field energies contribute to the Poynting vector $\\vec{S} = (\\vec{E}\\times\\vec{B})/\\mu_0$ (energy flux of EM waves).</p>
<p><strong>Gotcha:</strong> $u_E \\propto E^2$ — the energy density is not proportional to $E$ but to its square. This means a field twice as strong stores four times the energy per unit volume. Also, $u_E \\geq 0$ always (energy is never negative), which makes sense since it costs positive work to build up an electric field against the repulsion of like charges.</p>`,
      connects:'Electric Field $\\vec{E}$ → Energy Density $u_E$'
    }
  },
  { from:'phiB', to:'emf',
    label:'$\\mathcal{E}=-d\\Phi_B/dt$',
    bend: 10, lf:.5, color:'#fb7185',
    edgeTip:{
      tag:'Flux → EMF',
      title:"Faraday's Law: $\\dot{\\Phi}_B$ drives EMF",
      equation:'$\\mathcal{E} = -\\dfrac{d\\Phi_B}{dt}$',
      meaning:`<p><strong>What it means:</strong> This is Faraday's law in its most compact form: the induced EMF around a loop equals the negative rate of change of magnetic flux through that loop. "EMF" here means the work done per unit charge around the loop — it's a voltage that drives current. If $\\Phi_B$ is increasing (say, a bar magnet approaching a coil), the induced EMF drives a current that creates a $\\vec{B}$ field opposing the increase (Lenz's law). The minus sign is Lenz's law: nature opposes change.</p>
<p><strong>Calculus:</strong> This is an ordinary time derivative of the flux: $\\mathcal{E} = -d\\Phi_B/dt$. But $\\Phi_B = \\int \\vec{B}\\cdot d\\vec{A}$ is itself a surface integral — so Faraday's law relates a time derivative to a space integral. The flux can change three ways: $|\\vec{B}|$ changes (transformer), the area changes (generator), or the angle between $\\vec{B}$ and the surface changes (motor/rotating coil). All three are captured by $d\\Phi_B/dt$.</p>
<p><strong>Global structure:</strong> This edge is the key coupling from the magnetic world to the electric world — a changing $\\Phi_B$ produces an $\\mathcal{E}$ that can drive current, heat resistors, charge capacitors, and store energy in inductors. It's the foundation of electromagnetic induction, generators, transformers, and inductors. It elevates to Maxwell III ($\\nabla\\times\\vec{E} = -\\partial\\vec{B}/\\partial t$) in the full field picture.</p>
<p><strong>Gotcha:</strong> The sign determines the direction of the induced current via Lenz's law — the induced current creates a $\\vec{B}$ that opposes the change in flux. Students often get the sign wrong: if flux is decreasing, the induced $\\vec{B}$ (from the induced current) points to restore it (same direction as original $\\vec{B}$). Establish your sign convention for the loop normal first, then determine the sign of $d\\Phi_B/dt$, and the sign of $\\mathcal{E}$ follows.</p>`,
      connects:'Magnetic Flux $\\Phi_B$ → Faraday / EMF'
    }
  },
  { from:'E', to:'iJ',
    label:'$\\vec{J}=\\sigma\\vec{E}$',
    bend: 15, lf:.5,
    edgeTip:{
      tag:'E Field → Current Density',
      title:"Ohm's Law (microscopic)",
      equation:'$\\vec{J} = \\sigma\\vec{E}$',
      meaning:`<p><strong>What it means:</strong> Inside a conductor, the electric field $\\vec{E}$ drives a current density $\\vec{J}$ proportional to $\\vec{E}$, with conductivity $\\sigma$ as the proportionality constant. This is the deep, microscopic form of Ohm's law — it holds at every point in the material, not just globally. High $\\sigma$ (good conductor like copper) means a small $\\vec{E}$ drives a large $\\vec{J}$. Low $\\sigma$ (insulator) means even a large $\\vec{E}$ drives negligible current.</p>
<p><strong>Calculus:</strong> This is a local (pointwise) relationship between two vector fields. The macroscopic Ohm's law $V = iR$ follows by integration: integrate $\\vec{J} = \\sigma\\vec{E}$ over the cross-section to get $i = \\sigma E A$, integrate $\\vec{E}$ along the wire length to get $V = EL$, then $V/i = L/\\sigma A = \\rho L/A = R$. The microscopic law is more fundamental — it works for non-uniform fields and geometries where the macroscopic law would need modification.</p>
<p><strong>Global structure:</strong> This edge is the bridge from the field world ($\\vec{E}$) to the current world ($\\vec{J}$, $i$). It connects Maxwell's equations (which describe $\\vec{E}$) to circuit analysis (which deals with $i$ and $V$). The conductivity $\\sigma = 1/\\rho$ is a material property that appears in Drude model derivations and determines the resistivity $\\rho$ of materials.</p>
<p><strong>Gotcha:</strong> Ohm's law ($\\vec{J} = \\sigma\\vec{E}$) is an approximation valid for many materials (ohmic conductors) but not all. Semiconductors, plasma, and biological tissues have more complex conductivity tensors or nonlinear responses. Also, in a perfect conductor $\\sigma \\to \\infty$, so $\\vec{E} = 0$ inside (any finite $\\vec{J}$ requires zero $\\vec{E}$) — confirming that electrostatic equilibrium inside conductors has $\\vec{E} = 0$.</p>`,
      connects:'Electric Field $\\vec{E}$ → Current $i$ / Density $\\vec{J}$'
    }
  },
  { from:'q', to:'iJ',
    label:'$i=dq/dt$',
    bend: 10, lf:.55,
    edgeTip:{
      tag:'Charge → Current',
      title:'Current as flowing charge',
      equation:'$i = dq/dt$',
      meaning:`<p><strong>What it means:</strong> Current is the rate at which charge flows past a cross-section — one ampere is one coulomb per second. This is the defining relationship connecting the static concept of charge to the dynamic concept of current. It's a time derivative: $i = dq/dt$ means you're measuring how many coulombs flow through a surface per unit time. Conventional current is defined in the direction positive charges would flow (even in metals, where electrons flow oppositely).</p>
<p><strong>Calculus:</strong> $i = dq/dt$ is an ordinary time derivative. Conversely, $q = \\int_0^t i(t')\\,dt'$ — the charge that has flowed is the integral of current over time. For spatially distributed currents, the current through a surface is $i = \\int \\vec{J}\\cdot d\\vec{A}$ — a surface integral of current density. The continuity equation $\\partial\\rho/\\partial t + \\nabla\\cdot\\vec{J} = 0$ (conservation of charge) involves both time derivatives and divergence (spatial derivatives).</p>
<p><strong>Global structure:</strong> This edge shows that charge (the root node) directly determines current (through its time derivative). Current then feeds into Ohm's law, Ampere's law, and the definition of resistance. The continuity equation connecting $i = dq/dt$ to $\\nabla\\cdot\\vec{J} = 0$ is a local form of charge conservation — one of the most fundamental laws in physics.</p>
<p><strong>Gotcha:</strong> $i = dq/dt$ defines the instantaneous current from the total charge flowing through a surface. Be careful: charge here is the charge that has flowed through the surface (not the charge on a capacitor plate, which would give $i = C\\,dV/dt$ in a different context). Also, DC current (constant $i$) means $q$ increases linearly with time; AC current means $i$ oscillates, so $q$ oscillates too.</p>`,
      connects:'Charge $q$ → Current $i$ / Density $\\vec{J}$'
    }
  },

  /* L4 → L5 */
  { from:'iJ', to:'R',
    label:'$R=\\rho L/A$',
    bend:-15, lf:.5,
    edgeTip:{
      tag:'Current → Resistance',
      title:'Geometry sets $R$',
      equation:'$R = \\rho L/A$',
      meaning:`<p><strong>What it means:</strong> Resistance is determined by the material (resistivity $\\rho$) and the geometry (length $L$, cross-sectional area $A$). A longer wire means more material for electrons to scatter through — higher $R$. A wider wire means more parallel paths for current — lower $R$. Resistivity $\\rho$ is a material property that captures how easily charge flows: copper has very low $\\rho$, glass has very high $\\rho$. The macroscopic $R = V/i$ follows from integrating $\\vec{J} = \\sigma\\vec{E}$ over the geometry.</p>
<p><strong>Calculus:</strong> The derivation is: $\\vec{J} = \\sigma\\vec{E}$ (microscopic) $\\Rightarrow$ $i = JA = \\sigma EA$ $\\Rightarrow$ and $V = EL$ (uniform field in wire) $\\Rightarrow$ $R = V/i = EL/(\\sigma EA) = L/\\sigma A = \\rho L/A$. For non-uniform cross-sections, $R = \\int \\rho\\,dL/A(L)$ — a line integral of resistivity per unit area along the length. Temperature dependence: $\\rho(T) = \\rho_0[1 + \\alpha(T - T_0)]$ is a linear approximation valid for small temperature changes.</p>
<p><strong>Global structure:</strong> Resistance is the macroscopic face of microscopic scattering. It's where the field picture ($\\vec{J} = \\sigma\\vec{E}$) meets the circuit picture ($V = iR$). $R$ sets the RC and RL time constants: $\\tau_{RC} = RC$ (larger $R$ slows charging) and $\\tau_{RL} = L/R$ (larger $R$ speeds up decay of current in an inductor). Power dissipation $P = i^2R = V^2/R$ means $R$ determines heat generation.</p>
<p><strong>Gotcha:</strong> Resistors in series add: $R_{\\text{total}} = R_1 + R_2 + \\ldots$ (same current, voltages add). Resistors in parallel: $1/R_{\\text{total}} = 1/R_1 + 1/R_2 + \\ldots$ (same voltage, currents add). This is the opposite of capacitors (parallel adds directly, series adds as reciprocals) — a common source of confusion. Also, Ohm's law $V = iR$ assumes constant $R$ (temperature-independent) — valid for metals over modest temperature ranges.</p>`,
      connects:'Current $i$ / $\\vec{J}$ → Resistance $R$'
    }
  },
  { from:'emf', to:'L',
    label:'$\\mathcal{E}=-L\\,di/dt$',
    bend: 10, lf:.5,
    edgeTip:{
      tag:'EMF → Inductance',
      title:'Back-EMF defines inductance',
      equation:'$\\mathcal{E} = -L\\,\\dfrac{di}{dt}$',
      meaning:`<p><strong>What it means:</strong> When current through a coil changes, the coil's own changing magnetic flux induces a back-EMF that opposes the change (Lenz's law). The proportionality constant between the back-EMF and $di/dt$ is the inductance $L$. A large $L$ means even a slow change in current produces a large back-EMF — the coil strongly resists changes in current. This is electromagnetic inertia: just as mass (inertia) resists changes in velocity ($F = ma$), inductance resists changes in current ($\\mathcal{E} = -L\\,di/dt$).</p>
<p><strong>Calculus:</strong> $\\mathcal{E} = -L\\,di/dt$ is a first-order time derivative — the back-EMF depends on how fast the current changes, not on the current's magnitude. This makes the RL circuit equation $V_0 = iR + L\\,di/dt$ a first-order linear ODE, with exponential solution $i(t) = (V_0/R)(1 - e^{-Rt/L})$ and time constant $\\tau = L/R$. The definition $L = N\\Phi_B/i$ requires computing flux linkage: $\\Phi_B = \\int \\vec{B}\\cdot d\\vec{A}$ for each turn, multiplied by the number of turns $N$.</p>
<p><strong>Global structure:</strong> This edge connects Faraday's law (EMF from changing flux) to the circuit element inductance (the back-EMF from self-induction). It's the circuit-level manifestation of Maxwell III. Inductance appears in RL time constants, LC oscillations (where $L$ and $C$ trade energy back and forth), and AC impedance ($Z_L = j\\omega L$ — inductors block high-frequency current).</p>
<p><strong>Gotcha:</strong> The energy $U_L = \\frac{1}{2}Li^2$ is stored in the magnetic field of the inductor. Suddenly interrupting an inductor's current (opening a switch) forces $di/dt \\to \\infty$, producing a theoretically infinite back-EMF — in practice, a large voltage spike that can arc across the switch or damage circuit components. Always include a flyback diode across inductive loads in real circuits.</p>`,
      connects:'EMF → Inductance $L$'
    }
  },
  { from:'C', to:'trans',
    label:'$\\tau=RC$',
    bend: 10, lf:.5,
    edgeTip:{
      tag:'Capacitance → RC Transient',
      title:'RC time constant',
      equation:'$\\tau = RC$, $V_C(t) = V_0(1-e^{-t/RC})$',
      meaning:`<p><strong>What it means:</strong> In an RC circuit, the capacitor charges through the resistor toward the supply voltage $V_0$, following an exponential curve with time constant $\\tau = RC$. After time $\\tau$, the voltage has reached $1 - 1/e \\approx 63\\%$ of $V_0$. After $5\\tau$, it's at $99.3\\%$ — effectively fully charged. A large $C$ means more charge is needed to reach $V_0$, slowing the process; a large $R$ limits current flow, also slowing it. Both factors appear multiplicatively in $\\tau = RC$.</p>
<p><strong>Calculus:</strong> Kirchhoff's voltage law gives $V_0 = V_R + V_C = iR + q/C = R\\,dq/dt + q/C$. This is a first-order linear ODE: $dq/dt + q/(RC) = V_0/R$. Its general solution is $q(t) = CV_0(1 - e^{-t/RC}) + q_0 e^{-t/RC}$. The homogeneous solution $e^{-t/RC}$ is the transient; the particular solution $CV_0$ is the steady state. The time constant $\\tau = RC$ has units: $[\\Omega][F] = [V/A][C/V] = [C/(C/s)] = [s]$.</p>
<p><strong>Global structure:</strong> The RC time constant connects the capacitor (electrostatic energy storage) to the resistor (energy dissipation) in a dynamic circuit. $\\tau = RC$ is the fundamental timescale of the circuit's response — it determines bandwidth in filters ($f_{3dB} = 1/(2\\pi RC)$), settling time in amplifiers, and the speed of signal transmission in transmission lines. Electrically, $C$ contributes the "memory" and $R$ contributes the "friction."</p>
<p><strong>Gotcha:</strong> The exponential $e^{-t/RC}$ starts at 1 when $t=0$ and decays toward 0 — the voltage across the capacitor starts at 0 (if uncharged) and rises to $V_0$. The voltage across the resistor does the opposite (starts at $V_0$, decays to 0). At $t = \\tau$, $V_C = V_0(1 - e^{-1}) = 0.632\\,V_0$ — not halfway, but 63% of the way. Be careful not to confuse half-life ($t_{1/2} = \\tau\\ln 2 \\approx 0.693\\tau$) with the time constant.</p>`,
      connects:'Capacitance $C$ → RC/RL Transients'
    }
  },
  { from:'R', to:'trans',
    label:'$\\tau=RC$',
    bend:-10, lf:.5,
    edgeTip:{
      tag:'Resistance → RC Transient',
      title:'$R$ sets the charging rate',
      equation:'$\\tau = RC$',
      meaning:`<p><strong>What it means:</strong> The resistor in an RC circuit acts as a bottleneck — it limits the current that can flow to charge the capacitor. A higher resistance means less current for the same voltage, so the capacitor charges more slowly. The time constant $\\tau = RC$ grows linearly with $R$: double the resistance, double the time to reach the same fraction of full charge. Conversely, in an RL circuit, $R$ provides damping: $\\tau_{RL} = L/R$ decreases with $R$, meaning larger $R$ makes the current reach its final value faster.</p>
<p><strong>Calculus:</strong> In the ODE $R\\,dq/dt + q/C = V_0$, $R$ appears as the coefficient of the time derivative. The solution is $q(t) = CV_0(1 - e^{-t/RC})$, and $\\tau = RC$ is the coefficient of $t$ in the exponent. Dimensionally, $[R][C] = [\\Omega][F] = [V\\cdot s/C][C/V] = [s]$. A larger $R$ increases $\\tau$, stretching the exponential curve horizontally in time.</p>
<p><strong>Global structure:</strong> Resistance's role in the transient is to set the rate of energy dissipation — the energy stored in the capacitor ($\\frac{1}{2}CV^2$) is ultimately dissipated as heat in the resistor. This is true regardless of $R$: the total energy dissipated in charging a capacitor from 0 to $V_0$ is always $\\frac{1}{2}CV_0^2$, equal to the energy stored, and all of it ends up in $R$ as heat.</p>
<p><strong>Gotcha:</strong> In an RL circuit, the role of $R$ reverses: $\\tau_{RL} = L/R$, so larger $R$ gives a shorter time constant (current reaches steady state faster). This is because in RL, $R$ is the dissipation that damps the back-EMF transient. In RC, $R$ slows charging. In RL, $R$ speeds up the decay of the transient. The two circuits are mathematically dual in this sense.</p>`,
      connects:'Resistance $R$ → RC/RL Transients'
    }
  },
  { from:'L', to:'trans',
    label:'$\\tau=L/R$',
    bend:-10, lf:.5,
    edgeTip:{
      tag:'Inductance → RL Transient',
      title:'RL time constant',
      equation:'$\\tau = L/R$, $i(t) = \\tfrac{V_0}{R}(1-e^{-Rt/L})$',
      meaning:`<p><strong>What it means:</strong> In an RL circuit (voltage source, resistor, and inductor in series), the current cannot instantaneously reach $V_0/R$ when the switch is closed — the inductor's back-EMF $\\mathcal{E}_L = -L\\,di/dt$ opposes the rise. The current climbs exponentially toward $V_0/R$ with time constant $\\tau = L/R$. A large $L$ means more electromagnetic inertia (more back-EMF for the same $di/dt$), giving a longer time constant. A large $R$ damps the transient more strongly, giving a shorter time constant.</p>
<p><strong>Calculus:</strong> Kirchhoff's voltage law: $V_0 = iR + L\\,di/dt$. Rearranging: $di/dt + (R/L)i = V_0/L$ — a first-order linear ODE in $i(t)$. Solution: $i(t) = (V_0/R)(1 - e^{-Rt/L})$ with time constant $\\tau = L/R$. Dimensionally: $[H]/[\\Omega] = [V\\cdot s/A]/[V/A] = [s]$. At $t = \\tau$, the current is at $63\\%$ of its final value $V_0/R$; at $t = 5\\tau$ it's effectively at steady state.</p>
<p><strong>Global structure:</strong> The RL transient is the magnetic analog of the RC transient: RC stores energy in $\\vec{E}$ (capacitor), RL stores energy in $\\vec{B}$ (inductor). Both follow the same mathematical form — an exponential approach to equilibrium. The time constant sets the bandwidth of the RL circuit as a low-pass filter: frequencies $f \\ll R/(2\\pi L)$ pass freely, while high frequencies are blocked by the inductor's impedance $Z_L = j\\omega L$.</p>
<p><strong>Gotcha:</strong> When the circuit is opened (switch off), the inductor tries to maintain the current — if the switch opens instantaneously, $di/dt \\to \\infty$ and $L\\,di/dt$ becomes enormous, producing a large voltage spike. This is the "inductive kick" — it can destroy switches and transistors. The exponential decay after switch-off has the same time constant $\\tau = L/R$ (with $R$ being whatever the current path sees, including the arc resistance of the switch).</p>`,
      connects:'Inductance $L$ → RC/RL Transients'
    }
  },

  { from:'gauss', to:'mx1',

  { from:'phiB',  to:'mx2',
    label:'$\\nabla\\cdot\\vec{B}=0$',
    bend: 0, lf:.5,
    edgeTip:{
      tag:'Magnetic Flux → Maxwell II',
      title:'No magnetic monopoles',
      equation:'$\\oint \\vec{B}\\cdot d\\vec{A} = 0 \\;\\Leftrightarrow\\; \\nabla\\cdot\\vec{B}=0$',
      meaning:`<p><strong>What it means:</strong> Because $\\Phi_B = \\oint \\vec{B}\\cdot d\\vec{A} = 0$ for any closed surface, $\\vec{B}$ field lines are always closed loops — they never start or end anywhere. This is Maxwell's second equation, expressing the absence of magnetic monopoles (no magnetic analog of electric charge). Every field line that enters a closed volume must exit it — the net magnetic flux through any closed surface is always exactly zero.</p>
<p><strong>Calculus:</strong> The integral form $\\oint \\vec{B}\\cdot d\\vec{A} = 0$ is a closed surface integral equaling zero. Via the divergence theorem, this is equivalent to the differential form $\\nabla\\cdot\\vec{B} = 0$ everywhere — the divergence of $\\vec{B}$ vanishes at every point in space. This also guarantees the existence of a vector potential $\\vec{A}$ such that $\\vec{B} = \\nabla\\times\\vec{A}$ (the curl of any vector field is automatically divergence-free).</p>
<p><strong>Global structure:</strong> This edge connects magnetic flux $\\Phi_B$ to Maxwell II — the simplest of the four Maxwell equations but a profound statement about the structure of the magnetic field. Compare it to Maxwell I ($\\nabla\\cdot\\vec{E} = \\rho/\\varepsilon_0$, which has a source term $\\rho$) — the absence of a source term here (no $\\rho_m$) is exactly the statement that magnetic monopoles don't exist. It also guarantees that Faraday's law is well-defined (the surface doesn't matter when computing $\\Phi_B$).</p>
<p><strong>Gotcha:</strong> $\\nabla\\cdot\\vec{B} = 0$ does not mean $\\vec{B} = 0$ everywhere — it means $\\vec{B}$ has no sources or sinks. A solenoid has a strong $\\vec{B}$ inside but $\\nabla\\cdot\\vec{B} = 0$ everywhere because the field lines are closed loops running through the inside of the solenoid and looping back around the outside. Also, this equation implies the magnetic flux through any cross-section of a solenoid is the same (flux is "conserved" along the solenoid like fluid in a pipe).</p>`,
      connects:'Magnetic Flux $\\Phi_B$ → Maxwell II (Gauss B)'
    }
  },
  { from:'emf',   to:'mx3',

  { from:'ampere', to:'mx4',
    label:'+disp. current $i_d$',
    bend: 15, lf:.55,
    edgeTip:{
      tag:"Ampère → Maxwell IV",
      title:"Maxwell's displacement current",
      equation:'$\\oint \\vec{B}\\cdot d\\vec{s} = \\mu_0 i_{\\text{enc}} + \\mu_0\\varepsilon_0\\dfrac{d\\Phi_E}{dt}$',
      meaning:`<p><strong>What it means:</strong> The original Ampere's law $\\oint \\vec{B}\\cdot d\\vec{s} = \\mu_0 i_{\\text{enc}}$ has an inconsistency when applied to a capacitor circuit: the current flows in the wires but not through the gap between the plates — so choosing different surfaces bounded by the same Amperian loop gives different answers. Maxwell fixed this by adding the displacement current $i_d = \\varepsilon_0\\,d\\Phi_E/dt$. In the gap, $\\vec{E}$ is changing (as the capacitor charges), and $\\varepsilon_0\\,d\\Phi_E/dt$ exactly equals the real current in the wire — restoring consistency.</p>
<p><strong>Calculus:</strong> The displacement current term involves both a surface integral (to compute $\\Phi_E = \\int \\vec{E}\\cdot d\\vec{A}$) and a time derivative ($d/dt$). The differential form $\\nabla\\times\\vec{B} = \\mu_0\\vec{J} + \\mu_0\\varepsilon_0\\partial\\vec{E}/\\partial t$ involves the curl of $\\vec{B}$ on the left and both a current density term and a partial time derivative of $\\vec{E}$ on the right. This makes it a PDE coupling $\\vec{B}$ and $\\vec{E}$.</p>
<p><strong>Global structure:</strong> Adding displacement current to Ampere's law completed Maxwell's equations and was the key step that allowed him to predict electromagnetic waves. In free space ($\\vec{J} = 0$), Maxwell III and IV become: $\\nabla\\times\\vec{E} = -\\partial\\vec{B}/\\partial t$ and $\\nabla\\times\\vec{B} = \\mu_0\\varepsilon_0\\partial\\vec{E}/\\partial t$. Taking the curl of one and substituting the other yields the wave equation with $c = 1/\\sqrt{\\mu_0\\varepsilon_0} = 3\\times10^8$ m/s — confirming light is an electromagnetic wave.</p>
<p><strong>Gotcha:</strong> The displacement current $\\varepsilon_0\\,d\\Phi_E/dt$ is not a flow of charge — nothing physically moves in the capacitor gap. Yet it produces a $\\vec{B}$ field exactly as if it were a real current. Maxwell's insight was purely theoretical, motivated by mathematical consistency, not experimental observation. The subsequent confirmation of electromagnetic waves vindicated this bold addition to Ampere's law.</p>`,
      connects:"Ampère's Law → Maxwell IV (Ampère–Maxwell)"
    }
  },

  /* cross-layer: ampere → J */
  { from:'iJ', to:'ampere',

    edgeTip:{
      tag:'Current → Ampère',
      title:'Enclosed current drives $\\oint\\vec{B}\\cdot d\\vec{s}$',
      equation:'$\\oint_C \\vec{B}\\cdot d\\vec{s} = \\mu_0\\,i_{\\text{enc}}$',
      meaning:`<p><strong>What it means:</strong> The source term in Ampere's law is the total current threading through any surface bounded by the Amperian loop. Current is both the source of $\\vec{B}$ (via Ampere's law) and the consequence of $\\vec{E}$ (via $\\vec{J} = \\sigma\\vec{E}$). This edge closes the loop: current ($i_{\\text{enc}}$) drives circulation of $\\vec{B}$, and that $\\vec{B}$ is the field that acts on other moving charges. More enclosed current means stronger circulation of $\\vec{B}$ — doubling $i_{\\text{enc}}$ doubles $\\oint \\vec{B}\\cdot d\\vec{s}$.</p>
<p><strong>Calculus:</strong> The enclosed current is the flux of current density through a surface: $i_{\\text{enc}} = \\int_S \\vec{J}\\cdot d\\vec{A}$, where $S$ is any surface bounded by the Amperian loop. This is itself a surface integral. The key insight is that for steady currents ($\\nabla\\cdot\\vec{J} = 0$), any surface bounded by the same loop gives the same $i_{\\text{enc}}$ — this is what makes Ampere's law well-defined before the displacement current correction is added.</p>
<p><strong>Global structure:</strong> This cross-layer edge is important: it shows that current $i_{\\text{enc}}$ is not just a circuit quantity but also the source term in an integral field law. This connects the circuit layer (Layer 4: current and resistance) to the integral law layer (Layer 2: Ampere's law). It also shows the Maxwell structure: real current ($\\mu_0 i_{\\text{enc}}$) and displacement current ($\\mu_0\\varepsilon_0 d\\Phi_E/dt$) are the two sources of circulating $\\vec{B}$ in Maxwell IV.</p>
<p><strong>Gotcha:</strong> Which surface do you choose? For simple symmetric current distributions (a long wire), it doesn't matter — any surface gives the same $i_{\\text{enc}}$. But for the capacitor problem, the "naive" choice (a flat disk surface through the wire) gives $i_{\\text{enc}} = i$, while a "bulging" surface through the capacitor gap gives $i_{\\text{enc}} = 0$ from real current — this apparent contradiction is exactly what the displacement current resolves.</p>`,
      connects:'Current $i$ / $\\vec{J}$ → Ampère\'s Law'
    }
  },

  /* biot → B closes loop */
  { from:'biot', to:'B',
    label:'$\\vec{B}=\\int d\\vec{B}$',
    bend: 30, lf:.35,
    edgeTip:{
      tag:'Biot-Savart → B',
      title:'Superpose $d\\vec{B}$ contributions',
      equation:'$\\vec{B} = \\displaystyle\\int d\\vec{B} = \\dfrac{\\mu_0 i}{4\\pi}\\int\\dfrac{d\\vec{s}\\times\\hat{r}}{r^2}$',
      meaning:`<p><strong>What it means:</strong> Biot-Savart's law gives the complete recipe for computing $\\vec{B}$ from any current distribution by superposition. Slice the wire into infinitesimal elements $id\\vec{s}$, compute each contribution $d\\vec{B}$ using the cross product formula, and integrate to get the total $\\vec{B}$ at the field point. The superposition principle is exact (for linear media) — fields from different current elements simply add as vectors.</p>
<p><strong>Calculus:</strong> $\\vec{B} = \\frac{\\mu_0 i}{4\\pi}\\int \\frac{d\\vec{s}\\times\\hat{r}}{r^2}$ is a vector line integral. The integrand is a vector (from the cross product), so each Cartesian component must be integrated separately. The integration variable parameterizes position along the wire; $\\hat{r}$ and $r$ both depend on this variable and on the field point location. Setting up this integral correctly — choosing a parameterization, computing $\\hat{r}$, simplifying by symmetry — is the main challenge of Biot-Savart problems.</p>
<p><strong>Global structure:</strong> This edge closes the Biot-Savart loop: the law (Biot-Savart node) computes $d\\vec{B}$ from each current element, and integration (this edge) sums them to recover $\\vec{B}$. Together, Biot-Savart and Ampere's law are the two routes to $\\vec{B}$ — use Ampere when there's enough symmetry, use Biot-Savart otherwise. The $1/r^2$ dependence and $1/4\\pi$ prefactor mirror the Coulomb law for $\\vec{E}$, making the two laws structurally parallel.</p>
<p><strong>Gotcha:</strong> Symmetry arguments are essential to making the integral tractable. For a circular loop, the components of $d\\vec{B}$ perpendicular to the loop axis cancel by symmetry (opposite elements contribute equal and opposite perpendicular components), leaving only the axial component. Always check what cancels before integrating. Also, superposition requires linear media — in nonlinear magnetic materials (ferromagnets), the fields don't simply add.</p>`,
      connects:'Biot-Savart Law → Magnetic Field $\\vec{B}$'
    }
  },
];

/* =========================================================
   COLOR MAP
   ========================================================= */
const COLOR = {
  fund: { border:'var(--c-fund)', bg:'var(--c-fund-bg)', tag:'#7c3aed' },
  elec: { border:'var(--c-elec)', bg:'var(--c-elec-bg)', tag:'#f97316' },
  mag:  { border:'var(--c-mag)',  bg:'var(--c-mag-bg)',  tag:'#3b82f6' },
  law:  { border:'var(--c-law)',  bg:'var(--c-law-bg)',  tag:'#14b8a6' },
  pot:  { border:'var(--c-pot)',  bg:'var(--c-pot-bg)',  tag:'#a3e635' },
  app:  { border:'var(--c-app)',  bg:'var(--c-app-bg)',  tag:'#fb7185' },
  ckt:  { border:'var(--c-ckt)',  bg:'var(--c-ckt-bg)',  tag:'#94a3b8' },
  max:  { border:'var(--c-max)',  bg:'var(--c-max-bg)',  tag:'#fbbf24' },
};

/* =========================================================
   LAYOUT CONSTANTS
   ========================================================= */
const NODE_W = 130;
const NODE_H = 56;

/* =========================================================
   BUILD DOM
   ========================================================= */
const stage  = document.getElementById('map-stage');
const svg    = document.getElementById('map-svg');

// Create arrowhead markers
const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');

function makeMarker(id, color) {
  const m = document.createElementNS('http://www.w3.org/2000/svg','marker');
  m.setAttribute('id', id);
  m.setAttribute('markerWidth','8');
  m.setAttribute('markerHeight','8');
  m.setAttribute('refX','7');
  m.setAttribute('refY','3');
  m.setAttribute('orient','auto');
  const p = document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d','M0,0 L0,6 L8,3 z');
  p.setAttribute('fill', color);
  m.appendChild(p);
  defs.appendChild(m);
}

makeMarker('arr-default',  '#4a5168');
makeMarker('arr-elec',     '#f97316');
makeMarker('arr-pot',      '#a3e635');
makeMarker('arr-app',      '#fb7185');
svg.appendChild(defs);

// Compute node centers
const nodeMap = {};
NODES.forEach(n => {
  n.cx = n.x + NODE_W / 2;
  n.cy = n.y + NODE_H / 2;
  nodeMap[n.id] = n;
});

// SVG canvas size: find max extents
const maxX = Math.max(...NODES.map(n=>n.x)) + NODE_W + 60;
const maxY = Math.max(...NODES.map(n=>n.y)) + NODE_H + 60;
svg.setAttribute('width',  maxX);
svg.setAttribute('height', maxY);
stage.style.width  = maxX + 'px';
stage.style.height = maxY + 'px';

/* ── Draw edges ── */
function getMarker(color) {
  if (!color) return 'arr-default';
  if (color === '#a3e635') return 'arr-pot';
  if (color === '#f97316') return 'arr-elec';
  if (color === '#fb7185') return 'arr-app';
  return 'arr-default';
}

EDGES.forEach((edge, ei) => {
  const a = nodeMap[edge.from];
  const b = nodeMap[edge.to];
  if (!a || !b) return;

  // Quadratic bezier with bend
  const mx = (a.cx + b.cx) / 2;
  const my = (a.cy + b.cy) / 2;
  const dx = b.cx - a.cx;
  const dy = b.cy - a.cy;
  const len = Math.sqrt(dx*dx + dy*dy) || 1;
  const bend = edge.bend || 0;
  const cpx = mx + (-dy / len) * bend;
  const cpy = my + ( dx / len) * bend;

  // Bezier param t for label
  const lf = edge.lf !== undefined ? edge.lf : 0.5;
  const lx = (1-lf)*(1-lf)*a.cx + 2*(1-lf)*lf*cpx + lf*lf*b.cx + (edge.nudge ? edge.nudge.x : 0);
  const ly = (1-lf)*(1-lf)*a.cy + 2*(1-lf)*lf*cpy + lf*lf*b.cy + (edge.nudge ? edge.nudge.y : 0);

  const edgeColor = edge.color || '#3a4060';
  const pathD = `M${a.cx},${a.cy} Q${cpx},${cpy} ${b.cx},${b.cy}`;

  // Visible path (non-clickable)
  const pathVis = document.createElementNS('http://www.w3.org/2000/svg','path');
  pathVis.setAttribute('d', pathD);
  pathVis.setAttribute('fill','none');
  pathVis.setAttribute('stroke', edgeColor);
  pathVis.setAttribute('stroke-width','1.5');
  pathVis.setAttribute('stroke-opacity','0.7');
  pathVis.setAttribute('marker-end', `url(#${getMarker(edge.color)})`);
  pathVis.classList.add('edge-path-vis');
  svg.appendChild(pathVis);

  // Invisible fat hit path (clickable) — only if there's an edgeTip
  if (edge.edgeTip) {
    const pathHit = document.createElementNS('http://www.w3.org/2000/svg','path');
    pathHit.setAttribute('d', pathD);
    pathHit.classList.add('edge-path');
    pathHit.style.pointerEvents = 'stroke';
    pathHit.style.cursor = 'pointer';
    pathHit.setAttribute('stroke', 'transparent');
    pathHit.setAttribute('stroke-width', '12');
    pathHit.setAttribute('fill', 'none');
    pathHit.addEventListener('click', (e) => {
      e.stopPropagation();
      openEdgeTooltip(edge);
    });
    svg.appendChild(pathHit);
  }

  // Label pill — placed as absolute div on stage (so MathJax works)
  if (edge.label) {
    const div = document.createElement('div');
    div.className = 'edge-label';
    div.style.left = lx + 'px';
    div.style.top  = ly + 'px';
    div.innerHTML = edge.label;
    if (edge.edgeTip) {
      div.addEventListener('click', (e) => {
        e.stopPropagation();
        openEdgeTooltip(edge, div);
      });
    } else {
      div.style.cursor = 'default';
    }
    edge._labelEl = div;
    stage.appendChild(div);
  }
});

/* ── Draw nodes ── */
NODES.forEach(n => {
  const c = COLOR[n.color];
  const div = document.createElement('div');
  div.className = 'node';
  div.id = 'node-' + n.id;
  div.style.cssText = `
    left:${n.x}px; top:${n.y}px;
    width:${NODE_W}px; min-height:${NODE_H}px;
    border-color:${c.border};
    background:${c.bg};
  `;
  div.innerHTML = `
    <div class="node-label" style="color:${c.border}">${n.label}</div>
    ${n.sub ? `<div class="node-sub">${n.sub}</div>` : ''}
    <div class="node-layer">${n.layer}</div>
  `;
  div.addEventListener('click', () => openTooltip(n));
  stage.appendChild(div);
});

/* =========================================================
   MATHJAX TYPESET — run after all DOM is built
   ========================================================= */
function typesetAll() {
  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([stage, document.getElementById('tooltip-panel')]).catch(e => console.warn('MathJax:', e));
  }
}

// MathJax loads async — wait for it
if (window.MathJax && MathJax.typesetPromise) {
  typesetAll();
} else {
  document.getElementById('MathJax-script').addEventListener('load', typesetAll);
  // fallback poll
  const mjPoll = setInterval(() => {
    if (window.MathJax && MathJax.typesetPromise) {
      clearInterval(mjPoll);
      typesetAll();
    }
  }, 150);
}

/* =========================================================
   TOOLTIP — node click
   ========================================================= */
let activeNode = null;
let activeEdgeLabel = null;

function openTooltip(n) {
  // clear any active edge label
  if (activeEdgeLabel) {
    activeEdgeLabel.classList.remove('active-edge');
    activeEdgeLabel = null;
  }

  const panel = document.getElementById('tooltip-panel');
  const tag   = document.getElementById('tp-tag');
  const title = document.getElementById('tp-title');
  const body  = document.getElementById('tp-body');
  const c = COLOR[n.color];

  if (activeNode) {
    document.getElementById('node-'+activeNode.id)?.classList.remove('active');
  }
  activeNode = n;
  document.getElementById('node-'+n.id)?.classList.add('active');

  tag.textContent = n.tip.tag;
  tag.style.background = c.bg;
  tag.style.color = c.border;
  tag.style.border = `1px solid ${c.border}`;

  title.innerHTML = n.tip.title;
  title.style.color = c.border;

  let eqHtml = `<div class="tp-section">
    <div class="tp-section-label">Key Equations</div>`;
  n.tip.equations.forEach(eq => {
    eqHtml += `<div class="tp-eq">${eq}</div>`;
  });
  if (n.tip.dims) {
    eqHtml += `<div class="tp-dim">${n.tip.dims}</div>`;
  }
  eqHtml += `</div>`;

  const inHtml = `<div class="tp-section">
    <div class="tp-section-label">Intuition</div>
    <p>${n.tip.intuition}</p>
  </div>`;

  body.innerHTML = eqHtml + inHtml;
  panel.classList.add('open');

  // Typeset the newly injected content
  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([panel]).catch(e => console.warn('MathJax:', e));
  }
}

/* =========================================================
   TOOLTIP — edge click
   ========================================================= */
function openEdgeTooltip(edge, labelEl) {
  if (!edge.edgeTip) return;

  // clear active node highlight
  if (activeNode) {
    document.getElementById('node-'+activeNode.id)?.classList.remove('active');
    activeNode = null;
  }
  // clear previous active edge label
  if (activeEdgeLabel) activeEdgeLabel.classList.remove('active-edge');
  if (labelEl) {
    activeEdgeLabel = labelEl;
    labelEl.classList.add('active-edge');
  }

  const et = edge.edgeTip;
  const panel = document.getElementById('tooltip-panel');
  const tag   = document.getElementById('tp-tag');
  const title = document.getElementById('tp-title');
  const body  = document.getElementById('tp-body');

  tag.textContent = et.tag;
  tag.style.background = 'var(--card)';
  tag.style.color = 'var(--text2)';
  tag.style.border = '1px solid var(--border2)';

  title.innerHTML = et.title;
  title.style.color = 'var(--text)';

  const eqHtml = `<div class="tp-section">
    <div class="tp-section-label">Equation</div>
    <div class="tp-eq">${et.equation}</div>
    <div class="tp-dim" style="margin-top:8px;color:var(--text2)">Connects: ${et.connects}</div>
  </div>`;

  const inHtml = `<div class="tp-section">
    <div class="tp-section-label">Physical Meaning</div>
    <p>${et.meaning}</p>
  </div>`;

  body.innerHTML = eqHtml + inHtml;
  panel.classList.add('open');

  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([panel]).catch(e => console.warn('MathJax:', e));
  }
}

function closeTooltip() {
  document.getElementById('tooltip-panel').classList.remove('open');
  if (activeNode) {
    document.getElementById('node-'+activeNode.id)?.classList.remove('active');
    activeNode = null;
  }
  if (activeEdgeLabel) {
    activeEdgeLabel.classList.remove('active-edge');
    activeEdgeLabel = null;
  }
}

/* =========================================================
   PAN & ZOOM — mouse + touch (pinch) unified
   ========================================================= */
const wrap = document.getElementById('map-wrap');
let scale = 1;
let tx = 40, ty = 20;
let isPanning = false;
let startX, startY, startTx, startTy;

// Pinch-to-zoom state
let pinchStartDist = 0;
let pinchStartScale = 1;
let pinchMidX = 0, pinchMidY = 0;
let pinchStartTx = 0, pinchStartTy = 0;

// Tap detection (touchend without significant movement = tap)
let touchStartX = 0, touchStartY = 0;
const TAP_THRESHOLD = 10; // px — if moved less than this, it's a tap

function applyTransform() {
  stage.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
}
applyTransform();

function fitToWindow() {
  const ww = window.innerWidth;
  const wh = window.innerHeight - 40;
  const scaleX = (ww - 80) / maxX;
  const scaleY = (wh - 80) / maxY;
  scale = Math.min(scaleX, scaleY, 1);
  tx = (ww - maxX * scale) / 2;
  ty = 20;
  applyTransform();
}
window.addEventListener('load', fitToWindow);
window.addEventListener('resize', fitToWindow);

function resetView() { fitToWindow(); }

/* ── Mouse pan ── */
wrap.addEventListener('mousedown', e => {
  if (e.target.classList.contains('node') || e.target.closest('.node')) return;
  if (e.target.classList.contains('edge-label')) return;
  isPanning = true;
  wrap.classList.add('dragging');
  startX = e.clientX; startY = e.clientY;
  startTx = tx; startTy = ty;
});
window.addEventListener('mousemove', e => {
  if (!isPanning) return;
  tx = startTx + (e.clientX - startX);
  ty = startTy + (e.clientY - startY);
  applyTransform();
});
window.addEventListener('mouseup', () => {
  isPanning = false;
  wrap.classList.remove('dragging');
});

/* ── Touch: pan (1 finger) + pinch-zoom (2 fingers) + tap ── */
wrap.addEventListener('touchstart', e => {
  // Always prevent default to stop iOS scroll / bounce interfering
  e.preventDefault();

  if (e.touches.length === 1) {
    const t = e.touches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;

    // Only start panning if not on an interactive element
    // (node/edge tap is handled on touchend)
    isPanning = true;
    startX = t.clientX; startY = t.clientY;
    startTx = tx; startTy = ty;

  } else if (e.touches.length === 2) {
    // Cancel any ongoing single-finger pan
    isPanning = false;

    const t0 = e.touches[0];
    const t1 = e.touches[1];
    const dx = t1.clientX - t0.clientX;
    const dy = t1.clientY - t0.clientY;
    pinchStartDist  = Math.sqrt(dx*dx + dy*dy);
    pinchStartScale = scale;

    // Midpoint of the two fingers in screen coords
    pinchMidX = (t0.clientX + t1.clientX) / 2;
    pinchMidY = (t0.clientY + t1.clientY) / 2;
    pinchStartTx = tx;
    pinchStartTy  = ty;
  }
}, { passive: false });

wrap.addEventListener('touchmove', e => {
  e.preventDefault();

  if (e.touches.length === 1 && isPanning) {
    const t = e.touches[0];
    tx = startTx + (t.clientX - startX);
    ty = startTy + (t.clientY - startY);
    applyTransform();

  } else if (e.touches.length === 2) {
    const t0 = e.touches[0];
    const t1 = e.touches[1];
    const dx = t1.clientX - t0.clientX;
    const dy = t1.clientY - t0.clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (pinchStartDist === 0) return;

    const newScale = Math.min(Math.max(pinchStartScale * (dist / pinchStartDist), 0.25), 3.0);
    const rect = wrap.getBoundingClientRect();

    // Keep pinch midpoint stationary in the viewport
    const mx = pinchMidX - rect.left;
    const my = pinchMidY - rect.top;
    tx = mx - (mx - pinchStartTx) * (newScale / pinchStartScale);
    ty = my - (my - pinchStartTy) * (newScale / pinchStartScale);
    scale = newScale;
    applyTransform();
  }
}, { passive: false });

wrap.addEventListener('touchend', e => {
  e.preventDefault();

  if (e.changedTouches.length === 1 && e.touches.length === 0) {
    const t = e.changedTouches[0];
    const movedX = Math.abs(t.clientX - touchStartX);
    const movedY = Math.abs(t.clientY - touchStartY);

    // If the finger barely moved, treat as a tap — fire click on the element
    if (movedX < TAP_THRESHOLD && movedY < TAP_THRESHOLD) {
      // Find what was under the finger at touchstart
      const el = document.elementFromPoint(t.clientX, t.clientY);
      if (el) {
        // Check node
        const nodeEl = el.closest('.node');
        if (nodeEl) {
          nodeEl.click();
          isPanning = false;
          return;
        }
        // Check edge label
        const edgeLabelEl = el.closest('.edge-label');
        if (edgeLabelEl) {
          edgeLabelEl.click();
          isPanning = false;
          return;
        }
        // Tap on empty map area — close panel
        if (!el.closest('#tooltip-panel') && !el.closest('#reset-btn')) {
          closeTooltip();
        }
      }
    }
  }

  // Reset pinch state when all fingers lift
  if (e.touches.length === 0) {
    isPanning = false;
    pinchStartDist = 0;
  } else if (e.touches.length === 1) {
    // Transition from pinch back to single-finger pan
    isPanning = false;
    pinchStartDist = 0;
  }
}, { passive: false });

wrap.addEventListener('touchcancel', () => {
  isPanning = false;
  pinchStartDist = 0;
});

/* ── Wheel zoom (desktop / trackpad) ── */
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.92 : 1.09;
  const newScale = Math.min(Math.max(scale * delta, 0.25), 3.0);
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  tx = mx - (mx - tx) * (newScale / scale);
  ty = my - (my - ty) * (newScale / scale);
  scale = newScale;
  applyTransform();
}, { passive: false });

/* ── Close tooltip on map click (desktop — not node or edge) ── */
wrap.addEventListener('click', e => {
  if (!e.target.closest('.node') && !e.target.closest('#tooltip-panel') && !e.target.closest('.edge-label')) {
    closeTooltip();
  }
});
</script>
</body>
</html>
