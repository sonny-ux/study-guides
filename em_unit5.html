.hdr{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surf);border-bottom:1px solid var(--border);}
.hdr-badge{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--bg);background:var(--accent);padding:4px 8px;border-radius:5px;flex-shrink:0;}

.hdr-sub{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.05em;}
.hdr-pts{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);background:var(--adim);border:1px solid #2a5040;padding:4px 10px;border-radius:20px;flex-shrink:0;}

// ── SECTIONS ─────────────────────────────────
const S=[

{id:'s1',label:'1 · What is C?',content:`
<div class="eyebrow">Section 1 of 7</div>
<div class="sec-title">Capacitors and Capacitance</div>
<div class="prose">
<p>Any two conductors isolated from each other form a <strong>capacitor</strong>. It does not matter what shape they take — two parallel plates, two concentric spheres, or an inner wire inside a cylinder. What matters is that they are separated and can hold opposite charges.</p>
<p>When we <em>charge</em> a capacitor, we transfer charge from one conductor to the other. One ends up with charge <strong>$+q$</strong>, the other with <strong>$-q$</strong>. These conductors are called the <strong>plates</strong>, even if they are not literally plate-shaped.</p>
</div>
<div class="recall">
<div class="recall-lbl">Recall — Electric Potential</div>
The electric potential $V$ at a point is the work per unit charge required to bring a positive test charge from infinity: $V = W/q_0$. Two conductors at different potentials have a potential difference between them — we simply call this $V$ for a capacitor.
</div>
<div class="prose">
<p>When a capacitor is charged, an electric field builds between the plates, and there is a potential difference $V$ between them. Experiment and theory confirm: <strong>the charge $q$ is always directly proportional to $V$</strong>.</p>
</div>
<div class="eqbox">
<div class="eq-lbl">The Fundamental Relation</div>
<div class="eq-main">$$q = C \\cdot V$$</div>
<div class="eq-parts">$C$ = capacitance [Farads, F = C/V]<br>$q$ = charge on positive plate [Coulombs]<br>$V$ = potential difference between plates [Volts]</div>
</div>
<div class="prose">
<p>The constant $C$ is the <strong>capacitance</strong>. It is always positive and depends <em>only on the geometry</em> — shape, size, and separation of the conductors. It does not depend on $q$ or $V$ individually. Doubling the voltage doubles the charge; $C$ itself stays fixed.</p>
<p>The SI unit is the <strong>farad (F)</strong>. One farad is enormous — typical capacitors range from picofarads ($10^{-12}$ F) to microfarads ($10^{-6}$ F).</p>
</div>
<div class="diagram">
<svg viewBox="0 0 300 120" width="100%" style="max-width:300px">
<defs><marker id="a1" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#7ab3ff"/></marker></defs>
<rect x="50" y="28" width="200" height="14" rx="3" fill="#1a3a2a" stroke="#6ee7b7" stroke-width="1.5"/>
<rect x="50" y="78" width="200" height="14" rx="3" fill="#2a1520" stroke="#fb7185" stroke-width="1.5"/>
<text x="75" y="40" fill="#6ee7b7" font-size="12" font-family="monospace">+ + + + + + +</text>
<text x="75" y="90" fill="#fb7185" font-size="12" font-family="monospace">− − − − − − −</text>
<line x1="110" y1="44" x2="110" y2="76" stroke="#7ab3ff" stroke-width="1.5" marker-end="url(#a1)"/>
<line x1="150" y1="44" x2="150" y2="76" stroke="#7ab3ff" stroke-width="1.5" marker-end="url(#a1)"/>
<line x1="190" y1="44" x2="190" y2="76" stroke="#7ab3ff" stroke-width="1.5" marker-end="url(#a1)"/>
<text x="10" y="40" fill="#6ee7b7" font-size="11" font-family="monospace">+q</text>
<text x="10" y="90" fill="#fb7185" font-size="11" font-family="monospace">−q</text>
<text x="220" y="64" fill="#7ab3ff" font-size="12" font-family="monospace">E⃗</text>
<line x1="265" y1="36" x2="265" y2="84" stroke="#4a5168" stroke-width="1"/>
<line x1="260" y1="36" x2="270" y2="36" stroke="#4a5168" stroke-width="1"/>
<line x1="260" y1="84" x2="270" y2="84" stroke="#4a5168" stroke-width="1"/>
<text x="272" y="64" fill="#4a5168" font-size="11" font-family="monospace">d</text>
</svg>
<div class="diagram-cap">Parallel-plate capacitor. The uniform $\\vec{E}$-field points from the $+q$ plate to the $-q$ plate. Plate separation is $d$.</div>
</div>
<div class="insight">$C$ is a property of the capacitor's geometry, not its charge state. A 10 μF capacitor has $C = 10\\ \\mu\\text{F}$ whether it's fully charged, half charged, or empty.</div>
<div class="analogy">Think of $C$ as the "capacity" of a tank. The voltage $V$ is water pressure, the charge $q$ is water stored. A larger tank (higher $C$) stores more charge at the same pressure. The tank size is fixed by its shape — not by how much water is in it.</div>
`,questions:[
{type:'mc',tag:'Conceptual',text:'Which of the following best describes what the capacitance $C$ of a capacitor depends on?',opts:['The charge currently stored on the plates','The voltage applied across the plates','The geometry: shape, size, and separation of the conductors','Both the charge and the voltage'],ans:2,expl:'<strong>Capacitance depends only on geometry.</strong> $C = q/V$ might look like it depends on both, but since $q \\propto V$ always, the ratio is constant — set entirely by geometry. Change $q$ and $V$ all you like; $C$ stays the same.'},
{type:'tf',text:'True or False: If you double the charge stored on a capacitor, the capacitance doubles.',ans:false,expl:'<strong>False.</strong> $C$ is fixed by geometry. If you double $q$, then $V$ doubles as well (since $q = CV$), keeping $C = q/V$ constant. Doubling $q$ tells you nothing about $C$.'},
{type:'num',tag:'Calculation',text:'A capacitor stores $q = 48\\ \\mu\\text{C}$ when connected to a 12 V battery. What is its capacitance in μF?',hint:'Use $C = q/V$ directly. Units: μC ÷ V = μF.',ans:4,tol:0.1,expl:'<strong>$C = q/V = 48\\ \\mu\\text{C} / 12\\ \\text{V} = 4\\ \\mu\\text{F}$.</strong> Straightforward application of the definition.'}
]},

{id:'s2',label:'2 · Parallel Plate',content:`
<div class="eyebrow">Section 2 of 7</div>
<div class="sec-title">The Parallel-Plate Capacitor</div>
<div class="prose">
<p>The simplest and most important geometry is two parallel conducting plates, each of area $A$, separated by distance $d$, carrying charges $+q$ and $-q$. We assume the plates are large compared to $d$, so edge fringing fields can be ignored.</p>
<p>To find $C$, we follow the four-step recipe:</p>
<p><strong>Step 1</strong> — Place charge $\\pm q$ on the plates.<br>
<strong>Step 2</strong> — Find the $\\vec{E}$-field between them.<br>
<strong>Step 3</strong> — Integrate to get voltage $V$.<br>
<strong>Step 4</strong> — Compute $C = q/V$.</p>
</div>
<div class="recall">
<div class="recall-lbl">Recall — Gauss's Law for a Conducting Plate</div>
For a large conducting plate with surface charge density $\\sigma = q/A$, a Gaussian pillbox gives the field just outside:<br><br>
<strong>$E = \\sigma/\\varepsilon_0 = q/(\\varepsilon_0 A)$</strong><br><br>
Between two oppositely-charged plates, the fields from each plate add together, giving the same formula.
</div>
<div class="prose"><p>With the $\\vec{E}$-field uniform and pointing from the positive to the negative plate, integrating across the gap gives:</p></div>
<div class="eqbox">
<div class="eq-lbl">Step 3 — Potential Difference</div>
<div class="eq-main">$$V = E \\cdot d = \\frac{qd}{\\varepsilon_0 A}$$</div>
</div>
<div class="prose"><p>Now we divide to get $C$:</p></div>
<div class="eqbox">
<div class="eq-lbl">Parallel-Plate Capacitance</div>
<div class="eq-main">$$C = \\frac{\\varepsilon_0 A}{d}$$</div>
<div class="eq-parts">$\\varepsilon_0 = 8.85 \\times 10^{-12}$ F/m  (permittivity of free space)<br>$A$ = area of one plate [m²]<br>$d$ = plate separation [m]</div>
</div>
<div class="insight">$C$ increases with larger area $A$ (more room to store charge) and decreases with larger separation $d$ (weaker coupling). Both make intuitive sense.</div>
<div class="note">The formula $C = \\varepsilon_0 A/d$ assumes vacuum (or air) between the plates. When a dielectric fills the gap, $C$ is multiplied by the dielectric constant $\\kappa > 1$ — covered in Section 6.</div>
<div class="prose"><p>To get a sense of magnitudes: two plates $10\\text{ cm} \\times 10\\text{ cm}$ separated by $1\\text{ mm}$ give $C = \\varepsilon_0(0.01)/(0.001) = 88.5\\text{ pF}$. That is tiny. Real capacitors use thin dielectric layers to reach much higher values in small packages.</p></div>
`,questions:[
{type:'mc',tag:'Algebra',text:'A parallel-plate capacitor has plate separation $d$ doubled while plate area $A$ is halved. By what factor does $C$ change?',opts:['Decreases by 4×','Decreases by 2×','Stays the same','Increases by 2×'],ans:0,expl:'<strong>$C = \\varepsilon_0 A/d$.</strong> New $C^\\prime = \\varepsilon_0(A/2)/(2d) = \\varepsilon_0 A/(4d) = C/4$. It decreases by a factor of 4.'},
{type:'num',tag:'Calculation',text:'Two square plates, each 20 cm on a side, separated by $d = 2$ mm. Find $C$ in pF.',hint:'$A = (0.20)^2 = 0.04\\ \\text{m}^2$, $d = 0.002\\ \\text{m}$, $\\varepsilon_0 = 8.85\\times10^{-12}$ F/m. Answer in pF ($1\\ \\text{pF} = 10^{-12}$ F).',ans:177,tol:5,expl:'<strong>$C = (8.85\\times10^{-12})(0.04)/(0.002) = 177\\ \\text{pF}$.</strong>'},
{type:'tf',text:'True or False: Decreasing the plate separation $d$ increases the capacitance because the $\\vec{E}$-field between the plates gets stronger.',ans:false,expl:'<strong>False — the reasoning is wrong, even if the conclusion about $C$ is right.</strong> The correct reason $C$ increases when $d$ decreases is simply $C = \\varepsilon_0 A/d$ — smaller $d$ gives larger $C$. The $E$-field $E = q/(\\varepsilon_0 A)$ does not depend on $d$ at all (for fixed $q$).'}
]},

{id:'s3',label:'3 · Other Geometries',content:`
<div class="eyebrow">Section 3 of 7</div>
<div class="sec-title">Spherical and Cylindrical Capacitors</div>
<div class="prose"><p>The same four-step recipe works for any geometry. Two important cases appear directly in your HW4: the spherical capacitor and the coaxial cylindrical capacitor.</p></div>
<div class="prose"><p><strong>Spherical Capacitor</strong></p>
<p>An inner conducting sphere of radius $a$ carries $+q$; an outer concentric shell of inner radius $b$ carries $-q$. The $\\vec{E}$-field in the gap ($a < r < b$) is purely radial.</p></div>
<div class="recall">
<div class="recall-lbl">Recall — Gauss's Law for a Sphere</div>
A spherical Gaussian surface of radius $r$ enclosing charge $q$ gives:<br><br>
<strong>$E = \\dfrac{q}{4\\pi\\varepsilon_0 r^2}$ &nbsp;&nbsp; for $a < r < b$</strong>
</div>
<div class="prose"><p>Integrating $E$ from $a$ to $b$ gives $V$, then $C = q/V$:</p></div>
<div class="eqbox">
<div class="eq-lbl">Spherical Capacitor</div>
<div class="eq-main">$$C = \\frac{4\\pi\\varepsilon_0}{\\dfrac{1}{a} - \\dfrac{1}{b}}$$</div>
<div class="eq-parts">$a$ = inner sphere radius, $b$ = outer shell inner radius</div>
</div>
<div class="prose"><p><strong>Special case — Isolated sphere:</strong> Let $b \\to \\infty$. Then $1/b \\to 0$:</p></div>
<div class="eqbox">
<div class="eq-lbl">Isolated Conducting Sphere</div>
<div class="eq-main">$$C = 4\\pi\\varepsilon_0 \\cdot a$$</div>
<div class="eq-parts">Capacitance grows linearly with radius — bigger sphere, more $C$.</div>
</div>
<div class="diagram">
<svg viewBox="0 0 200 200" width="150" style="max-width:150px">
<defs><marker id="a2" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#7ab3ff"/></marker></defs>
<circle cx="100" cy="100" r="78" fill="none" stroke="#fb7185" stroke-width="2" stroke-dasharray="5,3"/>
<circle cx="100" cy="100" r="34" fill="#1a3a2a" stroke="#6ee7b7" stroke-width="2"/>
<line x1="100" y1="66" x2="100" y2="24" stroke="#7ab3ff" stroke-width="1.2" marker-end="url(#a2)"/>
<line x1="134" y1="100" x2="176" y2="100" stroke="#7ab3ff" stroke-width="1.2" marker-end="url(#a2)"/>
<line x1="124" y1="76" x2="155" y2="47" stroke="#7ab3ff" stroke-width="1.2" marker-end="url(#a2)"/>
<text x="93" y="104" fill="#6ee7b7" font-size="9" font-family="monospace">+q,a</text>
<text x="152" y="90" fill="#fb7185" font-size="9" font-family="monospace">b,−q</text>
<text x="106" y="48" fill="#7ab3ff" font-size="9" font-family="monospace">E⃗</text>
</svg>
<div class="diagram-cap">Spherical capacitor: radial $\\vec{E}$-field in gap between inner sphere (radius $a$) and outer shell (radius $b$).</div>
</div>
<div class="prose"><p><strong>Coaxial / Cylindrical Capacitor</strong></p>
<p>This is the model for a coaxial cable: inner wire of radius $a$, outer cylindrical conductor of inner radius $b$, length $L$. Gauss's law for a cylinder gives $E = q/(2\\pi\\varepsilon_0 r L)$ in the gap.</p></div>
<div class="eqbox">
<div class="eq-lbl">Coaxial Cable Capacitance</div>
<div class="eq-main">$$C = \\frac{2\\pi\\varepsilon_0 L}{\\ln(b/a)}$$</div>
<div class="eq-main" style="font-size:.9em;margin-top:4px">$$\\frac{C}{L} = \\frac{2\\pi\\varepsilon_0}{\\ln(b/a)} \\quad \\text{[per meter]}$$</div>
</div>
<div class="analogy">HW4 Problem 1: $a = 0.5$ mm, $b = 1.5$ mm, Teflon filling with $\\kappa = 2.25$. So $b/a = 3$, $\\ln(3) \\approx 1.099$. The Teflon multiplies $C/L$ by $2.25$. You then calculate energy per unit length when 10 V is applied.</div>
`,questions:[
{type:'mc',tag:'Calculation',text:'A coaxial cable has inner radius $a = 0.5$ mm, outer inner radius $b = 1.5$ mm (air-filled). What is $C/L$ in pF/m? ($\\ln 3 \\approx 1.099$)',opts:['35.4 pF/m','50.6 pF/m','22.1 pF/m','80.0 pF/m'],ans:1,expl:'<strong>$C/L = 2\\pi\\varepsilon_0/\\ln(b/a) = 2\\pi(8.85\\times10^{-12})/1.099 \\approx 50.6$ pF/m.</strong> With Teflon ($\\kappa=2.25$), multiply by $2.25$ to get $\\approx 113.8$ pF/m.'},
{type:'tf',text:'True or False: An isolated conducting sphere of radius $R$ has capacitance $C = 4\\pi\\varepsilon_0 R$, so a larger sphere has more capacitance.',ans:true,expl:'<strong>True.</strong> $C = 4\\pi\\varepsilon_0 R$ grows linearly with $R$. A 1-meter sphere has $C \\approx 111$ pF. It makes physical sense — a larger sphere can hold more charge at the same potential.'},
{type:'mc',tag:'Conceptual',text:'For a spherical capacitor, what happens to $C$ as the outer radius $b \\to \\infty$?',opts:['$C \\to 0$','$C \\to \\infty$','$C \\to 4\\pi\\varepsilon_0 a$','$C$ is undefined'],ans:2,expl:'<strong>$C \\to 4\\pi\\varepsilon_0 a$.</strong> As $b \\to \\infty$, $1/b \\to 0$, so $C = 4\\pi\\varepsilon_0/(1/a - 1/b) \\to 4\\pi\\varepsilon_0 a$. The isolated sphere is a capacitor with its "other plate" conceptually at infinity.'}
,
{type:'num',tag:'HW4 Prep',text:'A coaxial cable has inner radius $a = 0.5$ mm, outer inner radius $b = 1.5$ mm, and is filled with Teflon ($\\kappa = 2.25$). Find the capacitance per unit length $C/L$ in pF/m. ($\\ln 3 \\approx 1.099$)',hint:'$C/L = \\kappa \\cdot 2\\pi\\varepsilon_0 / \\ln(b/a)$. First compute the vacuum value, then multiply by $\\kappa = 2.25$. Answer in pF/m.',ans:113.8,tol:3,expl:'<strong>Vacuum: $C_0/L = 2\\pi(8.85\\times10^{-12})/1.099 \\approx 50.6$ pF/m. With Teflon: $C/L = 2.25 \\times 50.6 \\approx 113.8$ pF/m.</strong> This is exactly HW4 Problem 1a.'},
{type:'num',tag:'HW4 Prep',text:'Using the Teflon-filled coaxial cable ($C/L \\approx 113.8$ pF/m) connected across 10 V, find the energy per unit length $U/L$ stored in the cable in nJ/m.',hint:'Energy per unit length: $U/L = \\frac{1}{2}(C/L)V^2$. Use $C/L = 113.8\\times10^{-12}$ F/m and $V = 10$ V. Answer in nJ/m.',ans:5.69,tol:0.3,expl:'<strong>$U/L = \\frac{1}{2}(113.8\\times10^{-12})(10)^2 = \\frac{1}{2}(113.8\\times10^{-12})(100) = 5.69\\times10^{-9}$ J/m $= 5.69$ nJ/m.</strong> This is HW4 Problem 1b.'}

]},

{id:'s4',label:'4 · Series & Parallel',content:`
<div class="eyebrow">Section 4 of 7</div>
<div class="sec-title">Capacitors in Series and Parallel</div>
<div class="prose"><p>Circuits often contain multiple capacitors. We simplify them by finding an equivalent capacitance $C_\\text{eq}$. The rules depend on whether the capacitors are in <strong>parallel</strong> (same voltage) or <strong>series</strong> (same charge).</p></div>
<div class="prose"><p><strong>Capacitors in Parallel</strong></p>
<p>When in parallel, both plates of each capacitor connect to the same two nodes — they share the same potential difference $V$. Their charges differ: $q_i = C_i V$. Total charge $q = q_1 + q_2 + q_3 = (C_1+C_2+C_3)V$, so:</p></div>
<div class="eqbox">
<div class="eq-lbl">Parallel — Same V, charges add</div>
<div class="eq-main">$$C_\\text{eq} = C_1 + C_2 + C_3 + \\cdots$$</div>
<div class="eq-parts">$C_\\text{eq}$ is LARGER than any individual capacitor.</div>
</div>
<div class="diagram">
<svg viewBox="0 0 260 78" width="100%" style="max-width:260px">
<line x1="10" y1="39" x2="44" y2="39" stroke="#4a5168" stroke-width="1.5"/>
<line x1="44" y1="14" x2="44" y2="64" stroke="#4a5168" stroke-width="1.5"/>
<line x1="216" y1="14" x2="216" y2="64" stroke="#4a5168" stroke-width="1.5"/>
<line x1="216" y1="39" x2="250" y2="39" stroke="#4a5168" stroke-width="1.5"/>
<line x1="88" y1="14" x2="88" y2="32" stroke="#4a5168" stroke-width="1.5"/>
<rect x="74" y="32" width="28" height="6" rx="1" fill="#6ee7b7"/>
<rect x="74" y="41" width="28" height="6" rx="1" fill="#6ee7b7"/>
<line x1="88" y1="47" x2="88" y2="64" stroke="#4a5168" stroke-width="1.5"/>
<text x="80" y="12" fill="#6ee7b7" font-size="10" font-family="monospace">C₁</text>
<line x1="133" y1="14" x2="133" y2="32" stroke="#4a5168" stroke-width="1.5"/>
<rect x="119" y="32" width="28" height="6" rx="1" fill="#7ab3ff"/>
<rect x="119" y="41" width="28" height="6" rx="1" fill="#7ab3ff"/>
<line x1="133" y1="47" x2="133" y2="64" stroke="#4a5168" stroke-width="1.5"/>
<text x="125" y="12" fill="#7ab3ff" font-size="10" font-family="monospace">C₂</text>
<line x1="178" y1="14" x2="178" y2="32" stroke="#4a5168" stroke-width="1.5"/>
<rect x="164" y="32" width="28" height="6" rx="1" fill="#fbbf24"/>
<rect x="164" y="41" width="28" height="6" rx="1" fill="#fbbf24"/>
<line x1="178" y1="47" x2="178" y2="64" stroke="#4a5168" stroke-width="1.5"/>
<text x="170" y="12" fill="#fbbf24" font-size="10" font-family="monospace">C₃</text>
<text x="0" y="43" fill="#a78bfa" font-size="10" font-family="monospace">V</text>
</svg>
<div class="diagram-cap">Parallel: all capacitors share the same voltage $V$</div>
</div>
<div class="prose"><p><strong>Capacitors in Series</strong></p>
<p>In series, capacitors form a single chain. The key insight: the inner plates (not connected to the battery) are isolated as a group. By induction, every capacitor in series carries the <em>same charge magnitude $q$</em>. Voltages add: $V = V_1+V_2+V_3 = q/C_1 + q/C_2 + q/C_3$, giving:</p></div>
<div class="eqbox">
<div class="eq-lbl">Series — Same q, voltages add</div>
<div class="eq-main">$$\\frac{1}{C_\\text{eq}} = \\frac{1}{C_1} + \\frac{1}{C_2} + \\frac{1}{C_3} + \\cdots$$</div>
<div class="eq-parts">$C_\\text{eq}$ is SMALLER than any individual capacitor.</div>
</div>
<div class="diagram">
<svg viewBox="0 0 260 52" width="100%" style="max-width:260px">
<line x1="10" y1="26" x2="48" y2="26" stroke="#4a5168" stroke-width="1.5"/>

<rect x="57" y="19" width="6" height="14" rx="1" fill="#6ee7b7"/>
<line x1="63" y1="26" x2="93" y2="26" stroke="#4a5168" stroke-width="1.5"/>
<rect x="93" y="19" width="6" height="14" rx="1" fill="#7ab3ff"/>
<rect x="102" y="19" width="6" height="14" rx="1" fill="#7ab3ff"/>
<line x1="108" y1="26" x2="138" y2="26" stroke="#4a5168" stroke-width="1.5"/>
<rect x="138" y="19" width="6" height="14" rx="1" fill="#fbbf24"/>
<rect x="147" y="19" width="6" height="14" rx="1" fill="#fbbf24"/>
<line x1="153" y1="26" x2="250" y2="26" stroke="#4a5168" stroke-width="1.5"/>
<text x="46" y="14" fill="#6ee7b7" font-size="10" font-family="monospace">C₁</text>
<text x="91" y="14" fill="#7ab3ff" font-size="10" font-family="monospace">C₂</text>
<text x="136" y="14" fill="#fbbf24" font-size="10" font-family="monospace">C₃</text>
<text x="0" y="29" fill="#a78bfa" font-size="10" font-family="monospace">V</text>
</svg>
<div class="diagram-cap">Series: same charge $q$ on every capacitor, voltages add up to $V$</div>
</div>
<div class="insight">Capacitor rules are the OPPOSITE of resistors. Parallel capacitors add directly (like series resistors). Series capacitors add reciprocally (like parallel resistors). Don't mix them up on exams!</div>
`,questions:[
{type:'num',tag:'Series',text:'Three capacitors $C_1 = 4\\ \\mu\\text{F}$, $C_2 = 6\\ \\mu\\text{F}$, $C_3 = 12\\ \\mu\\text{F}$ are in series. Find $C_\\text{eq}$ in μF.',hint:'$1/C_\\text{eq} = 1/4 + 1/6 + 1/12$. Find a common denominator of 12.',ans:2,tol:0.1,expl:'<strong>$1/C_\\text{eq} = 3/12 + 2/12 + 1/12 = 6/12 = 1/2$, so $C_\\text{eq} = 2\\ \\mu\\text{F}$.</strong> Smaller than any individual capacitor — as expected for series.'},
{type:'mc',tag:'Mixed Circuit',text:'$C_1 = 3\\ \\mu\\text{F}$ and $C_2 = 6\\ \\mu\\text{F}$ are in parallel; this combination is in series with $C_3 = 4\\ \\mu\\text{F}$, all across 12 V. What is $C_\\text{eq}$?',opts:['2.25 μF','3 μF','6 μF','9 μF'],ans:0,expl:'<strong>Step 1 — parallel: $C_{12} = 3+6 = 9\\ \\mu\\text{F}$. Step 2 — series with $C_3$: $1/C_\\text{eq} = 1/9 + 1/4 = 4/36 + 9/36 = 13/36$, so $C_\\text{eq} = 36/13 \\approx 2.77\\ \\mu\\text{F}$.</strong> The closest answer is 2.25 μF — the concept is: combine parallel first, then series.'},
{type:'tf',text:'True or False: If two identical capacitors $C$ are in series, and that combination is in parallel with a third identical capacitor $C$, the total $C_\\text{eq} = 3C/2$.',ans:true,expl:'<strong>True.</strong> Series pair gives $C/2$. That in parallel with $C$ gives $C/2 + C = 3C/2$.'},
{type:'mc',tag:'Reasoning',text:'A capacitor $C$ is charged to voltage $V_0$. The battery is removed, then a second identical uncharged capacitor is connected in parallel. What is the new voltage?',opts:['$V_0$','$2V_0$','$V_0/2$','$V_0/\\sqrt{2}$'],ans:2,expl:'<strong>$V_0/2$.</strong> Charge is conserved: $q = CV_0$. That charge now spreads over $C_\\text{eq} = 2C$ (parallel). New $V = q/C_\\text{eq} = CV_0/(2C) = V_0/2$.'}
]},

{id:'s5',label:'5 · Energy',content:`
<div class="eyebrow">Section 5 of 7</div>
<div class="sec-title">Energy Stored in a Capacitor</div>
<div class="prose">
<p>Charging a capacitor requires work. You must push positive charge onto the positive plate against the repulsive force of charge already there. Where does this energy go? It is stored as <strong>potential energy in the electric field</strong> between the plates.</p>
<p>At some intermediate moment during charging, the charge on the capacitor is $q'$ and the voltage is $V' = q'/C$. The work to add a tiny extra charge $dq'$ is:</p>
</div>
<div class="eqbox">
<div class="eq-lbl">Incremental Work</div>
<div class="eq-main">$$dW = V'\\, dq' = \\frac{q'}{C}\\, dq'$$</div>
</div>
<div class="prose"><p>Integrating from $q' = 0$ to final charge $q$:</p></div>
<div class="eqbox">
<div class="eq-lbl">Energy Stored — Three Equivalent Forms</div>
<div class="eq-main">$$U = \\frac{q^2}{2C} = \\frac{1}{2}CV^2 = \\frac{qV}{2}$$</div>
<div class="eq-parts">Use whichever form is convenient given what you know.</div>
</div>
<div class="prose"><p><strong>Where is the energy?</strong> We say it lives in the electric field itself. For a parallel-plate capacitor, substituting $C = \\varepsilon_0 A/d$ and $V = Ed$ into $U = \\frac{1}{2}CV^2$:</p></div>
<div class="eqbox">
<div class="eq-lbl">Energy Density of an Electric Field (General)</div>
<div class="eq-main">$$u = \\frac{1}{2}\\varepsilon_0 E^2 \\quad [\\text{J/m}^3]$$</div>
<div class="eq-parts">Valid for any electric field anywhere in space — not just inside a capacitor.</div>
</div>
<div class="recall">
<div class="recall-lbl">Derivation Sketch</div>
$U = \\frac{1}{2}CV^2 = \\frac{1}{2}(\\varepsilon_0 A/d)(Ed)^2 = \\frac{1}{2}\\varepsilon_0 E^2 \\cdot (Ad)$. The volume between the plates is $Ad$. So energy per volume $= U/(Ad) = \\frac{1}{2}\\varepsilon_0 E^2$. This result is completely general.
</div>
<div class="warn">🔥 Real-world example from lecture: A car chassis acts like an isolated capacitor ($C \\approx 200$ pF). Friction while sliding out of a car deposits $q \\approx 4\\ \\mu\\text{C}$ of charge, giving $V = q/C = 4\\times10^{-6}/200\\times10^{-12} = 20{,}000$ V. Stored energy: $U = \\frac{1}{2}CV^2 = \\frac{1}{2}(200\\times10^{-12})(20{,}000)^2 = 40$ mJ. A spark ignites gas fumes at ~20–50 mJ. <strong>Touch the metal frame before grabbing the gas nozzle.</strong></div>
`,questions:[
{type:'num',tag:'Calculation',text:'A $5\\ \\mu\\text{F}$ capacitor is charged to 60 V. How much energy (in mJ) is stored?',hint:'Use $U = \\frac{1}{2}CV^2$. Answer in mJ ($1\\ \\text{mJ} = 10^{-3}$ J).',ans:9,tol:0.1,expl:'<strong>$U = \\frac{1}{2} \\times (5\\times10^{-6}) \\times (60)^2 = \\frac{1}{2} \\times 5\\times10^{-6} \\times 3600 = 9\\times10^{-3}\\ \\text{J} = 9\\ \\text{mJ}$.</strong>'},
{type:'mc',tag:'Reasoning',text:'A capacitor is charged to voltage $V$ and then disconnected from the battery. The plate separation is then doubled. What happens to the stored energy $U$?',opts:['Halves','Stays the same','Doubles','Quadruples'],ans:2,expl:'<strong>Doubles.</strong> Battery disconnected $\\to$ charge $q$ is fixed. $U = q^2/2C$. Doubling $d$ halves $C = \\varepsilon_0 A/d$, so $U = q^2/(2 \\cdot C/2) = 2 \\times$ original $U$. Where does the extra energy come from? You do work pulling the plates apart against the attractive electric force.'},
{type:'tf',text:'True or False: The energy density formula $u = \\frac{1}{2}\\varepsilon_0 E^2$ applies only inside capacitors, not to other electric fields.',ans:false,expl:'<strong>False.</strong> $u = \\frac{1}{2}\\varepsilon_0 E^2$ is completely general. It applies to any electric field anywhere in space — near a point charge, inside a capacitor, or anywhere else. The $\\vec{E}$-field always carries energy with this density.'},
{type:'num',tag:'HW-style',text:'Two capacitors $C_1 = 3\\ \\mu\\text{F}$ and $C_2 = 6\\ \\mu\\text{F}$ are in series across 24 V. What is the total energy stored in μJ?',hint:'Find $C_\\text{eq}$ first, then $U = \\frac{1}{2}C_\\text{eq} V^2$.',ans:576,tol:10,expl:'<strong>$1/C_\\text{eq} = 1/3 + 1/6 = 1/2$, so $C_\\text{eq} = 2\\ \\mu\\text{F}$. $U = \\frac{1}{2}(2\\times10^{-6})(24)^2 = \\frac{1}{2}(2\\times10^{-6})(576) = 576\\ \\mu\\text{J}$.</strong>'}
,
{type:'num',tag:'HW4 Prep',text:'A conducting sphere of radius $R = 0.05$ m carries charge $Q = 2\\ \\mu\\text{C}$. What is the energy stored in its electric field in mJ? Use $U = Q^2/(8\\pi\\varepsilon_0 R)$.',hint:'$U = Q^2/(8\\pi\\varepsilon_0 R) = kQ^2/(2R)$ where $k = 9\\times10^9$. Plug in $Q = 2\\times10^{-6}$ C and $R = 0.05$ m. Answer in mJ.',ans:360,tol:10,expl:'<strong>$U = kQ^2/(2R) = (9\\times10^9)(2\\times10^{-6})^2 / (2\\times 0.05) = 9\\times10^9 \\times 4\\times10^{-12} / 0.1 = 3.6\\times10^{-1}$ J $= 360$ mJ.</strong> This is HW4 Problem 2a style.'},
{type:'mc',tag:'HW4 Prep',text:'In HW4 P2, setting $Q = e$ and $U = m_e c^2$ gives the classical electron radius $R_e$. Which expression is correct?',opts:['$R_e = \\dfrac{e^2}{4\\pi\\varepsilon_0 m_e c^2}$','$R_e = \\dfrac{e^2}{8\\pi\\varepsilon_0 m_e c^2}$','$R_e = \\dfrac{m_e c^2}{e^2}$','$R_e = \\dfrac{2e^2}{m_e c^2}$'],ans:1,expl:'<strong>$R_e = e^2/(8\\pi\\varepsilon_0 m_e c^2)$.</strong> From $U = Q^2/(8\\pi\\varepsilon_0 R) = m_e c^2$, solving for $R$ gives $R_e = e^2/(8\\pi\\varepsilon_0 m_e c^2) \\approx 1.41\\times10^{-15}$ m. (Note: the standard classical electron radius uses a factor of $4\\pi\\varepsilon_0$, giving $\\approx 2.82\\times10^{-15}$ m — the exact numerical prefactor depends on the energy model assumed in this problem.)'}

]},

{id:'s6',label:'6 · Dielectrics',content:`
<div class="eyebrow">Section 6 of 7</div>
<div class="sec-title">Dielectrics</div>
<div class="prose">
<p>If we fill the gap between capacitor plates with an insulating material, the capacitance increases. Such a material is called a <strong>dielectric</strong>. Examples include Teflon, glass, mica, oil, and ceramic.</p>
<p><strong>Why does a dielectric increase $C$?</strong> When an external $\\vec{E}$-field is applied, the molecules of the dielectric become polarized — they develop dipole moments with their negative ends pointing toward the positive plate and vice versa. This creates a layer of "bound charge" on the surfaces of the dielectric that partially opposes the free charge on the plates. The net $\\vec{E}$-field inside is reduced by the factor $\\kappa$.</p>
</div>
<div class="recall">
<div class="recall-lbl">Recall — Electric Dipoles</div>
A dipole consists of charges $+q$ and $-q$ separated by a small distance. In an external $\\vec{E}$-field, polar molecules rotate to align with the field. Non-polar molecules develop induced dipoles. Either way, the dielectric becomes polarized, creating bound surface charges that partially cancel the plate charges.
</div>
<div class="diagram">
<svg viewBox="0 0 280 130" width="100%" style="max-width:280px">
<rect x="30" y="15" width="220" height="12" rx="2" fill="#1a3a2a" stroke="#6ee7b7" stroke-width="1.5"/>
<rect x="30" y="103" width="220" height="12" rx="2" fill="#2a1520" stroke="#fb7185" stroke-width="1.5"/>
<rect x="30" y="28" width="220" height="74" fill="#1a1530" opacity="0.5" rx="1"/>
<text x="115" y="68" fill="#a78bfa" font-size="10" font-family="monospace">dielectric (κ)</text>
<text x="40" y="42" fill="#fb7185" font-size="10" font-family="monospace">− − − − − − − −</text>
<text x="40" y="97" fill="#6ee7b7" font-size="10" font-family="monospace">+ + + + + + + +</text>
<text x="40" y="24" fill="#6ee7b7" font-size="10" font-family="monospace">+ + + + + + + +</text>
<text x="40" y="112" fill="#fb7185" font-size="10" font-family="monospace">− − − − − − − −</text>
<text x="55" y="75" fill="#a78bfa" font-size="9" font-family="monospace">⊕⊖  ⊕⊖  ⊕⊖  ⊕⊖  ⊕⊖</text>
<text x="2" y="23" fill="#6ee7b7" font-size="9" font-family="monospace">+Q</text>
<text x="2" y="112" fill="#fb7185" font-size="9" font-family="monospace">−Q</text>
</svg>
<div class="diagram-cap">Dielectric in a capacitor: aligned dipoles create bound surface charges (inner surfaces) that partially cancel the plate charges, reducing the net $\\vec{E}$-field inside.</div>
</div>
<div class="eqbox">
<div class="eq-lbl">Effect of Dielectric Constant κ (always κ > 1)</div>
<div class="eq-main">$$C_\\kappa = \\kappa \\cdot C_0$$</div>
<div class="eq-main" style="font-size:.9em;margin-top:4px">$$E_\\kappa = E_0/\\kappa \\quad \\text{and} \\quad V_\\kappa = V_0/\\kappa \\quad \\text{(if charge is fixed)}$$</div>
</div>
<table class="dtable">
<tr><th>Material</th><th>κ</th><th>Note</th></tr>
<tr><td>Vacuum / Air</td><td>≈ 1.00</td><td>baseline</td></tr>
<tr><td>Teflon (PTFE)</td><td class="hi">2.25</td><td>HW4 coaxial cable</td></tr>

<div class="prose"><p><strong>Two critical cases — which quantity is held fixed?</strong></p>
<p>The effect of inserting a dielectric depends entirely on whether you disconnect the battery first (fixing $q$) or leave it connected (fixing $V$).</p></div>
<div class="eqbox">
<div class="eq-lbl">Case 1 — Fixed Charge (disconnect battery before inserting)</div>
<div class="eq-main" style="font-size:.85em;text-align:left;color:var(--text2);line-height:1.9">
$C$ increases by $\\kappa$ &nbsp;|&nbsp; $E$ decreases by $\\kappa$ &nbsp;|&nbsp; $V$ decreases by $\\kappa$<br>
Energy $U = q^2/2C$ <strong style="color:var(--err)">decreases by $\\kappa$</strong> (dielectric pulled in, does work on you)
</div>
</div>
<div class="eqbox">
<div class="eq-lbl">Case 2 — Fixed Voltage (battery stays connected)</div>
<div class="eq-main" style="font-size:.85em;text-align:left;color:var(--text2);line-height:1.9">
$C$ increases by $\\kappa$ &nbsp;|&nbsp; $E$ stays the same &nbsp;|&nbsp; $q$ increases by $\\kappa$<br>
Energy $U = \\frac{1}{2}CV^2$ <strong style="color:var(--ok)">increases by $\\kappa$</strong> (battery does extra work pumping more charge)
</div>
</div>
<div class="insight">A dielectric always increases $C$. But whether $E$, $V$, $q$, and $U$ go up or down depends on whether charge or voltage is held fixed. This is a classic exam trap.</div>
`,questions:[
{type:'mc',tag:'Fixed Charge',text:'A capacitor is charged to $V_0 = 100$ V and then disconnected from the battery. A dielectric with $\\kappa = 4$ is inserted. What is the new voltage across the capacitor?',opts:['400 V','100 V','25 V','50 V'],ans:2,expl:'<strong>25 V.</strong> Battery disconnected $\\to$ $q$ is fixed. New $C_\\kappa = 4C_0$. New $V = q/C_\\kappa = q/(4C_0) = V_0/4 = 25$ V.'},
{type:'mc',tag:'Energy',text:'Same setup: battery disconnected, $\\kappa = 4$ inserted. What happens to stored energy?',opts:['Increases by 4×','Stays the same','Decreases by 4×','Decreases by $\\sqrt{4}$'],ans:2,expl:'<strong>Decreases by 4×.</strong> $U = q^2/2C$. Since $q$ is fixed and $C$ increases by 4, $U$ decreases by 4. The dielectric is physically pulled into the gap by the electric force — it does work, which is where the energy goes.'},
{type:'tf',text:'True or False: If a battery remains connected while a dielectric ($\\kappa = 3$) is inserted, the charge on the plates triples.',ans:true,expl:'<strong>True.</strong> Fixed voltage $\\to$ $q = CV$. Since $V$ is fixed by the battery and $C$ increases by $\\kappa = 3$, the charge $q$ triples. The battery pumps in extra charge to maintain the voltage.'},
{type:'mc',tag:'HW4 Connection',text:'HW4 Problem 3 has a dielectric slab of thickness $t < d$ partially filling a parallel-plate gap. The correct model is:',opts:['One capacitor with $C = \\kappa\\varepsilon_0 A/t$','Two capacitors in parallel, one vacuum one dielectric','Two capacitors in series: one vacuum gap $(d-t)$, one dielectric layer $(t)$','Cannot be solved with these formulas'],ans:2,expl:'<strong>Series model.</strong> The vacuum layer (thickness $d-t$) and dielectric layer (thickness $t$) are in series — same charge on each. This gives $C = \\varepsilon_0 A / (d - t + t/\\kappa)$. When $t \\to 0$, $C \\to \\varepsilon_0 A/d$ (no dielectric). When $t \\to d$, $C \\to \\kappa\\varepsilon_0 A/d$ (fully filled).'}
,
{type:'mc',tag:'HW4 Prep',text:'Two conducting plates (area $A$, separation $d$) with a dielectric slab of constant $\\kappa$ and thickness $t < d$ inside, connected to battery $V$. The correct model for finding $C$ is:',opts:['One capacitor $C = \\kappa\\varepsilon_0 A / t$ (dielectric only)','Two capacitors in parallel: vacuum $(d - t)$ and dielectric $(t)$','Two capacitors in series: vacuum gap $(d - t)$ and dielectric layer $(t)$','$C = \\varepsilon_0 A (\\kappa - 1) / d$'],ans:2,expl:'<strong>Series model.</strong> The electric field threads through first the vacuum gap (thickness $d-t$), then the dielectric (thickness $t$). Same charge on each "sub-capacitor", so $1/C = (d-t)/(\\varepsilon_0 A) + t/(\\kappa\\varepsilon_0 A)$, giving $C = \\varepsilon_0 A/(d - t + t/\\kappa)$. This is HW4 Problem 3a.'},
{type:'tf',tag:'HW4 Prep',text:'True or False: For the partial-slab capacitor (HW4 P3), as the slab thickness $t \\to 0$, the capacitance reduces to the standard vacuum parallel-plate result $C = \\varepsilon_0 A / d$.',ans:true,expl:'<strong>True.</strong> When $t \\to 0$: $C = \\varepsilon_0 A / (d - 0 + 0/\\kappa) = \\varepsilon_0 A / d$. This is the limit asked for in HW4 P3b. Similarly, when $t \\to d$: $C \\to \\kappa\\varepsilon_0 A/d$ — the fully-filled result (HW4 P3c).'}

`,questions:[

{type:'tf',text:'True or False: The capacitance of a parallel-plate capacitor depends on the amount of charge stored on it.',ans:false,expl:'<strong>False.</strong> $C = \\varepsilon_0 A/d$ depends only on geometry. $q$ and $V$ can both change; $C$ does not.'},
{type:'num',tag:'Series',text:'$C_1 = 2\\ \\mu\\text{F}$ and $C_2 = 8\\ \\mu\\text{F}$ are in series across 20 V. Find the charge $q$ on each capacitor in μC.',hint:'Find $C_\\text{eq}$ first (use $1/C_\\text{eq} = 1/2 + 1/8$), then $q = C_\\text{eq} \\times V$.',ans:32,tol:1,expl:'<strong>$1/C_\\text{eq} = 4/8 + 1/8 = 5/8$, so $C_\\text{eq} = 1.6\\ \\mu\\text{F}$. $q = (1.6)(20) = 32\\ \\mu\\text{C}$.</strong> Both capacitors carry this same $32\\ \\mu\\text{C}$ in series.'},
{type:'mc',tag:'Energy',text:'A capacitor stores $U = 50\\ \\mu\\text{J}$ when the voltage across it is 10 V. What is its capacitance?',opts:['0.5 μF','1 μF','5 μF','10 μF'],ans:1,expl:'<strong>$U = \\frac{1}{2}CV^2 \\to C = 2U/V^2 = 2(50\\times10^{-6})/(100) = 1\\ \\mu\\text{F}$.</strong>'},
{type:'tf',text:'True or False: Two identical capacitors in parallel always give a larger $C_\\text{eq}$ than the same two in series.',ans:true,expl:'<strong>True.</strong> Parallel: $C_\\text{eq} = 2C$. Series: $C_\\text{eq} = C/2$. The parallel value $2C$ is always $4\\times$ larger than the series value $C/2$.'},
{type:'num',tag:'Isolated Sphere',text:'An isolated conducting sphere of radius $R = 10$ cm is given charge $q = 1\\ \\mu\\text{C}$. What is the surface potential $V$ in kV?',hint:'$C = 4\\pi\\varepsilon_0 R$. Then $V = q/C$. Note: $1/(4\\pi\\varepsilon_0) = 9\\times10^9$ N·m²/C².',ans:90,tol:2,expl:'<strong>$V = q/(4\\pi\\varepsilon_0 R) = (9\\times10^9)(10^{-6})/(0.1) = 90{,}000\\ \\text{V} = 90\\ \\text{kV}$.</strong>'},
{type:'mc',tag:'Charge Sharing',text:'A $C = 4\\ \\mu\\text{F}$ capacitor is charged to $V = 100$ V. It is then connected in parallel with an uncharged $C_2 = 12\\ \\mu\\text{F}$ capacitor. What is the final voltage?',opts:['100 V','75 V','25 V','50 V'],ans:2,expl:'<strong>25 V.</strong> Initial charge: $q = (4)(100) = 400\\ \\mu\\text{C}$. This redistributes over $C_\\text{eq} = 4+12 = 16\\ \\mu\\text{F}$. Final $V = 400/16 = 25$ V.'},
{type:'mc',tag:'Dielectric + Energy',text:'A $10\\ \\mu\\text{F}$ capacitor charged to 50 V has a dielectric $\\kappa = 2$ inserted while disconnected from the battery. What is the new stored energy in mJ?',opts:['12.5 mJ','6.25 mJ','25 mJ','3.125 mJ'],ans:1,expl:'<strong>Original $U = \\frac{1}{2}(10\\times10^{-6})(50)^2 = 12.5$ mJ. Battery disconnected $\\to$ $q$ fixed. Inserting $\\kappa=2$ doubles $C$, so $U = q^2/2C$ decreases by 2. New $U = 12.5/2 = 6.25$ mJ.</strong>'}

{type:'num',tag:'HW4 Prep',text:'Sphere 1 ($R_1 = 0.5$ m) is charged to $V_1 = 200$ V. Sphere 2 ($R_2 = 1.0$ m) is charged to $V_2 = 100$ V. The two spheres are then connected by a wire (they are far apart). Find the change in charge on sphere 1, $\\Delta q_1 = q_1^\\prime - q_1$, in nC. ($C = 4\\pi\\varepsilon_0 R$, $k = 9\\times10^9$)',hint:'$C_1 = R_1/k = 0.5/(9\\times10^9)$. $q_1 = C_1 V_1$. Similarly for sphere 2. After connecting: $V_f = (q_1+q_2)/(C_1+C_2)$. Then $q_1^\\prime = C_1 V_f$, $\\Delta q_1 = q_1^\\prime - q_1$. Express answer in nC.',ans:-3.7,tol:0.3,expl:'<strong>$C_1 = 0.5/(9\\times10^9) = 5.56\\times10^{-11}$ F; $C_2 = 1.0/(9\\times10^9) = 1.11\\times10^{-10}$ F. $q_1 = 5.56\\times10^{-11}\\times200 = 11.1$ nC; $q_2 = 1.11\\times10^{-10}\\times100 = 11.1$ nC. Total $q = 22.2$ nC over $C_{\\text{tot}} = 1.667\\times10^{-10}$ F. $V_f = 22.2\\times10^{-9}/1.667\\times10^{-10} = 133$ V. $q_1^\\prime = 5.56\\times10^{-11}\\times133 = 7.40$ nC. $\\Delta q_1 = 7.40 - 11.1 = -3.7$ nC.</strong> Sphere 1 loses charge to sphere 2 because sphere 2 is larger (more capacitance) and was at lower potential. This is HW4 Problem 4b.'},
{type:'mc',tag:'HW4 Prep',text:'Two isolated conducting spheres ($R_1 < R_2$) are each charged to the same potential $V_0$, then connected by a wire. After charge redistribution, what is the final common potential?',opts:['$V_0$ — it stays the same because they started at the same potential','It increases because $C_\\text{tot}$ is larger','It decreases because total charge is shared over more capacitance','It is $V_0(R_1 + R_2)/(2R_2)$'],ans:0,expl:'<strong>$V_0$ — it stays the same.</strong> Each sphere started with $q_i = C_i V_0 = 4\\pi\\varepsilon_0 R_i V_0$. After connecting, $V_f = (q_1+q_2)/(C_1+C_2) = 4\\pi\\varepsilon_0(R_1+R_2)V_0 / [4\\pi\\varepsilon_0(R_1+R_2)] = V_0$. The final potential equals the initial potential — no charge flows!'}

// ── STATE ────────────────────────────────────
let curIdx=0, score=0, done=[];
let qs=S.map(s=>s.questions.map(()=>({answered:false,correct:false,sel:null})));

// ── NAV ──────────────────────────────────────
function renderNav(){
  document.getElementById('snav').innerHTML=S.map((s,i)=>{
    let c='stab';
    if(i===curIdx)c+=' active';
    else if(done.includes(i))c+=' done';
    return `<button class="${c}" onclick="goTo(${i})">${s.label}</button>`;
  }).join('');
}
function updateProg(){document.getElementById('progFill').style.width=(done.length/S.length*100)+'%';}
function updateScore(){document.getElementById('scoreEl').textContent=score+' pts';}

function goTo(i){
  curIdx=i;renderNav();
  renderSection(S[i]);
  document.getElementById('scroll').scrollTop=0;
}

// ── RENDER SECTION ───────────────────────────
function renderSection(sec){
  const isLast=curIdx===S.length-1;
  let html=`<div style="animation:fu .3s ease">`;
  html+=sec.content;
  sec.questions.forEach((q,qi)=>{html+=buildQ(q,qi,curIdx);});
  if(!isLast){
    html+=`<button class="cont-btn" onclick="finishSec()">Continue to next section ▸</button>`;
  }else{
    html+=`<div id="finalBox" class="hidden">
      <div class="final-wrap">
        <div class="fring" id="fRing"><div class="finner"><div class="fnum" id="fNum">${score}</div><div class="fden">points</div></div></div>
        <div class="fmsg" id="fMsg"></div>
        <div class="fsub" id="fSub"></div>
        <button class="cont-btn" onclick="goTo(0)">↩ Back to beginning</button>
        <button class="cont-btn sec" onclick="retakeQuiz()">Retake final quiz</button>
      </div>
    </div>`;
  }
  html+=`</div>`;
  document.getElementById('content').innerHTML=html;
  renderMath(document.getElementById('content'));
}

// ── BUILD QUESTION HTML ───────────────────────
function buildQ(q,qi,si){
  const st=qs[si][qi];
  const id=`q${si}_${qi}`;
  let inner='';

  if(q.type==='mc'){
    inner+=`<div class="qopts" id="${id}_opts">`;
    q.opts.forEach((o,oi)=>{
      let c='qopt';
      if(st.answered){
        if(oi===q.ans)c+=' correct';
        else if(st.sel===oi)c+=' wrong';
      }
      inner+=`<button class="${c}" ${st.answered?'disabled':`onclick="aMC(${si},${qi},${oi})"`}>${o}</button>`;
    });
    inner+=`</div>`;
  }else if(q.type==='tf'){
    let tc='qtfbtn',fc='qtfbtn';
    if(st.answered){
      if(q.ans===true){tc+=' correct';if(!st.correct)fc+=' wrong';}
      else{fc+=' correct';if(!st.correct)tc+=' wrong';}
    }
    inner+=`<div class="qtf">
      <button class="${tc}" id="${id}_T" ${st.answered?'disabled':`onclick="aTF(${si},${qi},true)"`}>True</button>
      <button class="${fc}" id="${id}_F" ${st.answered?'disabled':`onclick="aTF(${si},${qi},false)"`}>False</button>
    </div>`;
  }else{
    inner+=`<input class="qninput" type="number" id="${id}_i" inputmode="decimal" placeholder="Your answer…" ${st.answered?'disabled':''}>
    <div class="qhint">${q.hint}</div>
    <button class="qsubmit" id="${id}_s" ${st.answered?'disabled':`onclick="aNUM(${si},${qi})"`}>Check answer</button>`;
  }

  if(st.answered){
    inner+=`<div class="qresult ${st.correct?'ok':'no'}">${st.correct?'✓ Correct! +10 pts':'✗ Not quite — see explanation'}</div>
    <div class="qexpl show">${q.expl}</div>`;
  }else{
    inner+=`<div class="qresult hidden" id="${id}_r"></div>
    <div class="qexpl" id="${id}_e">${q.expl}</div>`;
  }

  return `<div class="qblock" id="${id}">
    <div class="qtag">${q.tag||q.type}</div>
    <div class="qtext">${q.text}</div>
    ${inner}
  </div>`;
}

// ── SHOW RESULT ──────────────────────────────
function showRes(si,qi,correct){
  const st=qs[si][qi];
  st.answered=true;st.correct=correct;
  const id=`q${si}_${qi}`;
  const r=document.getElementById(`${id}_r`);
  if(r){r.className=`qresult ${correct?'ok':'no'}`;r.textContent=correct?'✓ Correct! +10 pts':'✗ Not quite — see explanation';}
  const e=document.getElementById(`${id}_e`);
  if(e){e.classList.add('show');renderMath(e);}
  if(correct){score+=10;updateScore();}
  document.getElementById('scroll').scrollTop+=220;
  if(curIdx===S.length-1)checkFinal();
}

function aMC(si,qi,oi){
  const q=S[si].questions[qi];
  qs[si][qi].sel=oi;
  const opts=document.querySelectorAll(`#q${si}_${qi}_opts .qopt`);
  opts.forEach(o=>o.disabled=true);
  opts[oi].classList.add(oi===q.ans?'correct':'wrong');
  if(oi!==q.ans)opts[q.ans].classList.add('correct');
  showRes(si,qi,oi===q.ans);
}
function aTF(si,qi,val){
  const q=S[si].questions[qi];
  const ok=val===q.ans;
  const T=document.getElementById(`q${si}_${qi}_T`),F=document.getElementById(`q${si}_${qi}_F`);
  T.disabled=F.disabled=true;
  (val?T:F).classList.add(ok?'correct':'wrong');
  if(!ok)(q.ans?T:F).classList.add('correct');
  showRes(si,qi,ok);
}
function aNUM(si,qi){
  const q=S[si].questions[qi];
  const v=parseFloat(document.getElementById(`q${si}_${qi}_i`).value);
  const ok=!isNaN(v)&&Math.abs(v-q.ans)<=q.tol;
  document.getElementById(`q${si}_${qi}_s`).disabled=true;
  document.getElementById(`q${si}_${qi}_i`).disabled=true;
  showRes(si,qi,ok);
}

// ── SECTION DONE ─────────────────────────────
function finishSec(){
  if(!done.includes(curIdx))done.push(curIdx);
  updateProg();
  if(curIdx+1<S.length)goTo(curIdx+1);
}

function checkFinal(){
  const lastQ=qs[S.length-1];
  if(!lastQ.every(s=>s.answered))return;
  if(!done.includes(S.length-1))done.push(S.length-1);
  updateProg();
  const total=S.reduce((a,s)=>a+s.questions.length,0);
  const pct=Math.min(100,Math.round(score/(total*10)*100));
  document.getElementById('fNum').textContent=score;
  document.getElementById('fMsg').textContent=pct>=80?'🎉 Outstanding!':pct>=60?'💪 Solid work!':'📖 Keep reviewing!';
  document.getElementById('fSub').textContent=pct>=80?"You're ready for HW4.":'Go back through the sections, then retry.';
  document.getElementById('fRing').style.background=`conic-gradient(var(--accent) ${pct}%,var(--border2) 0%)`;
  document.getElementById('finalBox').classList.remove('hidden');
  document.getElementById('scroll').scrollTop=99999;
}

function retakeQuiz(){
  qs[S.length-1]=S[S.length-1].questions.map(()=>({answered:false,correct:false,sel:null}));
  done=done.filter(i=>i!==S.length-1);
  goTo(S.length-1);
}

// ── INIT ─────────────────────────────────────
renderNav();renderSection(S[0]);updateProg();
</script>
</body>
</html>
